*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:'Noto Sans KR',sans-serif;
  background:var(--ink);
  color:var(--cream);
  font-size:14px;
  line-height:1.65;
  -webkit-font-smoothing:antialiased;
}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(128,128,128,0.2);border-radius:99px;}
#root::before{
  content:'';
  position:fixed;top:-10%;left:50%;transform:translateX(-50%);
  width:100vw;height:70vh;
  background:radial-gradient(ellipse at center, rgba(255,56,92,0.10) 0%, transparent 65%);
  pointer-events:none;z-index:0;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes scaleIn{from{opacity:0;transform:scale(.96);}to{opacity:1;transform:scale(1);}}
@keyframes pdfScan{0%{width:0%}60%{width:62%}85%{width:88%}100%{width:95%}}
@keyframes pdfDone{to{width:100%}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.au{animation:fadeUp .45s cubic-bezier(.16,1,.3,1) both;}
.ai{animation:fadeIn .3s ease both;}
.as{animation:scaleIn .38s cubic-bezier(.16,1,.3,1) both;}
.d1{animation-delay:.06s;}.d2{animation-delay:.12s;}.d3{animation-delay:.18s;}
.glass{background:var(--glass);border:1px solid var(--border);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);}
.glass-b{background:var(--glass-b);border:1px solid var(--border-2);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);}

.glow-silver{box-shadow:0 0 0 1px rgba(148,163,184,.2),0 6px 30px rgba(0,0,0,.4);}

  background:linear-gradient(135deg,#FF385C 0%,#FF3B5C 45%,#FF4D6D 100%);

<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

const ALL_LEVELS = ['입문','초급','중급','고급'];

const TOPIC_MAP = {

};

function topicMatches(specialties, reqTopics) {
  if (!reqTopics?.length) return true;
  const norm = s => s.toLowerCase().replace(/[\s\n]/g,'');
  const expanded = new Set(reqTopics.flatMap(t => [t, ...(TOPIC_MAP[t] || [])]).map(norm));
  return specialties.some(function(s) {
    var ns = norm(s);
    if (expanded.has(ns)) return true;
    return reqTopics.some(function(t) {
      var nt = norm(t);
      return nt.startsWith(ns) || ns.startsWith(nt);
    });
  });
}
function topicMatchesFull(inst, reqTopics) {
  if (!reqTopics?.length) return true;
  var allTags = (inst.specialties||[]).concat(inst.category||[]).concat(inst.lectureTopics||[]);
  return topicMatches(allTags, reqTopics);
}
const ALL_AUDIENCES = ['비개발자','개발자','마케터','임원','HR','영업','현업 기획자','기타'];
const ALL_INDUSTRIES = ['IT/테크','제조','금융/보험','의료/제약','유통/물류','교육','공공/공기업','미디어/엔터','기타'];
const ALL_FORMATS = ['오프라인','비대면','블랜디드','플립러닝','플랫폼(온라인운영)'];
const ALL_STYLES = ['강의형','실습형','워크숍형','프로젝트형'];

/* ═══════════════════════════════════════════════════════
   SCORING (S1-S4)
═══════════════════════════════════════════════════════ */
function avgOf(arr){ return arr.length ? arr.reduce((s,v)=>s+v,0)/arr.length : null; }

function calcS1(inst, req) {
  let s = 0;
  // Topic (0-15)
  if (req.topics?.length) {
    if (topicMatchesFull(inst, req.topics)) s += 15;
    else s += 2;
  } else s += 8;
  // Audience (0-10)
  if (req.jobCategories?.length) {
    const m = req.jobCategories.filter(j => inst.jobCategories.includes(j)).length;
    s += Math.round(m / req.jobCategories.length * 10);
  } else s += 5;
  // Level (0-5) — P3-3: 완전 불일치 시 0점
  if (req.levels?.length) {
    if (req.levels.some(l => inst.levels.includes(l))) s += 5;
    else s += 0; // 완전 불일치 패널티 강화
  } else s += 3;
  // Style (0-5) — P5-5: learningFormat을 inst.traits와도 비교
  if (req.learningFormat?.length) {
    const styleMap = {'강의형':['강의형','이론'],'실습형':['실습형','핸즈온','실습'],'워크숍형':['워크숍','그룹'],'프로젝트형':['프로젝트형']};
    const instStyleSet = new Set([...(inst.teachingStyles||[]), ...(inst.traits||[])]);
    const matched = req.learningFormat.some(f => {
      const kws = styleMap[f] || [f];
      return kws.some(kw => [...instStyleSet].some(is => is.includes(kw)));
    });
    s += matched ? 5 : 1;
  } else s += 3;
  // requiredInstructorTraits (0-5) — P3-1: traits·strengths + 모니터링 기록 strengths/teachStyle 반영
  if (req.requiredInstructorTraits?.length) {
    const instTraits = new Set([...(inst.traits||[]), ...(inst.strengths||[])]);
    // 모니터링 기록에서 강점·교수스타일 텍스트 추출
    var monText = (inst.monitoringRecords || []).map(function(m) {
      return [m.strengths, m.teachStyle, m.commStyle].filter(Boolean).join(' ');
    }).join(' ');
    const traitMap = {
      '비개발자 눈높이 설명':['비개발자','눈높이','쉬운설명','이해하기 쉽','눈높이 맞'],
      '실습 운영 경험':['실습','핸즈온','실습운영','hands-on','직접 해보'],
      '임원 대상 진행 경험':['임원','C레벨','경영진','대표','팀장'],
      '업종 이해도 높음':['업종','도메인','이해도','현업','산업'],
      '질의응답 대응 우수':['Q&A','질의응답','QA','질문 대응','응답'],
      '워크숍 진행 강점':['워크숍','그룹실습','토론','팀 활동'],
    };
    const matched = req.requiredInstructorTraits.filter(trait => {
      const kws = traitMap[trait] || [trait];
      return kws.some(kw =>
        [...instTraits].some(it => it.includes(kw)) || monText.includes(kw)
      );
    }).length;
    s += Math.min(5, matched * 2);
  } else s += 2;
  return Math.min(35, s);
}

function calcS2(inst, req) {
  const recs = inst.satisfactionRecords || [];
  // P5-1: 신규 강사 기본값 낮추기 (검증 없음 → 8점)
  if (!recs.length) return 8;
  const allAvg = avgOf(recs.map(r => r.score));
  let s = allAvg >= 4.5 ? 10 : allAvg >= 4.0 ? 7 : allAvg >= 3.5 ? 4 : 1;
  // P5-2: 최근 추세 임계값 상향 (0.05 → 0.2)
  if (recs.length >= 2) {
    const recentAvg = avgOf(recs.slice(-3).map(r => r.score));
    s += recentAvg > allAvg + 0.2 ? 5 : recentAvg >= allAvg - 0.2 ? 3 : 0;
  } else s += 2;
  // Topic match
  const tRecs = recs.filter(r => req.topics?.includes(r.topic));
  if (tRecs.length) { const tA = avgOf(tRecs.map(r => r.score)); s += tA >= 4.5 ? 8 : tA >= 4.0 ? 6 : tA >= 3.5 ? 3 : 0; }
  else s += 4;
  // Audience match
  const aRecs = recs.filter(r => req.jobCategories?.includes(r.audience));
  if (aRecs.length) { const aA = avgOf(aRecs.map(r => r.score)); s += aA >= 4.5 ? 7 : aA >= 4.0 ? 5 : aA >= 3.5 ? 2 : 0; }
  else s += 3;
  // Tag bonuses/penalties
  const posC = {}, negC = {};
  recs.forEach(r => {
    (r.pos||[]).forEach(t => posC[t] = (posC[t]||0)+1);
    (r.neg||[]).forEach(t => negC[t] = (negC[t]||0)+1);
  });
  s += Math.min(3, Object.values(posC).filter(c => c >= 3).length);
  s -= Math.min(3, Object.values(negC).filter(c => c >= 2).length);
  return Math.max(0, Math.min(30, s));
}

function calcS3(inst, req) {
  // P2-3: S3 가중치 대폭 축소 (20→5점). 예산은 경고/참고 표시로 활용
  if (!inst.pricePerHour || !req.budgetTotal) return 3;
  const fee = inst.pricePerHour * (req.totalHours || 8);
  const r = fee / req.budgetTotal;
  let s = r <= 0.8 ? 5 : r <= 1.0 ? 4 : r <= 1.2 ? 2 : 0;
  if (inst.negotiable) s = Math.min(5, s + 1);
  return s;
}

var INDUSTRY_KW = {
  '금융/보험': ['은행','금융','보험','증권','카드','캐피탈','신한','KB','하나','우리','NH','메리츠','라이프','신용보증','핀테크'],
  'IT/테크': ['삼성전자','LG전자','SK텔레콤','KT','카카오','네이버','현대오토에버','티맥스','SKT','포스코DX','삼성SDS'],
  '제조': ['현대자동차','삼성디스플레이','LG에너지','포스코','LS','현대제철','한화','삼성엔지니어링','뷰웍스','피에스텍'],
  '의료/제약': ['병원','제약','의료','바이오','헬스','메디'],
  '유통/물류': ['롯데','CJ','신세계','GS','쿠팡','물류','유통','이마트','케이티알파'],
  '공공/공기업': ['공사','공단','정부','시청','도청','발전','한국남동','한국전력','테크노파크'],
  '교육': ['대학교','대학원','학교','교육원','인재개발원','아카데미'],
  '미디어/엔터': ['미디어','방송','엔터','콘텐츠','애드이피션시'],
};
function calcS4(inst, req) {
  var a = 0;
  // P5-4: isWorkedWithUs 플래그 — 명시적 처리
  if (inst.isWorkedWithUs) a += 14;
  else if (inst.notes && inst.notes.indexOf('재요청') > -1) a += 10;
  if (inst.notes && inst.notes.indexOf('트러블') > -1) a -= 15;
  if (req.recordingRequired && !inst.recordingAllowed) a -= 3;
  // 출강 이력 있는 강사 우대
  var histLen = instHistory(inst).length;
  if (histLen >= 5) a += 5;
  else if (histLen >= 3) a += 3;
  else if (histLen >= 1) a += 1;
  // P5-3: 업종 매칭 가중치 상향 (+4 → +10)
  if (req.industry && INDUSTRY_KW[req.industry]) {
    var kws = INDUSTRY_KW[req.industry];
    var exps = (inst.industryExp || []).join(' ');
    if (kws.some(function(kw){ return exps.includes(kw); })) a += 10;
  }
  var negC = {};
  (inst.satisfactionRecords||[]).forEach(function(r){ (r.neg||[]).forEach(function(t){ negC[t] = (negC[t]||0)+1; }); });
  a -= Math.min(5, Object.values(negC).filter(function(c){ return c >= 4; }).length * 5);

  // req.notes vs 모니터링 기록 매칭
  if (req.notes && req.notes.trim()) {
    var notesL = req.notes.toLowerCase();
    var monRecs = inst.monitoringRecords || [];
    var monPos = monRecs.map(function(m){ return [m.strengths, m.teachStyle, m.commStyle].filter(Boolean).join(' '); }).join(' ').toLowerCase()
      + ' ' + (inst.strengths||[]).join(' ').toLowerCase() + ' ' + (inst.traits||[]).join(' ').toLowerCase();
    var monNeg = monRecs.map(function(m){ return [m.weaknesses, m.issue].filter(Boolean).join(' '); }).join(' ').toLowerCase();

    var posMap = [
      {kw:'실습',   match:['실습','핸즈온','직접']},
      {kw:'임원',   match:['임원','경영진','c레벨','대표']},
      {kw:'비개발자',match:['비개발자','눈높이','쉬운','이해하기']},
      {kw:'워크숍',  match:['워크숍','그룹','토론']},
      {kw:'q&a',    match:['질의응답','q&a','응답']},
      {kw:'영어',    match:['영어','english']},
      {kw:'맞춤',    match:['맞춤','커스텀']},
      {kw:'사전',    match:['사전','준비','미팅']},
    ];
    posMap.forEach(function(p){
      if (notesL.includes(p.kw) && p.match.some(function(m){ return monPos.includes(m); })) a += 2;
    });
    a = Math.min(a, 20); // 상한

    var conflictMap = [
      {kw:'임원',    match:['임원','경영진']},
      {kw:'실습',    match:['실습','핸즈온']},
      {kw:'비개발자',match:['비개발자','눈높이']},
      {kw:'준비',    match:['준비','자료']},
    ];
    conflictMap.forEach(function(p){
      if (notesL.includes(p.kw) && p.match.some(function(m){ return monNeg.includes(m); })) a -= 3;
    });
  }
  return Math.max(-15, Math.min(20, a));
}

function getTopTags(recs, field, n=3) {
  const c = {};
  recs.forEach(r => (r[field]||[]).forEach(t => c[t] = (c[t]||0)+1));
  return Object.entries(c).sort((a,b) => b[1]-a[1]).slice(0,n).map(([t]) => t);
}

// ─── 최근 계약 경과 개월 수 ───────────────────────────
function getRecentContractMonths(inst) {
  var hist = instHistory(inst);
  if (!hist.length) return Infinity;
  var now = new Date();
  var mostRecent = null;
  hist.forEach(function(h) {
    var d = null;
    if (h.period) {
      var m1 = h.period.match(/(\d{4})[.\-\/](\d{1,2})[.\-\/](\d{1,2})/);
      if (m1) d = new Date(+m1[1], +m1[2]-1, +m1[3]);
      else {
        var m2 = h.period.match(/(\d{4})[.\-\/년\s](\d{1,2})/);
        if (m2) d = new Date(+m2[1], +m2[2]-1, 1);
      }
    }
    if (!d && h.year) {
      var y = parseInt(h.year);
      if (!isNaN(y)) d = new Date(y, 11, 31); // 해당 연도 말 (보수적)
    }
    if (d && (!mostRecent || d > mostRecent)) mostRecent = d;
  });
  if (!mostRecent) return Infinity;
  return (now - mostRecent) / (1000 * 60 * 60 * 24 * 30.44);
}

// ─── 해당 주제 출강 이력 건수 ─────────────────────────
function getTopicHistoryCount(inst, topics) {
  if (!topics || !topics.length) return 0;
  var count = 0;
  var kws = topics.flatMap(function(t){ return TOPIC_MAP[t] || [t]; })
                  .map(function(s){ return s.toLowerCase().replace(/\s/g,''); });
  // 만족도 레코드 (topic 필드 직접 매칭)
  (inst.satisfactionRecords || []).forEach(function(r) {
    if (!r.topic) return;
    var tn = r.topic.toLowerCase().replace(/\s/g,'');
    if (kws.some(function(kw){ return tn.includes(kw) || kw.includes(tn); })) count++;
  });
  // 출강 이력 과정명 (course 필드 키워드 매칭)
  instHistory(inst).forEach(function(h) {
    if (!h.course) return;
    var cn = h.course.toLowerCase().replace(/\s/g,'');
    if (kws.some(function(kw){ return cn.includes(kw); })) count++;
  });
  return count;
}

/*
 * ── Tier 분류 (v9 신규) ──────────────────────────────
 * A: 전임 + 일정OK + 해당 주제 이력 3건 초과  → 최우선
 * B: 최근 3개월 계약 + S1≥25               → 전임 주제 약하면 역전 가능
 * C: 전임 + 일정OK + 주제 이력 3건 이하       → 전임이지만 이 주제 약함
 * D: 최근 6개월 계약 + S1≥20
 * E: 최근 12개월 계약 + S1≥15
 * F: 기출강 (오래됨) 또는 이력 있음
 * G: 신규 (이력 없음)
 */
function getTier(inst, req, s1) {
  var scheduleOk = inst.scheduleStatus !== '불가';
  var topicCount = getTopicHistoryCount(inst, req.topics);
  var recentMonths = getRecentContractMonths(inst);
  if (inst.isFullTime && scheduleOk && topicCount > 3) return 'A';
  if (recentMonths <= 3  && s1 >= 25) return 'B';
  if (inst.isFullTime && scheduleOk)  return 'C';
  if (recentMonths <= 6  && s1 >= 20) return 'D';
  if (recentMonths <= 12 && s1 >= 15) return 'E';
  if (inst.isWorkedWithUs || instHistory(inst).length >= 1) return 'F';
  return 'G';
}

// ─── AI 랭킹 (규칙 기반 Top10 후보 → Claude 최종 순위 조정) ──
function callClaudeForRanking(passed, req) {
  if (!APPS_SCRIPT_URL || !passed.length) return Promise.resolve(passed);
  var top = passed.slice(0, 10);
  var reqSummary =
    '주제: '       + (req.topics||[]).join(', ')        + '\n' +
    '교육 대상: '  + (req.jobCategories||[]).join(', ') + '\n' +
    '총 시수: '    + (req.totalHours||8) + 'H'          + '\n' +
    '업종: '       + (req.industry||'미지정')            + '\n' +
    '교육 목표: '  + (req.purpose||'')                  + '\n' +
    '특이사항: '   + (req.notes||'없음');

  var instList = top.map(function(c, i) {
    var inst = c.inst;
    var hist = instHistory(inst);
    var recentM = getRecentContractMonths(inst);
    var topicCnt = getTopicHistoryCount(inst, req.topics);
    return [
      (i+1) + '. ID: ' + inst.id + '  이름: ' + inst.name,
      '   전임: ' + (inst.isFullTime ? 'Y' : 'N') +
        '  최근계약: ' + (recentM < Infinity ? Math.round(recentM) + '개월전' : '없음') +
        '  주제이력: ' + topicCnt + '건',
      '   전문분야: ' + (inst.specialties||[]).join(', '),
      '   출강이력: ' + hist.slice(0,4).map(function(h){
        return (h.client||'') + (h.course ? '('+h.course+')' : '');
      }).filter(Boolean).join(' / '),
      '   만족도: ' + (c.allAvg ? c.allAvg.toFixed(2) : '없음') +
        '  일정: ' + inst.scheduleStatus +
        '  규칙점수: ' + c.total,
    ].join('\n');
  }).join('\n\n');

  var prompt =
    '역할: 기업교육 강사 추천 전문가\n\n' +
    '교육 요청:\n' + reqSummary + '\n\n' +
    '후보 강사 ' + top.length + '명:\n' + instList + '\n\n' +
    '[순위 결정 기준]\n' +
    '1. 전임 강사이고 이 주제 출강 이력이 3건 초과 → 최우선\n' +
    '2. 전임이라도 이 주제 이력 3건 이하이면, 최근 계약·주제 강한 비전임과 비교 후 판단\n' +
    '3. 최근 3개월 계약 강사 > 6개월 > 12개월 순 가중치\n' +
    '4. 만족도 4.3 이상 + 이 주제·대상 이력 있으면 우대\n' +
    '5. 일정 "불가" 최하위, "미확인" 경고만\n' +
    '6. 출강이력 과정명이 요청 주제와 의미적으로 유사하면 가산\n' +
    '7. 특이사항에 명시된 요구사항(예: 임원 대상, 실습 강화, 비개발자 눈높이)을 해당 강사의 출강이력·모니터링 강점과 연결해 판단\n\n' +
    'JSON 배열로만 응답 (설명 없이):\n' +
    '[{"id":"INS-xxx","rank":1,"reason":"이유 1문장 이내"}]';

  return fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    headers: {'Content-Type':'text/plain'},
    body: JSON.stringify({
      action: 'claude',
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 900,
      messages: [{ role:'user', content: prompt }],
    }),
  })
  .then(function(r){ return r.json(); })
  .then(function(res) {
    var text = (res.content && res.content[0] && res.content[0].text) || '';
    var m = text.match(/\[[\s\S]*\]/);
    if (!m) return passed;
    var ranked = JSON.parse(m[0]);
    var rankMap = {};
    ranked.forEach(function(r){ rankMap[r.id] = r; });
    // AI reason 주입 + Top10 재정렬
    var tierOrd = {A:0,B:1,C:2,D:3,E:4,F:5,G:6};
    top.forEach(function(c){
      var ai = rankMap[c.inst.id];
      if (ai) { c.aiRank = ai.rank; c.aiReason = ai.reason; }
    });
    top.sort(function(a,b){
      var ta = tierOrd[a.tier]||6, tb = tierOrd[b.tier]||6;
      if (ta !== tb) return ta - tb;
      // Tier A·B는 AI 순위로 최종 결정
      if ((a.tier==='A'||a.tier==='B') && a.aiRank && b.aiRank) return a.aiRank - b.aiRank;
      return b.total - a.total;
    });
    // top 이후 나머지는 기존 순서 유지
    var rest = passed.slice(10);
    return top.concat(rest);
  })
  .catch(function(){ return passed; }); // AI 실패 시 규칙 기반 유지
}

function matchInstructors(req) {
  const passed = [], filtered = [], schedFiltered = [];
  INSTRUCTORS.forEach(inst => {
    // F1: 커리큘럼 — 미분류 강사는 soft-pass (P3-4)
    const hasTopic = topicMatchesFull(inst, req.topics);
    const isUnclassified = inst.specialties && inst.specialties.length === 1 && inst.specialties[0] === '미분류';
    if (!hasTopic && !isUnclassified) {
      filtered.push({inst, reason:`F1: '${req.topics?.join('/')}' 관련 강의 이력 없음`}); return;
    }
    // F3: 출강 제한 업종 (hard filter — 먼저 처리)
    if (req.industry && inst.restrictedIndustries && inst.restrictedIndustries.length > 0) {
      if (inst.restrictedIndustries.some(ri => ri && req.industry.includes(ri.trim()))) {
        filtered.push({inst, reason:`F3: ${req.industry} 출강 제한 업종`}); return;
      }
    }
    // 점수 계산 (F1·F3 통과한 모든 강사 대상)
    const s1 = calcS1(inst, req);
    const s2 = calcS2(inst, req);
    const s3 = calcS3(inst, req);
    const s4 = calcS4(inst, req);
    const total = Math.max(0, Math.min(100, s1 + s2 + s3 + s4));
    const recs = inst.satisfactionRecords || [];
    const allAvg = recs.length ? avgOf(recs.map(r => r.score)) : null;
    const topPos = getTopTags(recs, 'pos');
    const topNeg = getTopTags(recs, 'neg', 2);
    const tier = getTier(inst, req, s1);
    const label = total >= 75 ? '최적 매칭' : total >= 55 ? '적합' : '참고';
    const labelCls = total >= 75 ? 'lbl-best' : total >= 55 ? 'lbl-good' : 'lbl-ref';
    const reason = genReason(inst, req, {s1, s2, s3, s4, allAvg, topPos, tier, recs});
    // F2: 일정 필터 — 날짜 미정(flexible)이면 건너뜀, 날짜 지정 시만 적용
    var hasDates = !!(req.date || (req.dates && req.dates.length));
    var isFlexible = !hasDates || req.scheduleMode === 'flexible';
    var schedReason = null;
    if (!isFlexible) {
      if (inst.scheduleStatus === '불가') {
        schedReason = '일정 불가';
      } else if (req.date && inst.calendar.some(c => c.date === req.date.slice(0,10) && c.status === '확정')) {
        schedReason = `${req.date.slice(0,10)} 확정 일정 충돌`;
      } else if (req.dates && req.dates.length && inst.calendar.some(c => req.dates.some(d => d.slice(0,10) === c.date) && c.status === '확정')) {
        schedReason = '지정 날짜 확정 일정 충돌';
      }
    }
    if (schedReason) {
      schedFiltered.push({inst, reason: schedReason, s1, s2, s3, s4, total, allAvg, topPos, topNeg, label, labelCls, tier});
      return;
    }
    // 통과
    const warns = [];
    // P4-1: 일정 미확인 경고
    if (inst.scheduleStatus === '미확인') warns.push({text:'일정 확인 필요', level:'warn'});
    if (allAvg && allAvg < 3.5) warns.push({text:`만족도 ${allAvg.toFixed(1)}점 낮음`, level:'error'});
    if (!recs.length) warns.push({text:'만족도 데이터 없음', level:'warn'});
    if (req.recordingRequired && !inst.recordingAllowed) warns.push({text:'녹화 불가 강사', level:'error'});
    if (inst.constraintsNote) warns.push({text: inst.constraintsNote, level:'warn'});
    // P4-2: 레벨 완전 불일치 경고
    if (req.levels?.length && inst.levels?.length && !req.levels.some(l => inst.levels.includes(l))) {
      warns.push({text:`레벨 불일치 (요청:${req.levels.join('/')} / 가능:${inst.levels.join('/')})`, level:'warn'});
    }
    // P3-2: 시수 소화 가능 여부 경고
    if (req.totalHours && req.totalHours > 8) {
      const maxHistHours = Math.max(...(instHistory(inst).map(h => h.totalHours || 0)), 0);
      if (maxHistHours > 0 && maxHistHours < req.totalHours * 0.5) {
        warns.push({text:`시수 부담 가능성 (이력 최대 ${maxHistHours}h, 요청 ${req.totalHours}h)`, level:'warn'});
      }
    }
    // req.notes vs 모니터링 기록 충돌 경고
    if (req.notes && req.notes.trim()) {
      var notesL2 = req.notes.toLowerCase();
      var monNeg2 = (inst.monitoringRecords||[]).map(function(m){ return [m.weaknesses,m.issue].filter(Boolean).join(' '); }).join(' ').toLowerCase();
      var noteConflicts = [
        {kw:'임원',    match:['임원','경영진'], label:'임원 대상 이슈 기록 있음'},
        {kw:'실습',    match:['실습','핸즈온'], label:'실습 운영 관련 유의사항 있음'},
        {kw:'비개발자',match:['비개발자','눈높이'], label:'비개발자 대상 유의사항 있음'},
        {kw:'준비',    match:['준비','자료'],   label:'사전 준비 관련 이슈 기록 있음'},
      ];
      noteConflicts.forEach(function(p){
        if (notesL2.includes(p.kw) && p.match.some(function(m){ return monNeg2.includes(m); })) {
          warns.push({text:p.label, level:'warn'});
        }
      });
    }
    passed.push({inst, s1, s2, s3, s4, total, allAvg, topPos, topNeg, warns, label, labelCls, reason, tier});
  });
  // Tier 기반 정렬 — A>B>C>D>E>F>G, 동일 Tier 내 total → allAvg → 이력수
  const tierOrder = {A:0, B:1, C:2, D:3, E:4, F:5, G:6};
  passed.sort(function(a, b) {
    const ta = tierOrder[a.tier]||6, tb = tierOrder[b.tier]||6;
    if (ta !== tb) return ta - tb;
    if (b.total !== a.total) return b.total - a.total;
    var aAvg = a.allAvg || 0, bAvg = b.allAvg || 0;
    if (Math.abs(bAvg - aAvg) > 0.05) return bAvg - aAvg;
    return instHistory(b.inst).length - instHistory(a.inst).length;
  });
  schedFiltered.sort(function(a, b) { return b.total - a.total; });
  return {passed, filtered, schedFiltered};
}

function instHistory(inst) {
  if (inst.educationHistory && inst.educationHistory.length > 0) return inst.educationHistory;
  return (inst.industryExp || []).map(function(c){ return {client:c, count:1, year:'', course:''}; });
}

function genReason(inst, req, ctx) {
  var s1 = ctx.s1, s2 = ctx.s2, allAvg = ctx.allAvg, topPos = ctx.topPos, tier = ctx.tier, recs = ctx.recs || [];
  var hist = instHistory(inst);
  var sentences = [];

  // ① 과정명/교육목표와 연결한 주제 전문성
  var courseName = req.courseName || req.purpose || '';
  var topicPart = '';
  if (req.topics && req.topics.length && topicMatchesFull(inst, req.topics)) {
    if (courseName) {
      topicPart = '"' + (courseName.length > 16 ? courseName.slice(0,16)+'…' : courseName) + '" 과정 주제인 ' + req.topics[0] + ' 분야 전문';
    } else {
      topicPart = req.topics.slice(0,2).join('·') + ' 분야 전문';
    }
  } else if (inst.specialties && inst.specialties.length) {
    topicPart = inst.specialties.slice(0,2).join('·') + ' 전문';
  }

  // ② 전임/이력 prefix
  var prefixParts = [];
  if (inst.isFullTime) prefixParts.push('전임 강사');
  if (inst.isWorkedWithUs) prefixParts.push('기존 출강 강사');
  if (inst.scheduleStatus === '확정') prefixParts.push('일정 확인 완료');

  // ③ 출강 이력 — 최근 순으로 구체적인 고객사명
  var histPart = '';
  if (hist.length > 0) {
    var recentHist = hist.slice().sort(function(a,b){
      var ya = parseInt(a.year||0), yb = parseInt(b.year||0);
      return yb - ya;
    });
    var clients = recentHist.slice(0,3).map(function(h){
      var c = h.client || '';
      return (h.year ? h.year+'년 ' : '') + (c.length > 10 ? c.slice(0,10)+'…' : c);
    }).filter(Boolean);
    histPart = clients.slice(0,2).join(', ') + (hist.length > 2 ? ' 등 총 ' + hist.length + '건' : '') + ' 출강 이력';
  }

  var line1Parts = [];
  if (prefixParts.length) line1Parts.push(prefixParts.join(' · '));
  if (topicPart && histPart) line1Parts.push(topicPart + '로 ' + histPart + ' 보유');
  else if (topicPart)        line1Parts.push(topicPart);
  else if (histPart)         line1Parts.push(histPart + ' 보유');
  if (line1Parts.length) sentences.push(line1Parts.join('. ') + '.');

  // ④ 만족도 + 업종/대상 이력
  var extras = [];

  // 업종 일치 이력
  if (req.industry && hist.length) {
    var industryKws = req.industry.split(/[\s\/,·]+/).filter(Boolean);
    var hasIndustryHist = industryKws.some(function(kw){
      return hist.some(function(h){ return h.client && h.client.includes(kw); });
    });
    if (hasIndustryHist) extras.push(req.industry + ' 업종 출강 이력 보유');
  }

  // 주제별 만족도
  if (req.topics && req.topics.length && recs.length) {
    var topicRecs = recs.filter(function(r){
      return req.topics.some(function(t){ return (r.topic||'').includes(t); });
    });
    if (topicRecs.length >= 2) {
      var topicAvg = avgOf(topicRecs.map(function(r){return r.score;}));
      if (topicAvg >= 4.0 && (!allAvg || topicAvg >= allAvg + 0.1)) {
        extras.push(req.topics[0] + ' 강의 만족도 ' + topicAvg.toFixed(1) + '점');
      } else if (allAvg && allAvg >= 4.0) {
        extras.push('전체 평균 만족도 ' + allAvg.toFixed(1) + '점');
      }
    } else if (allAvg && allAvg >= 4.0) {
      extras.push('전체 평균 만족도 ' + allAvg.toFixed(1) + '점');
    }
  } else if (allAvg && allAvg >= 4.0) {
    extras.push('전체 평균 만족도 ' + allAvg.toFixed(1) + '점');
  }

  // 수강생 직군 일치
  if (req.jobCategories && req.jobCategories.length) {
    var matched = req.jobCategories.filter(function(j){return (inst.jobCategories||[]).indexOf(j)>-1;});
    if (matched.length) extras.push(matched.slice(0,2).join('·') + ' 대상 강의 경험 보유');
  }

  // 모니터링 강점
  var monStrong = (inst.monitoringRecords||[]).map(function(m){return m.strengths;}).filter(Boolean)[0];
  if (monStrong && !topPos?.length) extras.push(monStrong.length>20?monStrong.slice(0,20)+'…':monStrong);
  else if (topPos && topPos.length) extras.push(topPos[0]);

  if (extras.length) sentences.push(extras.slice(0,2).join(' · ') + '.');

  return sentences.join(' ') || (courseName ? '"'+courseName.slice(0,10)+'" 과정에 적합한 강사입니다.' : '요청 조건에 부합하는 강사입니다.');
}

// ─── Google Visualization JSONP 로더 ─────────────
// script 태그 주입 방식 → file:// CORS 우회
function gvizLoad(sheetId, gidOrSheet) {
  return new Promise(function(resolve, reject) {
    var cbName = '_gviz_' + Math.random().toString(36).substr(2,9);
    var done = false;
    var timer = setTimeout(function() {
      done = true;
      cleanup();
      reject(new Error('gviz timeout'));
    }, 20000);

    window[cbName] = function(raw) {
      if (done) return;
      done = true;
      clearTimeout(timer);
      cleanup();
      if (raw && raw.table) resolve(gvizParse(raw));
      else reject(new Error('gviz no table'));
    };

    // 문자열이면 탭 이름, 숫자면 GID
    var sheetParam = (typeof gidOrSheet === 'string')
      ? 'sheet=' + encodeURIComponent(gidOrSheet)
      : 'gid=' + gidOrSheet;

    var script = document.createElement('script');
    script.src = 'https://docs.google.com/spreadsheets/d/' + sheetId +
      '/gviz/tq?' + sheetParam + '&tqx=out:json;responseHandler:' + cbName;
    script.onerror = function() {
      if (done) return;
      done = true;
      clearTimeout(timer);
      cleanup();
      reject(new Error('gviz script error'));
    };
    document.head.appendChild(script);

    function cleanup() {
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }
  });
}

function gvizParse(raw) {
  if (!raw || !raw.table) return [];
  var cols = (raw.table.cols || []).map(function(c){ return c.label || c.id || ''; });
  return (raw.table.rows || []).map(function(row) {
    var obj = {};
    (row.c || []).forEach(function(cell, i) {
      obj[cols[i]] = (cell && cell.v !== null && cell.v !== undefined) ? String(cell.v) : '';
    });
    return obj;
  });
}

// ─── 파일명에서 우리 회사명 제거 후 고객사명 추출 ───
function extractClientFromFilename(filename) {
  if (!filename) return '';
  // normalize('NFC'): macOS HFS+ NFD 파일명 대응
  var base = filename.normalize('NFC').replace(/\.[^.]+$/, '').replace(/[_\-\s]+/g, ' ').trim();
  var segs = base.split(/[\s·]/).map(function(s){ return s.replace(/[()（）\[\]【】㈜]/g,'').trim(); }).filter(function(s){ return s.length >= 2 && s.length <= 20 && !/^\d{4}/.test(s); });
  // 우리 회사명·일반 단어 세그먼트는 건너뜀
  var skip = /^(제안|교육|과정|기획|강의|커리큘럼|프로그램|안내|자료|초안|최종|ver|v\d|ai|ppt|pdf|b2b|b2g|b2c|b2e|hr|erp|it|sw|ict|esg|dx|mv|pr|qr|고객사|발주|수요처|위탁|주관|담당|내부|외부|신규|기존|완료|진행|확정|초안|수정|final|draft|copy)/i;
  for (var i = 0; i < Math.min(segs.length, 8); i++) {
    if (isOurCompany(segs[i])) continue;
    if (skip.test(segs[i])) continue;
    // 2글자 이하 영문 약어(B2B 등 이미 skip에 없는 것) 제외
    if (/^[A-Za-z0-9]{1,2}$/.test(segs[i])) continue;
    return segs[i];
  }
  return '';
}

    '}\n\n' +

  return fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    headers: {'Content-Type': 'text/plain'},
    body: JSON.stringify({
      action: 'claude',
      model: 'claude-sonnet-4-6',
      max_tokens: 4000,
      messages: [{ role: 'user', content: prompt }],
    }),
  })
  .then(function(r) { return r.json(); })
  .then(function(res) {
    var text = res.content && res.content[0] && res.content[0].text || '';
    var jsonMatch = text.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('JSON 파싱 실패');
    var parsed = JSON.parse(jsonMatch[0]);
    // Normalise: if old format (no courses array), wrap it
    if (!parsed.courses) {
      parsed = { isSingleCourse: true, courses: [parsed] };
    }
    if (!Array.isArray(parsed.courses) || parsed.courses.length === 0) {
      throw new Error('courses 배열 파싱 실패');
    }
    return parsed;
  });
}

// callClaudeForReason: { reason, requests, purpose }

  var recentClients = hist.slice(0,3).map(function(h){ return (h.year?h.year+'년 ':'')+(h.client||''); }).filter(Boolean).join(', ');
  var recs = inst.satisfactionRecords || [];
  var avgScore = recs.length ? (recs.reduce(function(s,r){return s+(r.score||0);},0)/recs.length).toFixed(1) : null;

  var prompt =
    '당신은 기업교육 운영 담당자입니다. 아래 교육 요청 정보와 강사 정보를 보고 JSON 하나를 반환해주세요.\n\n' +

    '}\n\n' +
    '교육 요청:\n' +
    '- 주제: ' + (req.topics||[]).join(', ') + '\n' +
    (req.companyName ? '- 고객사: ' + req.companyName + '\n' : '') +
    (req.jobCategories&&req.jobCategories.length ? '- 수강 대상: ' + req.jobCategories.join(', ') + '\n' : '') +
    (req.purpose ? '- 교육 목표(원문): ' + req.purpose.slice(0,150) + '\n' : '') +
    (req.notes ? '- 특이사항/운영조건: ' + req.notes.slice(0,300) + '\n' : '') +
    (req.totalHours ? '- 총 시수: ' + req.totalHours + 'h\n' : '') +

    (avgScore ? '- 평균 만족도: ' + avgScore + '점\n' : '') +
    (posKws ? '- 강점: ' + posKws + '\n' : '') +
    (inst.constraintsNote ? '- 강사 유의사항: ' + inst.constraintsNote + '\n' : '') +

    }),
  })
  .then(function(r){ return r.json(); })
  .then(function(res){
    var t = (res.content && res.content[0] && res.content[0].text || '').trim();
    try {
      var m = t.match(/\{[\s\S]*\}/);
      return m ? JSON.parse(m[0]) : null;
    } catch(e) { return null; }

function mapProfRow(r, idx, satMap, histMap, monMap) {
  function get() {
    for (var i = 0; i < arguments.length; i++) {
      var v = r[arguments[i]];
      if (v !== undefined && v !== null && v !== '') return v;
    }
    return '';
  }
  function arr(v) { return v ? String(v).split(/[,;\n]/).map(function(s){return s.trim();}).filter(Boolean) : []; }
  function num(v) { var n = parseInt(String(v).replace(/[^0-9]/g,'')); return isNaN(n)?0:n; }
  function bool(v) { var s = String(v).toUpperCase().trim(); return s==='Y'||s==='O'||s==='가능'||s==='TRUE'||s==='YES'||s==='1'; }

  const id = get('강사ID') || `INS-${String(idx+1).padStart(4,'0')}`;
  var cat  = arr(get('카테고리'));
  var ltop = arr(get('강의주제(담당강의정보)') || get('강의주제') || get('강의 주제') || get('강의주제/담당강의정보'));
  return {
    id,
    name: get('강사명') || `강사 ${idx+1}`,
    photo: '👨‍🏫',
    email: get('이메일'),
    driveProfileUrl: get('프로필장표URL'),
    category: cat,
    lectureTopics: ltop,
    specialties: cat.length ? cat : ltop,
    levels: arr(get('가능레벨')),
    jobCategories: arr(get('교육대상직군')),
    industryExp: splitCell(get('주요고객사')),
    teachingStyles: arr(get('강의스타일')),
    pricePerHour: num(get('기본강의료(만원)')) * 10000,
    negotiable: bool(get('강의료협의가능')),
    recordingAllowed: false,
    contractType: get('계약서유형') || '3.3%',
    scheduleStatus: '미확인',
    calendar: [],
    strengths: arr(get('강점')),
    traits: arr(get('강사특성태그')),
    educationHistory: (histMap[id] || []),
    satisfactionRecords: (satMap[id] || satMap['__n__' + (get('강사명')||'')] || []).filter(s => s.score > 0),
    monitoringRecords: (monMap && monMap[id]) ? monMap[id] : [],
    notes: get('비고'),
    constraintsNote: get('출강제한업종'),
    restrictedIndustries: arr(get('출강제한업종')),
    needsReview: get('검토필요여부').includes('★'),
    isFullTime:  bool(get('전임여부') || get('전임강사여부') || get('고용형태')),
    isWorkedWithUs: bool(get('패스트캠퍼스출강여부') || get('출강여부') || get('기출강여부')),
  };
}

function applyEmbeddedData(instructors) {
  if (!instructors || !instructors.length) return instructors;
  instructors.forEach(function(inst) {
    var id   = inst.id   || '';
    var name = inst.name || '';
    // 이력 병합
    var embH = EMBEDDED_HIST_MAP[id] || [];
    var exH  = inst.educationHistory || [];
    embH.forEach(function(e) {
      if (!exH.some(function(x){ return x.client===e.client && x.course===e.course; }))
        exH.push(e);
    });
    inst.educationHistory = exH;
    // 만족도 병합
    var embS = (EMBEDDED_SAT_MAP[id] || EMBEDDED_SAT_MAP['__n__'+name] || []).filter(function(e){return e.score>0;});
    var exS  = inst.satisfactionRecords || [];
    embS.forEach(function(e) {
      if (!exS.some(function(x){ return x.date===e.date && x.topic===e.topic && x.score===e.score; }))
        exS.push(e);
    });
    inst.satisfactionRecords = exS;
  });
  return instructors;
}

function loadFromSheets() {
  // 각 시트 개별 로드 — 일부 실패해도 나머지 데이터는 사용
  return Promise.all([
    gvizLoad(GVIZ_PROF_ID, GVIZ_PROF_SHEET).catch(function(){ return []; }),    // 강사_마스터
    gvizLoad(GVIZ_LOG_ID,  GVIZ_SAT_SHEET).catch(function(){ return []; }),     // 만족도_평가
    gvizLoad(GVIZ_LOG_ID,  GVIZ_HIST_SHEET).catch(function(){ return []; }),    // 교육_실적_로그
    gvizLoad(GVIZ_PROF_ID, GVIZ_MON_SHEET).catch(function(){ return []; }),     // 모니터링_기록
  ]).then(function(results) {
    var profRows = results[0], satRows = results[1], histRows = results[2], monRows = results[3];

    // 만족도_평가 매핑
    var satMap = {};
    satRows.forEach(function(r) {
      var id   = (r['강사ID'] || '').trim();
      var name = (r['강사명'] || r['D'] || '').trim();
      if (!id && !name) return;
      var score = parseFloat(
        r['평균 만족도 조사 결과'] || r['I'] || r['5점환산'] || r['강사만족도_원점수']
      ) || 0;
      var rec = {
        date:            r['교육일'] || '',
        topic:           r['교육과정명'] || r['교육명'] || '',
        audience:        r['교육대상'] || r['교육대상직군'] || r['대상'] || '',
        score:           score,
        pos:             splitCell(r['긍정의견'] || r['M'] || ''),
        neg:             splitCell(r['개선 및 요청 의견'] || r['개선·요청의견'] || r['N'] || ''),
        operatorOpinion: (r['운영진 의견'] || r['O'] || '').trim(),
        specialNote:     (r['특이사항'] || r['P'] || '').trim(),
        client:          r['고객사'] || '',
        year:            r['연도'] || '',
      };
      if (id) {
        if (!satMap[id]) satMap[id] = [];
        satMap[id].push(rec);
      }
      // 이름 기반 폴백 키 (강사ID 없는 경우)
      if (name) {
        var nameKey = '__n__' + name;
        if (!satMap[nameKey]) satMap[nameKey] = [];
        satMap[nameKey].push(rec);
      }
    });

    // 교육_실적_로그 매핑
    var histMap = {};
    histRows.forEach(function(r) {
      var id = (r['강사ID'] || '').trim();
      if (!id) return;
      if (!histMap[id]) histMap[id] = [];
      histMap[id].push({
        client: r['출강기업'] || r['고객사'] || '',
        count: 1,
        level: r['레벨'] || r['수준'] || '',
        year: r['출강연도'] || r['연도'] || '',
        course: r['교육명'] || r['교육과정명'] || '',
        period: r['출강 기간'] || '',
        totalHours: parseInt(String(r['총시간'] || r['시수'] || '0').replace(/[^0-9]/g,'')) || 0,
      });
    });

    // 모니터링_기록 매핑
    var monMap = {};
    monRows.forEach(function(r) {
      var id = (r['강사ID'] || '').trim();
      if (!id) return;
      if (!monMap[id]) monMap[id] = [];
      monMap[id].push({
        course:      r['과정명'] || '',
        date:        r['날짜'] || '',
        session:     r['회차'] || '',
        summary:     r['운영진의견_요약'] || '',
        strengths:   r['강점'] || '',
        weaknesses:  r['단점/유의사항'] || '',
        commStyle:   r['소통스타일'] || '',
        teachStyle:  r['강의스타일'] || '',
        issue:       r['이슈내용'] || '',
        sourceUrl:   r['원본링크'] || '',
      });
    });

    // 임베디드 출강 DB 병합 (gviz 데이터에 없는 이력/만족도 보완)
    Object.entries(EMBEDDED_HIST_MAP).forEach(function(kv) {
      var id = kv[0], entries = kv[1];
      if (!histMap[id]) histMap[id] = [];
      entries.forEach(function(e) {
        if (!histMap[id].some(function(x){ return x.client===e.client && x.course===e.course; }))
          histMap[id].push(e);
      });
    });
    Object.entries(EMBEDDED_SAT_MAP).forEach(function(kv) {
      var id = kv[0], entries = kv[1];
      if (!satMap[id]) satMap[id] = [];
      entries.forEach(function(e) {
        if (!satMap[id].some(function(x){ return x.date===e.date && x.topic===e.topic && x.score===e.score; }))
          satMap[id].push(e);
      });
    });

    var mapped = profRows
      .filter(function(r){ return r['강사ID']; })
      .map(function(r, idx){ return mapProfRow(r, idx, satMap, histMap, monMap); });

    // 프로필 시트 로드 실패 시 embedded 이력/만족도만이라도 _SAMPLE_INSTRUCTORS에 반영
    if (!mapped.length) return [];
    return applyEmbeddedData(mapped);
  });
}

// 로그 기록 (Apps Script POST — 로그 시트 영문 key 기준)
function logAction(data) {
  if (!APPS_SCRIPT_URL) return;
  try {
    var payload = Object.assign({ timestamp: new Date().toISOString() }, data);
    fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      headers: {'Content-Type':'text/plain'},
      body: JSON.stringify(payload),
      mode: 'no-cors',
    });
  } catch(_) {}
}

  const submit = function() {
    if (!name.trim() || !email.trim()) { alert('이름과 이메일을 입력해주세요.'); return; }
    var nm = name.trim(), em = email.trim();
    localStorage.setItem('im_user_name', nm);
    localStorage.setItem('im_user_email', em);
    localStorage.setItem('im_sender', nm);
    localStorage.setItem('im_apps_script_url', APPS_SCRIPT_URL);
    sendLog({event_type: 'login', details: 'first_login'});
    onLogin(nm);
  };

  return (
    <div className="m-overlay ai" style={{zIndex:60}}>
      <div className="glass-b as" style={{width:'100%',maxWidth:400,margin:'0 16px',borderRadius:22,padding:'36px 32px'}}>

          <div style={{fontSize:12,color:'var(--cream-3)',marginTop:4}}>로그 기록을 위해 최초 1회 입력해주세요</div>
        </div>
        <div style={{display:'grid',gap:14}}>
          <div>
            <div className="sec-label">이름</div>
            <input className="field" value={name} onChange={function(e){setName(e.target.value);}}
              placeholder="홍길동" style={{width:'100%',boxSizing:'border-box'}}
              onKeyDown={function(e){if(e.key==='Enter')submit();}}/>
          </div>
          <div>
            <div className="sec-label">이메일</div>
            <input className="field" type="email" value={email} onChange={function(e){setEmail(e.target.value);}}
              placeholder="hong@day1company.co.kr" style={{width:'100%',boxSizing:'border-box'}}

          <button onClick={submit} className="btn-cta"
            style={{padding:'14px',borderRadius:12,fontWeight:600,fontSize:14,border:'none',cursor:'pointer',marginTop:4,fontFamily:'Noto Sans KR,sans-serif'}}>
            시작하기 →
          </button>
        </div>
      </div>
    </div>
  );
}

function buildEmailBody(inst, req, tone, senderName, greeting) {
  tone = tone || '친근한 말투';
  senderName = senderName || localStorage.getItem('im_user_name') || '담당자';
  greeting = greeting || '처음 인사';
  var greetingTxt = (GREETING_OPTS.find(function(g){return g.k===greeting;})||GREETING_OPTS[0]).txt;
  var h = req.totalHours || '';
  var topics = (req.topics||[]).join(', ') || '-';
  var company = (req.companyName && !isOurCompany(req.companyName)) ? req.companyName : '-';
  var dateStr = req.date ? req.date.slice(0,10)
    : (req.dates && req.dates.length)
      ? req.dates.map(function(d){return d.slice(0,10);}).join(', ')
      : '추후 협의';
  var audience = (req.jobCategories||[]).join(', ') || '-';
  var level    = (req.levels||[]).join(', ');
  var size     = req.audienceSize ? req.audienceSize : '-';
  var delivery = req.deliveryMode || '-';
  var notes    = req.notes || '';
  var purpose  = req.purpose || '';

  if (tone === '친근한 말투') {
    return (
'강사님 안녕하세요,\n' +
'패스트캠퍼스 ' + senderName + '입니다 :)\n\n' +
greetingTxt + '\n\n' +
'아래 교육 건으로 출강 가능 여부 확인 부탁드려요!\n\n' +
'* 기업명: ' + company + '\n' +
'* 교육 주제: ' + topics + '\n' +
(purpose ? '* 교육 목표: ' + purpose + '\n' : '') +
'* 교육 일정: ' + dateStr + '\n' +
'* 교육 시간: ' + (h ? '총 ' + h + 'H' : '협의 예정') + '\n' +
'* 교육 방식: ' + delivery + '\n' +
'* 수강 대상: ' + audience + (level ? ' (' + level + ')' : '') + '\n' +
'* 수강 인원: ' + (size !== '-' ? size + '명 내외' : '-') + '\n' +
(notes ? '\n* 특이사항\n' + notes + '\n' : '') +
'\n가능 여부 확인 부탁드리며,\n' +
'가능하신 경우 대표 커리큘럼(' + (h ? h + 'H' : '') + ')도 함께 전달 부탁드립니다 :)\n\n' +
'감사합니다.\n' +
senderName + ' 드림'
    );
  }

  // 간결한 말투
  return (
'강사님 안녕하세요,\n' +
'패스트캠퍼스 ' + senderName + '입니다.\n\n' +
greetingTxt + '\n\n' +
'■ 교육 개요\n' +
'- 기업명: ' + company + '\n' +
'- 교육 주제: ' + topics + '\n' +
'- 교육 일정: ' + dateStr + '\n' +
'- 교육 시간: ' + (h ? '총 ' + h + 'H' : '협의 예정') + '\n' +
'- 교육 방식: ' + delivery + '\n' +
'- 수강 대상: ' + audience + (level ? ' (' + level + ')' : '') + '\n' +
'- 수강 인원: ' + (size !== '-' ? size + '명 내외' : '-') + '\n' +
(purpose ? '\n■ 교육 목표\n' + purpose + '\n' : '') +
(notes ? '\n■ 운영 특이사항\n' + notes + '\n' : '') +
'\n■ 회신 요청\n' +
'1. 출강 가능 여부 확인 부탁드립니다.\n' +
'2. 가능하신 경우 대표 커리큘럼(' + (h ? h + 'H' : '') + ') 전달 부탁드립니다.\n' +
'3. 기타 확인 필요하신 사항은 편히 말씀 주세요.\n\n' +
'감사합니다.\n' +
senderName + ' 드림'
  );
}

function buildGmailUrl(inst, req, tone) {
  tone = tone || '친근한 말투';
  var senderName = localStorage.getItem('im_user_name') || localStorage.getItem('im_sender') || '담당자';
  var topics = (req.topics||[]).slice(0,2).join('/') || '교육';
  var company = (req.companyName && !isOurCompany(req.companyName)) ? req.companyName : '';
  var subject = '[패스트캠퍼스] ' + inst.name + ' 강사님께 - ' + (company ? company + ' ' : '') + topics + ' 출강 제안 드립니다.';
  return 'https://mail.google.com/mail/?view=cm&fs=1&to=' + encodeURIComponent(inst.email||'') + '&su=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(buildEmailBody(inst, req, tone, senderName));
}

   DOCUMENT PARSER

// 우리 회사명 제외 목록 (고객사로 잡히면 안 되는 이름)
const OUR_COMPANY_NAMES = [
  '패스트캠퍼스','fastcampus','패캠','fast campus','fast-campus',
  '(주)패스트캠퍼스','패스트캠퍼스주식회사','패스트캠퍼스(주)',
  '데이원컴퍼니','day1company','데이원 컴퍼니','(주)데이원컴퍼니',
  '데이원','day1','day 1','day-1','데이 원',
  'day1company.co.kr','fastcampus.co.kr',
];

function isOurCompany(name) {
  if (!name) return false;
  // normalize('NFC'): macOS HFS+는 파일명을 NFD로 저장해 한글 자모가 분리됨 → NFC로 통일 후 비교
  var n = name.normalize('NFC').toLowerCase().replace(/\s+/g,'').replace(/[()（）㈜\[\]【】]/g,'');
  return OUR_COMPANY_NAMES.some(function(ex){
    var exN = ex.normalize('NFC').replace(/\s+/g,'').toLowerCase();
    return n === exN || n.includes(exN) || exN.includes(n);
  });
}

// ── 제안서 섹션 필터 (슬라이드/페이지 단위) ──────────────
// SKIP: 패스트캠퍼스 소개 / 추천 강사진 / 교육 운영방안
// KEEP: 교육 세부내용 / 커리큘럼 섹션 (SKIP 해제)
const _SKIP_SLIDE_RES = [
  /패스트캠퍼스|fast\s*campus/i,
  /추천\s*강사진|강사\s*(?:진|소개|프로필)/i,
  /교육\s*운영\s*방안|운영\s*방안/i,
  /회사\s*소개|기업\s*소개/i,
];
const _KEEP_SLIDE_RES = [
  /교육\s*세부\s*내용|세부\s*내용/i,
  /커리큘럼/i,
  /과정\s*(?:구성|소개|내용|개요)/i,
];

// PPTX 슬라이드의 섹션 감지용 대표 텍스트 추출
// 1순위: title placeholder(<p:ph type="title/ctrTitle">) 텍스트
// 2순위: 슬라이드의 첫 번째 의미있는 텍스트 줄 (placeholder 없는 커스텀 디자인 PPT 대응)
function getPptxSlideTitle(xml) {
  // 1순위: title placeholder
  const tIdx = [xml.indexOf('type="title"'), xml.indexOf('type="ctrTitle"')]
    .filter(i => i >= 0)
    .reduce(function(a, b){ return Math.min(a, b); }, Infinity);
  if (isFinite(tIdx)) {
    const spStart = xml.lastIndexOf('<p:sp', tIdx);
    const spEnd = xml.indexOf('</p:sp>', tIdx);
    if (spStart >= 0 && spEnd >= 0) {
      const t = xml.slice(spStart, spEnd + 7)
        .replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
      if (t) return t.slice(0, 120);
    }
  }
  // 2순위: 첫 번째 의미있는 텍스트 줄 (커스텀 shape 기반 PPT)
  const allText = xml
    .replace(/<\/a:r>|<\/a:t>|<a:br\/>/g, ' ')
    .replace(/<\/p:sp>|<\/a:txBody>/g, '\n')
    .replace(/<[^>]+>/g, '')
    .replace(/[ \t]+/g, ' ');
  const firstLine = allText.split('\n').map(function(l){ return l.trim(); }).find(function(l){ return l.length > 2; }) || '';
  return firstLine.slice(0, 120);
}

// 최종 백업 필터 (추출 후 잔여 텍스트 정리용)
function filterProposalText(text) {
  return text; // 슬라이드/페이지 단위 필터링으로 대체됨
}

function parseDocumentText(rawText, filename) {
  const text  = rawText.replace(/\r/g,'\n').replace(/[ \t]+/g,' ');
  const lines = text.split('\n').map(l=>l.trim()).filter(l=>l.length>1);

  const result = {
    title:'', purpose:'', companyName:'', topics:[], jobCategories:[],
    level:'', industry:'',
    deliveryMode:'', learningFormat:[], sessions:1, durationPerSession:'',
    totalHours:'', audienceSize:'', budgetRange:'', learningRatio:'',
    requiredInstructorTraits:[], constraints:[], expectedOutcome:[],
    highlights:[], notes:'', extractedDates:[],
  };

  result.title = lines.find(l=>l.length>3&&l.length<80) || (filename||'').replace(/\.[^.]+$/,'');

  // 교육 주제: "커리큘럼" 또는 "로드맵" 이 포함된 섹션 우선 탐색
  // 해당 섹션이 없으면 전체 문서 폴백
  var currLines = [];
  var inCurr = false, currCount = 0;
  lines.forEach(function(l) {
    var lLow = l.toLowerCase();
    if (/커리큘럼|로드맵|교육\s*세부|과정\s*구성|학습\s*내용|강의\s*내용/.test(lLow)) { inCurr = true; currCount = 0; }
    if (inCurr) { currLines.push(l); currCount++; if (currCount > 100) inCurr = false; }
  });
  var topicSrc = currLines.length >= 3
    ? currLines.join(' ').toLowerCase().replace(/\s+/g,'')
    : text.toLowerCase().replace(/\s+/g,'');
  result.topics = ALL_TOPICS.filter(category => {
    const keywords = TOPIC_MAP[category] || [category];
    return keywords.some(kw => kw.length >= 4 && topicSrc.includes(kw.toLowerCase().replace(/\s+/g,'')));
  });
  // 생성형AI(콘텐츠) 또는 생성형AI(Agent)가 파싱되면 생성형AI(업무자동화)는 제거
  if (result.topics.includes('생성형AI(콘텐츠)') || result.topics.includes('생성형AI(Agent)')) {
    result.topics = result.topics.filter(t => t !== '생성형AI(업무자동화)');
  }
  // 한글 단어 경계 체크: '비개발자' 안의 '개발자'처럼 부분 포함되는 경우 방지
  result.jobCategories = ALL_AUDIENCES.filter(function(a) {
    const esc = a.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return new RegExp('(?<![가-힣a-zA-Z])' + esc).test(text);
  });
  // 개발자/비개발자 동시 파싱 방지 — 비개발자 우선 (더 구체적인 대상)
  if (result.jobCategories.includes('비개발자') && result.jobCategories.includes('개발자')) {
    result.jobCategories = result.jobCategories.filter(c => c !== '개발자');
  }
  for (const l of ['고급','중급','초급','입문']) { if (text.includes(l)) { result.level=l; break; } }
  for (const ind of ALL_INDUSTRIES) {
    const b = ind.split('/')[0];
    if (text.includes(b)) { result.industry=ind; break; }
  }

  if (text.includes('오프라인')&&text.includes('온라인')) result.deliveryMode='혼합';
  else if (text.includes('오프라인')) result.deliveryMode='오프라인';
  else if (text.includes('온라인')) result.deliveryMode='온라인';

  const fmtKws = {
    강의형:    ['강의형','이론 강의','강의 중심'],
    실습형:    ['실습형','실습 중심','핸즈온','hands-on'],
    워크숍형:  ['워크숍','workshop'],
    프로젝트형:['프로젝트형','프로젝트 기반','최종 프로젝트','실습 프로젝트','팀 프로젝트','프로젝트 발표','프로젝트 수행','캡스톤','capstone'],
  };
  for (const [fmt,kws] of Object.entries(fmtKws)) {
    if (kws.some(kw=>text.toLowerCase().includes(kw.toLowerCase()))) result.learningFormat.push(fmt);
  }

  const sesM = text.match(/총?\s*(\d+)\s*(?:차수?|회차|개 세션)/);
  if (sesM) result.sessions = parseInt(sesM[1]);
  const durM = text.match(/(?:회당|차당|1회)?\s*(\d+(?:\.\d+)?)\s*시간/);
  if (durM) result.durationPerSession = durM[1]+'시간';
  // 총 교육 시수 추출 — 레이블 우선, 숫자 범위 4~300h로 제한
  (function() {
    var h;
    var patterns = [
      // 레이블 명시형: "총 교육 시간: 32H" / "교육시수: 32h" / "Total: 32Hours"
      /(?:총\s*교육\s*(?:시간|시수)|교육\s*시수|총\s*시수|total\s*(?:hour|time)s?)\s*[:：]?\s*(\d+(?:\.\d+)?)\s*(?:h(?:ours?)?|시간?)/i,
      // "총 32H" / "총 32시간" / "전체 32h"
      /(?:총|전체)\s*(\d+(?:\.\d+)?)\s*(?:h(?:ours?)?|시간)/i,
      // 숫자 바로 뒤 단위: "32H" / "32h" / "32Hours" / "32시간" (앞뒤 맥락 확인)
      /(\d+(?:\.\d+)?)\s*(?:h(?:ours?)|시간)(?!\s*[이내마다후전])/i,
    ];
    for (var pi = 0; pi < patterns.length; pi++) {
      var m = text.match(patterns[pi]);
      if (m) {
        var v = parseFloat(m[1]);
        if (v >= 4 && v <= 300) { h = String(Math.round(v)); break; }
      }
    }
    if (h) result.totalHours = h;
  })();
  const szM  = text.match(/(\d+(?:\s*[~～\-]\s*\d+)?)\s*명/);
  if (szM)  result.audienceSize = szM[0].replace(/\s/g,'');
  const budM = text.match(/(?:회당|강의료|단가|예산)[^\n]{0,20}?(\d+(?:\s*[~～]\s*\d+)?)\s*만원/) ||
               text.match(/(\d+(?:\s*[~～]\s*\d+)?)\s*만원/);
  if (budM) result.budgetRange = '회당 ' + budM[1].replace(/\s/g,'') + '만원';

  result.extractedDates = (function() {
    const dates = new Set();
    const yr = new Date().getFullYear();
    let m;
    // 제안서 발송/작성일 제외 — 해당 키워드 앞뒤 60자 범위 내 날짜는 스킵
    const PROP_KW_RE = /(?:작성일|발송일|제출일|제안일|배포일|수신일|기준일|작성\s*일자|발행\s*일자|제출\s*일자|발송\s*일자|보낸\s*날|제안\s*날짜|문서\s*번호)/g;
    const skipRanges = [];
    let pk;
    while ((pk = PROP_KW_RE.exec(text)) !== null) {
      skipRanges.push([Math.max(0, pk.index - 10), pk.index + pk[0].length + 60]);
    }
    const isProposalDate = (idx) => skipRanges.some(function(r){ return idx >= r[0] && idx <= r[1]; });

    const p1 = /(\d{4})년\s*(\d{1,2})월\s*(\d{1,2})일/g;
    while ((m=p1.exec(text))!==null) {
      if (isProposalDate(m.index)) continue;
      const y=parseInt(m[1]),mo=parseInt(m[2]),d=parseInt(m[3]);
      if (y>=2024&&mo>=1&&mo<=12&&d>=1&&d<=31)
        dates.add(`${y}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
    }
    const p2 = /(\d{1,2})월\s*(\d{1,2})일/g;
    while ((m=p2.exec(text))!==null) {
      if (isProposalDate(m.index)) continue;
      const mo=parseInt(m[1]),d=parseInt(m[2]);
      if (mo>=1&&mo<=12&&d>=1&&d<=31) {
        const y=(new Date().getMonth()+1)>mo?yr+1:yr;
        dates.add(`${y}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
      }
    }
    const p3 = /(\d{4})[-./](\d{1,2})[-./](\d{1,2})(?!\d)/g;
    while ((m=p3.exec(text))!==null) {
      if (isProposalDate(m.index)) continue;
      const y=parseInt(m[1]),mo=parseInt(m[2]),d=parseInt(m[3]);
      if (y>=2024&&mo>=1&&mo<=12&&d>=1&&d<=31)
        dates.add(`${y}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
    }
    return [...dates].sort();
  })();

  const traitKws = {
    '비개발자 눈높이 설명':['비개발자','비개발자','눈높이','비전공자'],
    '실습 운영 경험':      ['실습','핸즈온','실습 운영'],
    '임원 대상 진행 경험': ['임원','C레벨','경영진','대표'],
    '업종 이해도 높음':    ['업종','도메인','현업 경험'],
    '질의응답 대응 우수':  ['Q&A','질의응답','토론'],
    '워크숍 진행 강점':    ['워크숍','workshop','그룹 실습'],
  };
  for (const [trait,kws] of Object.entries(traitKws)) {
    if (kws.some(kw=>text.includes(kw))) result.requiredInstructorTraits.push(trait);
  }

  result.highlights = lines
    .filter(l=>/^[•·\-\*]\s*.{8,}/.test(l)||(l.length>=12&&l.length<=70&&!/[=<>{}]/.test(l)))
    .slice(0,5).map(l=>l.replace(/^[•·\-\*]\s*/,''));

  // ── 교육 목표 추출 (교육 목표 + 기대효과 섹션 합산) ───
  (function() {
    var PURPOSE_HEADERS  = /(?:교육\s*목표|학습\s*목표|과정\s*목표|교육\s*목적|수업\s*목표)/;
    var EFFECT_HEADERS   = /(?:기대\s*효과|기대\s*성과|교육\s*효과|학습\s*성과)/;
    var ANY_HEADER       = /(?:교육\s*목표|학습\s*목표|과정\s*목표|교육\s*목적|수업\s*목표|기대\s*효과|기대\s*성과|교육\s*효과|학습\s*성과|과정\s*소개|교육\s*개요)/;

    function collectAfterHeader(re) {
      // 인라인 패턴: "교육 목표: 내용"
      var inline = text.match(new RegExp(re.source + '\\s*[:：]\\s*([^\\n]{8,200})'));
      if (inline) return [inline[1].trim()];
      // 헤더 다음 줄 수집
      var idx = lines.findIndex(function(l){ return re.test(l); });
      if (idx < 0) return [];
      var TABLE_HDR = /^(Objective|Module|Content|Item|Step|Stage|for|모듈명|내용|구분|단계|시간|일정|강사|수강|날짜|주차|차시|회차|세부내용|학습내용|주요내용|진행내용|교육내용|강의내용)$/i;
      var parts = [];
      for (var j = idx+1; j < Math.min(idx+12, lines.length); j++) {
        var pl = lines[j].trim();
        if (!pl || ANY_HEADER.test(pl) || /^[■□▶▷◆●]/.test(pl)) break;
        var clean = pl.replace(/^[•·\-\*○]\s*/, '');
        if (TABLE_HDR.test(clean.trim())) continue;
        // 표 헤더 조각 연속 포함된 줄 제외 (예: "Objective교육 내용모듈명")
        if (/(?:Objective|모듈명|교육\s*내용|Module|Content)\s*(?:Objective|모듈명|교육\s*내용|Module|Content)/i.test(clean)) continue;
        if (clean.length > 8 && clean.length < 250) parts.push(clean);
        if (parts.length >= 3) break;
      }
      return parts;
    }

    var purposeParts = collectAfterHeader(PURPOSE_HEADERS);
    var effectParts  = collectAfterHeader(EFFECT_HEADERS);
    // 교육 목표 + 기대효과 합산 (중복 제거)
    var all = purposeParts.concat(effectParts.filter(function(e){
      return !purposeParts.some(function(p){ return p.slice(0,8) === e.slice(0,8); });
    }));
    if (all.length > 0) { result.purpose = all.slice(0,4).join(' / '); return; }

    // "이 과정을 통해 ~" 패턴
    var throughM = text.match(/이\s*(?:과정|교육|수업|프로그램)을?\s*통해\s*([^\n]{10,150})/);
    if (throughM) { result.purpose = throughM[1].trim(); return; }
    // 목표/효과 동사 패턴 — 한글 범위만 캡처 (영문/표헤더 오염 방지)
    var abilityM = text.match(/[가-힣]{2,15}(?:를|을|의)?\s*(?:이해하|습득하|향상시키|활용하|적용하|강화하|달성하|구축하|전파하|완성하|혁신하)[가-힣\s,.]{0,50}/);
    if (abilityM) result.purpose = abilityM[0].trim();
  })();

  // ── purpose 오염 후처리 ── 표 헤더 단어가 섞인 경우 해당 위치부터 잘라냄
  if (result.purpose) {
    var JUNK_RE = /(?:Objective|Module|Content|모듈명|교육\s*내용\s*모듈|for\s+(?:\w+\s*){0,3}(?:모듈|교육|내용))/i;
    var junkIdx = result.purpose.search(JUNK_RE);
    if (junkIdx > 5) result.purpose = result.purpose.slice(0, junkIdx).replace(/[·/\s]+$/, '').trim();
    else if (junkIdx !== -1) result.purpose = '';
  }

  // ── 이론/실습 비율 추출 ───────────────────────────────
  (function() {
    var ratioM = text.match(/이론\s*[:：]?\s*(\d+)\s*%?\s*[+\+]\s*실습\s*[:：]?\s*(\d+)\s*%/);
    if (!ratioM) ratioM = text.match(/실습\s*[:：]?\s*(\d+)\s*%?\s*[+\+]\s*이론\s*[:：]?\s*(\d+)\s*%/);
    if (ratioM) {
      // 순서 상관없이 이론:실습으로 정렬
      var a = parseInt(ratioM[1]), b = parseInt(ratioM[2]);
      if (/^이론/.test(ratioM[0])) {
        result.learningRatio = '이론 ' + a + '% + 실습 ' + b + '%';
      } else {
        result.learningRatio = '이론 ' + b + '% + 실습 ' + a + '%';
      }
      // 실습 비율이 60% 이상이면 실습형 자동 추가
      var practiceRate = /^이론/.test(ratioM[0]) ? b : a;
      if (practiceRate >= 60 && !result.learningFormat.includes('실습형')) {
        result.learningFormat.push('실습형');
      }
    }
  })();

  // ── 커리큘럼에서 활용 도구 추출 → 토픽 보완 ─────────
  (function() {
    var TOOL_TOPIC_MAP = {
      'ChatGPT':   '생성형AI(업무자동화)',
      'Claude':    '생성형AI(업무자동화)',
      'Gemini':    '생성형AI(업무자동화)',
      'Copilot':   '생성형AI(업무자동화)',
      'Make':      '생성형AI(Agent)',
      'Zapier':    '생성형AI(Agent)',
      'n8n':       '생성형AI(Agent)',
      'Power BI':  '데이터사이언스',
      'Tableau':   '데이터사이언스',
      'Python':    '프로그래밍',
      'SQL':       '데이터사이언스',
      'Midjourney':'생성형AI(콘텐츠)',
      'DALL-E':    '생성형AI(콘텐츠)',
      'Canva':     '생성형AI(콘텐츠)',
      'Notion':    '업무생산성',
      'Excel':     '업무생산성',
    };
    Object.keys(TOOL_TOPIC_MAP).forEach(function(tool) {
      if (text.toLowerCase().includes(tool.toLowerCase())) {
        var topic = TOOL_TOPIC_MAP[tool];
        if (!result.topics.includes(topic)) result.topics.push(topic);
      }
    });
    // 실습 비율 80% 이상이면 생성형AI(업무자동화)에서 업무생산성도 추가
  })();

  // ── 교육 특이사항 추출 ────────────────────────────────
  (function() {
    var noteItems = [];
    // 1) 명시적 섹션 탐색 — 헤더 앞에 ■ 등 기호가 붙는 경우도 처리
    var sectionRe = /(?:특이\s*사항|요청\s*사항|운영\s*조건|기타\s*요청|주요\s*요청|진행\s*방식|운영\s*방식|강의\s*조건|교육\s*조건|고객\s*요청|운영\s*요청|특별\s*요청|교육\s*특이사항)/;
    lines.forEach(function(l, i) {
      if (sectionRe.test(l)) {
        var inline = l.replace(/^[■□▶▷◆○●\-\*•·\[\]【】\s]+/, '').replace(sectionRe, '').replace(/^[\s:：]+/, '').trim();
        if (inline.length > 4) noteItems.push(inline);
        for (var j = i + 1; j < Math.min(i + 8, lines.length); j++) {
          var nl = lines[j].trim();
          if (!nl || sectionRe.test(nl) || /^[■□▶▷◆●]/.test(nl)) break;
          if (nl.length > 4 && nl.length < 200) noteItems.push(nl.replace(/^[•·\-\*○]\s*/, ''));
        }
      }
    });
    // 2) 키워드 기반 자동 감지
    var kwMap = [
      { kw: ['녹화 불가','촬영 불가','녹화 금지','no recording','녹화금지'],    label: '녹화 불가' },
      { kw: ['녹화 가능','녹화 허용','촬영 가능'],                               label: '녹화 가능' },
      { kw: ['NDA 서약','NDA 체결','NDA 필수','NDA 작성','NDA 필요','비밀유지 서약','비밀유지서약','기밀유지 서약','보안 서약서','보안서약'],  label: 'NDA/보안 서약 필요' },
      { kw: ['자사 사례 반영','사내 사례 반영','내부 사례 기반','실제 사례 반영','사내 실무 사례'],  label: '자사 사례 커리큘럼 반영 요청' },
      { kw: ['커스터마이징','커스텀 개발','맞춤형 개발','맞춤형 제작','맞춤 커리큘럼','맞춤형 커리큘럼','맞춤 제작'],  label: '맞춤형 커리큘럼 요청' },
      { kw: ['사전 미팅','사전 인터뷰','킥오프','kick-off','사전 협의'],         label: '사전 미팅/킥오프 필요' },
      { kw: ['레벨 테스트','수준 조사','사전 설문','수강생 설문','수준 진단'],   label: '사전 수준 조사 요청' },
      { kw: ['분반','소그룹','그룹별','반별','분반 운영'],                        label: '소그룹/분반 운영' },
      { kw: ['교재','핸드아웃','handout','workbook','교재 제작','워크북'],        label: '교재/핸드아웃 제작 요청' },
      { kw: ['영어 강의','영어로 진행','통역','영어 수업','bilingual'],           label: '영어/통역 강의 요청' },
      { kw: ['임원 참석','임원진','C레벨','대표 참석','임원 대상','경영진'],      label: '임원 참석 예정' },
      { kw: ['수료증','이수증','certificate','수료 증명'],                        label: '수료증 발급 필요' },
      { kw: ['현장 출강','오프라인 필수','비대면 불가','출강 필수','현장 방문'],  label: '오프라인 현장 출강 필수' },
      { kw: ['사전 과제','pre-work','사전 학습','사전 준비'],                     label: '사전 과제/학습 요청' },
      { kw: ['실시간 Q&A','질의응답 시간','Q&A 세션'],                           label: '실시간 Q&A 세션 포함' },
    ];
    var textL = text.toLowerCase();
    kwMap.forEach(function(item) {
      var hit = item.kw.some(function(k) { return textL.includes(k.toLowerCase()); });
      if (hit && !noteItems.some(function(n){ return n.includes(item.label.slice(0,4)); })) {
        noteItems.push(item.label);
      }
    });
    if (noteItems.length > 0) {
      result.notes = noteItems.slice(0, 10).map(function(s){ return '• ' + s; }).join('\n');
    }
  })();

  // ── 기업명 추출 (파일명 기준) — 우리 회사명 세그먼트 건너뜀 ──
  if (filename) {
    var clientFromFn = extractClientFromFilename(filename);
    if (clientFromFn) result.companyName = clientFromFn;
  }

  if (result.extractedDates.length > 0 && result.sessions <= 1)
    result.sessions = result.extractedDates.length;

  return result;
}

/* ═══════════════════════════════════════════════════════

function EmailToneModal({inst, req, onClose}) {
  var initSn = localStorage.getItem('im_sender') || localStorage.getItem('im_user_name') || '담당자';

  // 마이페이지 과정 목록 로드
  var wl = (function(){ try{ return JSON.parse(localStorage.getItem('im_wishlist')||'{}'); }catch(_){ return {}; } })();
  var courseList = Object.keys(wl).map(function(cid){ return {id:cid, name:wl[cid].name, req:wl[cid].req||null}; });

  const [selectedCid, setSelectedCid] = useState('');
  const [activeReq, setActiveReq] = useState(req || {});

  var makeSubject = function(r) {
    var t = (r && r.topics && r.topics.length ? r.topics.slice(0,2).join('/') : '교육');
    var c = (r && r.companyName) ? r.companyName + ' ' : '';
    return '[패스트캠퍼스] ' + inst.name + ' 강사님께 - ' + c + t + ' 출강 제안 드립니다.';
  };

  const [tone, setTone] = useState('친근한 말투');
  const [greeting, setGreeting] = useState('처음 인사');
  const [subject, setSubject] = useState(makeSubject(req));
  const [body, setBody] = useState(buildEmailBody(inst, req || {}, '친근한 말투', initSn, '처음 인사'));
  const [copied, setCopied] = useState(false);

  useEffect(function() {
    var sn = localStorage.getItem('im_sender') || localStorage.getItem('im_user_name') || '담당자';
    setBody(buildEmailBody(inst, activeReq, tone, sn, greeting));
    setSubject(makeSubject(activeReq));
  }, [tone, greeting, activeReq]);

  const openGmail = function() {
    var url = 'https://mail.google.com/mail/?view=cm&fs=1' +
      '&to=' + encodeURIComponent(inst.email || '') +
      '&su=' + encodeURIComponent(subject) +
      '&body=' + encodeURIComponent(body);
    window.open(url, '_blank');
    sendLog({event_type:'email_gmail_open', instructor_name:inst.name, tone:tone, details:'template', gmail_sent:true});
  };

  const copy = function() {
    var full = '제목: ' + subject + '\n\n' + body;
    navigator.clipboard.writeText(full).then(function() {
      setCopied(true); setTimeout(function(){setCopied(false);}, 2000);
    });
    sendLog({event_type:'email_copy', instructor_name:inst.name, tone:tone, details:'template'});
  };

  return (
    <div className="m-overlay ai" onClick={function(e){if(e.target===e.currentTarget)onClose();}}>
      <div className="glass-b as" style={{width:'100%',maxWidth:560,margin:'0 16px',borderRadius:22,overflow:'hidden',maxHeight:'92vh',display:'flex',flexDirection:'column'}}>
        {/* 헤더 */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'18px 24px',borderBottom:'1px solid var(--border)',flexShrink:0}}>
          <div>
            <div style={{fontFamily:'Outfit,sans-serif',fontWeight:600,fontSize:16,color:'var(--cream)'}}>✉️ {inst.name} 강사 섭외 메일</div>
            <div style={{fontSize:10,color:'var(--cream-3)',marginTop:2}}>어조 선택 후 자유롭게 수정하세요</div>
          </div>
          <button onClick={onClose} className="nav-ghost" style={{fontSize:20}}>✕</button>
        </div>
        {/* 본문 */}
        <div style={{padding:'18px 24px',overflowY:'auto',flex:1}}>
          {/* 과정 선택 */}
          {courseList.length > 0 && (
            <div style={{marginBottom:16}}>
              <div className="sec-label" style={{marginBottom:6}}>과정 선택 <span style={{fontWeight:400,fontSize:10,textTransform:'none',letterSpacing:0,color:'var(--cream-3)'}}>(선택하면 교육 내용 자동 입력)</span></div>
              <select value={selectedCid}
                onChange={function(e){
                  var cid = e.target.value;
                  setSelectedCid(cid);
                  if (cid && wl[cid] && wl[cid].req) {
                    setActiveReq(wl[cid].req);
                  } else {
                    setActiveReq(req || {});
                  }
                }}
                style={{width:'100%',padding:'9px 12px',borderRadius:10,border:'1px solid var(--border-2)',background:'var(--field-bg)',color:'var(--cream)',fontSize:13,fontFamily:'Noto Sans KR,sans-serif',cursor:'pointer'}}>
                <option value="">— 과정 선택 안 함 (현재 요청 정보 사용)</option>
                {courseList.map(function(c){
                  return <option key={c.id} value={c.id}>{c.name}{!c.req ? ' (상세 정보 없음)' : ''}</option>;
                })}
              </select>
              {selectedCid && wl[selectedCid] && wl[selectedCid].req && (
                <div style={{marginTop:6,display:'flex',flexWrap:'wrap',gap:5}}>
                  {[
                    wl[selectedCid].req.companyName && {label:'기업', v:wl[selectedCid].req.companyName},
                    wl[selectedCid].req.totalHours && {label:'시간', v:wl[selectedCid].req.totalHours+'H'},
                    wl[selectedCid].req.deliveryMode && {label:'방식', v:wl[selectedCid].req.deliveryMode},
                    wl[selectedCid].req.topics && wl[selectedCid].req.topics.length && {label:'주제', v:wl[selectedCid].req.topics.slice(0,2).join('/')},
                  ].filter(Boolean).map(function(item){
                    return <span key={item.label} style={{fontSize:11,padding:'2px 9px',borderRadius:99,background:'var(--indigo-g)',border:'1px solid var(--indigo)',color:'var(--indigo-2)'}}>{item.label}: {item.v}</span>;
                  })}

              )}
            </div>
          )}
          <div className="sec-label" style={{marginBottom:8}}>인삿말</div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:14}}>
            {GREETING_OPTS.map(function(g){return(
              <button key={g.k} type="button" onClick={function(){setGreeting(g.k);}}
                style={{padding:'7px 12px',borderRadius:99,border:'1px solid '+(greeting===g.k?'var(--indigo)':'var(--border-2)'),background:greeting===g.k?'var(--indigo-g)':'transparent',cursor:'pointer',transition:'all .15s',color:greeting===g.k?'var(--indigo-2)':'var(--cream-2)',fontFamily:'Noto Sans KR,sans-serif',fontSize:12,fontWeight:greeting===g.k?600:400}}>
                {g.k} <span style={{fontSize:10,opacity:.7}}>— {g.d}</span>
              </button>
            );})}
          </div>
          <div className="sec-label" style={{marginBottom:8}}>메일 어조</div>
          <div style={{display:'flex',gap:8,marginBottom:16}}>
            {TONE_OPTS.map(function(t){return(
              <button key={t.k} type="button" onClick={function(){setTone(t.k);}}
                style={{flex:1,padding:'9px 6px',borderRadius:10,border:'1px solid '+(tone===t.k?'var(--indigo)':'var(--border-2)'),background:tone===t.k?'var(--indigo-g)':'transparent',cursor:'pointer',transition:'all .15s',color:tone===t.k?'var(--indigo-2)':'var(--cream-2)',fontFamily:'Noto Sans KR,sans-serif'}}>
                <div style={{fontWeight:600,fontSize:13}}>{t.k}</div>
                <div style={{fontSize:10,marginTop:2,opacity:.8}}>{t.d}</div>
              </button>
            );})}
          </div>
          <div style={{marginBottom:12}}>
            <div className="sec-label" style={{marginBottom:4}}>제목</div>
            <input className="field" value={subject} onChange={function(e){setSubject(e.target.value);}}
              style={{width:'100%',boxSizing:'border-box',fontSize:13}}/>
          </div>
          <div>
            <div className="sec-label" style={{marginBottom:4}}>본문</div>
            <textarea className="field" value={body} onChange={function(e){setBody(e.target.value);}}
              style={{width:'100%',boxSizing:'border-box',fontSize:12,lineHeight:1.75,minHeight:280,resize:'vertical',fontFamily:'inherit',whiteSpace:'pre-wrap'}}/>
          </div>
        </div>
        {/* 하단 버튼 */}
        <div style={{padding:'14px 24px',borderTop:'1px solid var(--border)',display:'flex',gap:8,flexShrink:0}}>

            style={{flex:1,padding:'11px',borderRadius:10,border:'1px solid var(--border-2)',background:'var(--glass)',color:copied?'#34D399':'var(--cream-2)',cursor:'pointer',fontSize:13,fontWeight:500,fontFamily:'Noto Sans KR,sans-serif',transition:'all .15s'}}>
            {copied?'✅ 복사됨':'📋 복사'}
          </button>
          <button onClick={openGmail} className="btn-cta"
            style={{flex:2,padding:'11px',borderRadius:10,fontSize:13,fontWeight:600,fontFamily:'Noto Sans KR,sans-serif'}}>
            Gmail로 열기 →
          </button>
        </div>
      </div>
    </div>
  );
}
