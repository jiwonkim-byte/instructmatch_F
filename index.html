                    >특이사항에 추가</button>
                  )}
                </div>
                {salesmapData && salesmapData.memos.length > 0 && (
                  <div style={{padding:'8px 12px',background:'rgba(255,255,255,.02)',display:'grid',gap:5}}>
                    {salesmapData.memos.map(function(m,i){return(
                      <div key={i} style={{fontSize:12,lineHeight:1.6,color:'var(--cream-2)',display:'flex',gap:6,alignItems:'flex-start'}}>
                        <span style={{color:'#34D399',flexShrink:0,marginTop:1}}>·</span>
                        <span>{m.content}{m.createdAt && <span style={{color:'var(--cream-3)',fontSize:10,marginLeft:5}}>{m.createdAt}</span>}</span>
                      </div>
                    );})}
                  </div>
                )}
                {salesmapData && salesmapData.memos.length === 0 && (
                  <div style={{padding:'8px 12px',fontSize:12,color:'var(--cream-3)'}}>메모 없음</div>
                )}
              </div>
            )}
            <label style={{display:'flex',alignItems:'center',gap:8,fontSize:13,cursor:'pointer',marginBottom:8,color:'var(--cream-2)'}}>
              <input type="checkbox" checked={fields.recordingRequired} onChange={e=>set1('recordingRequired',e.target.checked)} style={{width:'auto'}}/>
              녹화 필요 (해당 강사 필터에 반영)
            </label>
            <textarea className="field" value={fields.notes} onChange={e=>set1('notes',e.target.value)}
              style={{resize:'none',minHeight:80}} placeholder="PDF에서 자동 추출됩니다. 직접 추가 입력도 가능&#10;예) 녹화 불가, NDA 서약 필요, 자사 사례 커리큘럼 반영, 사전 미팅 필요"/>
            {/* AI 추출 강사 사전 요청사항 */}
            {parsed && parsed.requests && parsed.requests.length > 0 && (
              <div style={{marginTop:8,padding:'10px 12px',borderRadius:10,background:'rgba(251,191,36,.07)',border:'1px solid rgba(251,191,36,.2)'}}>
                <div style={{fontSize:10,fontWeight:700,letterSpacing:.7,color:'#FBBF24',textTransform:'uppercase',marginBottom:6}}>📋 강사 사전 요청사항 (AI 추출)</div>
                {parsed.requests.map(function(r,i){return(
                  <div key={i} style={{display:'flex',gap:7,alignItems:'flex-start',marginBottom:i<parsed.requests.length-1?5:0}}>
                    <span style={{color:'#FBBF24',flexShrink:0,marginTop:1}}>·</span>
                    <span style={{fontSize:12,lineHeight:1.6,color:'var(--cream-2)'}}>{r}</span>
                  </div>
                );})}
              </div>
            )}
          </div>
        </div>
      </div>
      {/* 상태 배너 */}
      {(function(){
        var isPptMulti = parsed && parsed.isMultiCourse;
        if (isPptMulti) {
          return (
            <div style={{marginBottom:8,padding:'12px 16px',borderRadius:12,background:'rgba(245,158,11,.08)',border:'1px solid rgba(245,158,11,.22)',fontSize:13,color:'#FCD34D'}}>
              <div style={{fontWeight:600,marginBottom:6}}>📚 {parsed.courses.length}개 과정 확정</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:5,marginBottom:6}}>
                {parsed.courses.map(function(c,i){return(
                  <span key={i} style={{fontSize:11,padding:'2px 10px',borderRadius:99,background:'rgba(245,158,11,.15)',border:'1px solid rgba(245,158,11,.35)',color:'#FCD34D',fontWeight:600}}>
                    {c.courseName || ('과정 '+(i+1))}{c.totalHours?(' '+c.totalHours+'h'):''}
                  </span>
                );})}
              </div>
              <div style={{fontSize:12,opacity:.85}}>
                {instructorMode==='one' ? '모든 과정 요건을 통합해 강사 1명을 추천합니다.' : '각 과정별로 최적 강사를 별도 추천합니다.'}
              </div>
            </div>
          );
        }
        if (courseMode==='multi' && !isPptMulti && fields.topics.length === 0) {
          return (
            <div className="warn-info" style={{marginBottom:8,textAlign:'center'}}>
              ⚠️ 파일을 업로드하거나 교육 주제를 1개 이상 선택해주세요
            </div>
          );
        }
        if (fields.topics.length === 0) {
          return (
            <div className="warn-info" style={{marginBottom:8,textAlign:'center'}}>
              ⚠️ 교육 주제를 1개 이상 선택해야 강사 추천이 가능합니다
            </div>
          );
        }
        return null;
      })()}

      <button className="btn-cta"
        disabled={(function(){
          var isPptMulti = parsed && parsed.isMultiCourse;
          if (isPptMulti) return false;
          return fields.topics.length === 0;
        })()}
        onClick={function(){
          var isPptMulti = parsed && parsed.isMultiCourse;
          var baseFields = Object.assign({}, fields);
          if (isOurCompany(baseFields.companyName||'')) baseFields.companyName = '';
          var effDate = dateUndecided ? '' : (scheduleDates.length ? scheduleDates[0] : date);
          var effDates = scheduleDates.length ? scheduleDates : (date ? [date] : []);
          if (audienceOther && baseFields.jobCategories.includes('기타')) {
            baseFields.audienceOtherText = audienceOther;
          }
          if (traitOther && baseFields.requiredInstructorTraits.includes('기타')) {
            baseFields.traitOtherText = traitOther;
          }

          if (isPptMulti) {
            if (instructorMode==='one') {
              var allTopics = Array.from(new Set([].concat.apply([], parsed.courses.map(function(c){return c.topics||[];}))));
              var sumHours = parsed.courses.reduce(function(s,c){return s+(c.totalHours||0);},0);
              var merged = Object.assign({}, parsed.courses[0], baseFields, {
                topics: allTopics.length ? allTopics : baseFields.topics,
                totalHours: sumHours || baseFields.totalHours,
                courseName: parsed.courses.map(function(c){return c.courseName||c.companyName;}).filter(Boolean).join(' + '),
                isMultiCourse: false,
                date: effDate,
                dates: effDates,
                scheduleMode: dateUndecided ? 'flexible' : 'fixed',
              });
              onSubmit(merged);
            } else {
              onSubmit(Object.assign({}, parsed, {date: effDate, dates: effDates, scheduleMode: dateUndecided ? 'flexible' : 'fixed'}));
            }
          } else {
            onSubmit(Object.assign({}, baseFields, {date: effDate, dates: effDates, scheduleMode: dateUndecided ? 'flexible' : 'fixed'}));
          }
        }}
        style={{width:'100%',padding:'15px',borderRadius:13,fontSize:15,fontWeight:600,letterSpacing:.3}}>
        {(function(){
          if (parsed && parsed.isMultiCourse) {
            return instructorMode==='one' ? '강사 1명 통합 추천 받기 →' : '과정별 강사 추천 받기 →';
          }
          if (courseMode==='multi') {
            return instructorMode==='one' ? '강사 1명 통합 추천 받기 →' : '과정별 강사 추천 받기 →';
          }
          return '강사 추천 받기 →';
        })()}
      </button>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   SINGLE COURSE RESULT PANEL (reused inside ResultsSection)
═══════════════════════════════════════════════════════ */
function SingleCoursePanel({passed, filtered, schedFiltered, req, onDetail}) {
  schedFiltered = schedFiltered || [];
  const capped = passed.slice(0,10);
  const top = capped.slice(0,3), rest = capped.slice(3);
  var ftPassed = passed.filter(function(r){return r.inst.isFullTime && r.inst.scheduleStatus !== '불가';});
  return (
    <div>
      {ftPassed.length > 0 && (
        <div style={{marginBottom:16,padding:'10px 16px',borderRadius:12,background:'rgba(255,56,92,0.08)',border:'1px solid rgba(255,56,92,0.25)',display:'flex',alignItems:'center',gap:10,fontSize:12}}>
          <span style={{color:'var(--indigo-2)',fontWeight:700}}>★ 전임 강사 우선</span>
          <span style={{color:'var(--cream-3)'}}>일정 가능한 전임 강사 {ftPassed.length}명이 상위에 배치되었습니다.</span>
        </div>
      )}
      {passed.length===0 ? (
        <div className="glass" style={{borderRadius:18,padding:'36px 32px',textAlign:'center'}}>
          <div style={{fontSize:36,marginBottom:12}}>🔍</div>
          <div style={{color:'var(--cream-2)',fontSize:14,fontWeight:600,marginBottom:10}}>조건에 맞는 강사를 찾지 못했습니다</div>
          {filtered.length > 0 && (
            <div style={{textAlign:'left',maxWidth:400,margin:'0 auto',display:'grid',gap:5}}>
              {Object.entries(filtered.reduce(function(acc,f){var r=f.reason.split(':')[0].trim();acc[r]=(acc[r]||0)+1;return acc;},{})).map(function([r,n]){return(
                <div key={r} style={{fontSize:12,color:'var(--cream-3)',padding:'6px 12px',background:'rgba(255,255,255,.03)',borderRadius:8,border:'1px solid var(--border)'}}>
                  <span style={{color:'var(--cream-2)',fontWeight:600}}>{r}</span> 사유로 {n}명 탈락
                </div>
              );})}
            </div>
          )}
        </div>
      ) : (
        <>
          <div style={{marginBottom:6,fontSize:12,color:'var(--cream-3)'}}>
            추천 강사 <span style={{color:'var(--indigo-2)',fontWeight:700}}>{capped.length}</span>명{passed.length>10&&<span style={{fontWeight:400}}> (상위 10명)</span>}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(240px,1fr))',gap:14,marginBottom:20}}>
            {top.map((r,i)=><TopCard key={r.inst.id} result={r} rank={i+1} onDetail={function(res){onDetail(res,'results_top');}}/>)}
          </div>
          {rest.length>0 && (
            <div>
              <div style={{fontSize:10,fontWeight:700,letterSpacing:1.5,textTransform:'uppercase',color:'var(--cream-3)',marginBottom:10}}>추가 후보</div>
              <div style={{display:'grid',gap:7}}>
                {rest.map(r=><CandidateRow key={r.inst.id} result={r} onDetail={function(res){onDetail(res,'results_rest');}}/>)}
              </div>
            </div>
          )}
        </>
      )}
      {schedFiltered.length > 0 && (
        <details style={{marginTop:10}}>
          <summary style={{cursor:'pointer',userSelect:'none',padding:'10px 14px',borderRadius:10,background:'rgba(251,191,36,.06)',border:'1px solid rgba(251,191,36,.25)',display:'flex',alignItems:'center',gap:8,listStyle:'none',WebkitAppearance:'none'}}>
            <span style={{fontSize:12,fontWeight:700,color:'#FBBF24'}}>📅 일정 불가 강사</span>
            <span style={{fontSize:11,color:'var(--cream-3)',flex:1}}>{schedFiltered.length}명 — 일정 충돌, 주제는 적합</span>
            <span style={{fontSize:11,color:'#FBBF24'}}>▼</span>
          </summary>
          <div style={{marginTop:6,display:'grid',gap:6}}>
            {schedFiltered.map(function(sf, i) {
              var inst = sf.inst;
              var busyEntries = inst.calendar || [];
              var conflictDate = req && req.date;
              var conflictEntries = conflictDate
                ? busyEntries.filter(function(c){ return c.date === conflictDate; })
                : busyEntries.filter(function(c){ return c.status === '확정'; }).slice(0, 3);
              return (
                <div key={i} style={{padding:'10px 13px',borderRadius:10,background:'rgba(251,191,36,.04)',border:'1px solid rgba(251,191,36,.18)',display:'grid',gap:6,cursor:'pointer'}} onClick={function(){onDetail(sf,'schedFiltered');}}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8}}>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <span style={{fontSize:18}}>{inst.photo}</span>
                      <div>
                        <div style={{display:'flex',alignItems:'center',gap:6}}>
                          <span style={{fontSize:13,fontWeight:700,color:'var(--cream)'}}>{inst.name}</span>
                          {inst.isFullTime && <span style={{fontSize:10,padding:'1px 6px',borderRadius:99,background:'rgba(255,56,92,.18)',border:'1px solid rgba(255,56,92,.4)',color:'var(--indigo-2)',fontWeight:700}}>★ 전임</span>}
                        </div>
                        <div style={{fontSize:11,color:'#FBBF24'}}>⚠ {sf.reason}</div>
                      </div>
                    </div>
                    <div style={{fontFamily:'Outfit,sans-serif',fontSize:14,fontWeight:700,color:'var(--indigo-2)'}}>{sf.total}<span style={{fontSize:9,opacity:.6}}>/100</span></div>
                  </div>
                  {conflictEntries.length > 0 && (
                    <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                      {conflictEntries.map(function(c, ci){return(
                        <span key={ci} style={{fontSize:10,padding:'2px 8px',borderRadius:99,background:'rgba(248,113,113,.12)',border:'1px solid rgba(248,113,113,.3)',color:'#f87171',fontWeight:600}}>
                          {c.date}{c.note?' · '+c.note:''}
                        </span>
                      );})}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </details>
      )}
      {filtered.length>0 && (
        <details style={{marginTop:6}}>
          <summary style={{fontSize:11,color:'var(--cream-3)',cursor:'pointer',padding:'6px 0',userSelect:'none'}}>▶ 필터 탈락 강사 ({filtered.length}명)</summary>
          <div style={{marginTop:6,display:'grid',gap:5}}>

function DBTab({req, onGoCalendar}) {
  const [q, setQ] = useState('');
  const [topicF, setTopicF] = useState('');
  const [audF, setAudF] = useState('');
  const [hasEduOnly, setHasEduOnly] = useState(false);
  const [within3m, setWithin3m] = useState(false);
  const [within6m, setWithin6m] = useState(false);
  const [highSat, setHighSat] = useState(false);
  const [clientF, setClientF] = useState('');
  const [sortBy, setSortBy] = useState('recent'); // recent|score|edu|name
  const [detail, setDetail] = useState(null);
  const [emailTarget, setEmailTarget] = useState(null);

  var getHistory = function(inst) {
    if (inst.educationHistory && inst.educationHistory.length > 0) return inst.educationHistory;
    return (inst.industryExp || []).map(function(c) { return {client: c, count: 1, year: '', course: ''}; });
  };

  var hasAnyHistory = function(inst) {
    return (inst.educationHistory && inst.educationHistory.length > 0)
        || (inst.industryExp && inst.industryExp.length > 0);
  };

  // 가장 최근 출강 날짜 반환 (Date 객체)
  var getMostRecentDate = function(inst) {
    var hist = getHistory(inst);
    var dates = hist.map(function(h) {
      if (h.period) {
        var m = h.period.match(/(\d{4})[.\-\/](\d{1,2})[.\-\/](\d{1,2})/);
        if (m) return new Date(parseInt(m[1]), parseInt(m[2])-1, parseInt(m[3]));
      }
      if (h.year) {
        var y = parseInt(h.year);
        if (!isNaN(y)) return new Date(y, 11, 31);
      }
      return null;
    }).filter(Boolean);
    if (!dates.length) return null;
    return new Date(Math.max.apply(null, dates.map(function(d){return d.getTime();})));
  };

  var getMostRecentLabel = function(inst) {
    var d = getMostRecentDate(inst);
    if (!d) return null;
    var now = new Date();
    var diffMs = now - d;
    var diffDays = Math.floor(diffMs / 86400000);
    if (diffDays < 0) return '미래';
    if (diffDays <= 30) return '이번 달';
    if (diffDays <= 90) return Math.floor(diffDays/30)+'개월 전';
    if (diffDays <= 365) return Math.floor(diffDays/30)+'개월 전';
    return d.getFullYear()+'년 '+String(d.getMonth()+1)+'월';
  };

  var now = new Date();
  var ms3m = 90 * 86400000;
  var ms6m = 180 * 86400000;

  const getMatchBadge = function(inst) {
    if (!q) return null;
    var lq = q.toLowerCase();
    var hist = getHistory(inst);
    var match = hist.find(function(h){return h.client.toLowerCase().indexOf(lq)>-1;});
    if (match) return match.client.length > 14 ? match.client.slice(0,14)+'…' : match.client;
    return null;
  };

  var base = INSTRUCTORS.filter(function(i) {
    var lq = q.toLowerCase();
    var lcf = clientF.toLowerCase();
    var hist = getHistory(i);
    var clientMatch = !clientF || hist.some(function(h){return h.client.toLowerCase().indexOf(lcf)>-1;})
      || (i.industryExp||[]).some(function(c){return c.toLowerCase().indexOf(lcf)>-1;});
    var allTags = (i.specialties||[]).concat(i.category||[]).concat(i.lectureTopics||[]);
    var textMatch = !q || i.name.toLowerCase().indexOf(lq)>-1
      || allTags.some(function(t){return t.toLowerCase().indexOf(lq)>-1;})
      || hist.some(function(h){return h.client.toLowerCase().indexOf(lq)>-1;})
      || (i.industryExp||[]).some(function(c){return c.toLowerCase().indexOf(lq)>-1;});
    if (!textMatch) return false;
    if (topicF && !topicMatchesFull(i, [topicF])) return false;
    if (audF && i.jobCategories.indexOf(audF) === -1) return false;
    if (!clientMatch) return false;
    if (hasEduOnly && !hasAnyHistory(i)) return false;
    if (within3m || within6m) {
      var d = getMostRecentDate(i);
      if (!d) return false;
      var diff = now - d;
      if (within3m && diff > ms3m) return false;
      if (within6m && diff > ms6m) return false;
    }
    if (highSat) {
      var recs = i.satisfactionRecords || [];
      var avg2 = recs.length ? avgOf(recs.map(function(r){return r.score;})) : 0;
      if (avg2 < 4.3) return false;
    }
    return true;
  });

  var filtered = base.slice().sort(function(a, b) {
    if (sortBy === 'recent') {
      var da = getMostRecentDate(a), db2 = getMostRecentDate(b);
      var ta = da ? da.getTime() : 0, tb = db2 ? db2.getTime() : 0;
      return tb - ta;
    }
    if (sortBy === 'score') {
      var aA = a.satisfactionRecords.length ? avgOf(a.satisfactionRecords.map(function(r){return r.score;})) : 0;
      var bA = b.satisfactionRecords.length ? avgOf(b.satisfactionRecords.map(function(r){return r.score;})) : 0;
      return bA - aA;
    }
    if (sortBy === 'edu') {
      return getHistory(b).length - getHistory(a).length;
    }
    return a.name.localeCompare(b.name, 'ko');
  });

  var activeFilters = (topicF?1:0)+(audF?1:0)+(hasEduOnly?1:0)+(within3m?1:0)+(within6m?1:0)+(highSat?1:0)+(clientF?1:0);

  var CHIP_STYLE = function(on) { return {
    padding:'5px 13px', borderRadius:99, fontSize:12, fontWeight:600,
    border:'1px solid '+(on?'var(--indigo)':'var(--border-2)'),
    background:on?'var(--indigo-g)':'transparent',
    color:on?'var(--indigo-2)':'var(--cream-3)',
    cursor:'pointer', transition:'all .15s', fontFamily:'Noto Sans KR,sans-serif'
  };};

  return (
    <div style={{maxWidth:860,margin:'0 auto'}}>
      {/* ── 검색 + 필터 패널 ── */}
      <div className="glass au" style={{borderRadius:18,padding:'18px 20px',marginBottom:14}}>
        <input value={q} onChange={function(e){setQ(e.target.value);}} className="field"
          placeholder="강사명 · 강의 주제 · 고객사명 검색…" style={{marginBottom:12}}/>
        {/* 빠른 필터 칩 */}
        <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:12,alignItems:'center'}}>
          <button onClick={function(){setHasEduOnly(function(v){return !v;});}} style={CHIP_STYLE(hasEduOnly)}>🎓 출강 이력 있음</button>
          <button onClick={function(){setWithin3m(function(v){return !v;}); setWithin6m(false);}} style={CHIP_STYLE(within3m)}>🔥 3개월 내 출강</button>
          <button onClick={function(){setWithin6m(function(v){return !v;}); setWithin3m(false);}} style={CHIP_STYLE(within6m)}>📆 6개월 내 출강</button>
          <button onClick={function(){setHighSat(function(v){return !v;});}} style={CHIP_STYLE(highSat)}>⭐ 만족도 4.3+</button>
          {activeFilters > 0 && (
            <button onClick={function(){setTopicF('');setAudF('');setHasEduOnly(false);setWithin3m(false);setWithin6m(false);setHighSat(false);setClientF('');}}

              ✕ 초기화
            </button>

        {/* 드롭다운 필터 행 */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr auto',gap:8,alignItems:'end'}}>

            <div className="sec-label" style={{marginBottom:4}}>강의 주제</div>
            <select value={topicF} onChange={function(e){setTopicF(e.target.value);}} className="field">
              <option value="">전체 주제</option>{ALL_TOPICS.map(function(t){return <option key={t}>{t}</option>;})}
            </select>
          </div>
          <div>
            <div className="sec-label" style={{marginBottom:4}}>수강생 직군</div>
            <select value={audF} onChange={function(e){setAudF(e.target.value);}} className="field">
              <option value="">전체 직군</option>{ALL_AUDIENCES.map(function(a){return <option key={a}>{a}</option>;})}
            </select>
          </div>
          <div>
            <div className="sec-label" style={{marginBottom:4}}>고객사 검색</div>
            <input className="field" value={clientF} onChange={function(e){setClientF(e.target.value);}} placeholder="예: 삼성, LG"/>
          </div>
          <div>
            <div className="sec-label" style={{marginBottom:4}}>정렬</div>
            <select value={sortBy} onChange={function(e){setSortBy(e.target.value);}} className="field">

              <option value="edu">출강 횟수순</option>
              <option value="score">만족도순</option>

          var hist = getHistory(inst);
          var histCount = hist.length;
          var recentLabel = getMostRecentLabel(inst);

            <div key={inst.id} className="glass au"

              onMouseLeave={function(e){e.currentTarget.style.borderColor='var(--border)';}}>

              {/* 상단 바: 이름 + 핵심 수치 */}

                  <div style={{display:'flex',alignItems:'center',gap:7,flexWrap:'wrap'}}>

                        );})}

                      <span key={s} style={{fontSize:11,padding:'2px 9px',borderRadius:99,background:'var(--indigo-g)',border:'1px solid var(--indigo)',color:'var(--indigo-2)',fontWeight:600}}>{s}</span>
                    );})}
                  </div>
                </div>
                {/* 액션 버튼 */}
                <div style={{display:'flex',flexDirection:'column',gap:5,flexShrink:0}} onClick={function(e){e.stopPropagation();}}>
                  <button onClick={function(){setEmailTarget(inst);sendLog({event_type:'email_draft',instructor_name:inst.name,details:'db'});}}
                    style={{fontSize:11,padding:'5px 12px',borderRadius:8,fontWeight:700,background:'var(--indigo-g)',border:'1px solid var(--indigo)',color:'var(--indigo-2)',cursor:'pointer',fontFamily:'Noto Sans KR,sans-serif',whiteSpace:'nowrap'}}

                    style={{fontSize:11,padding:'5px 12px',borderRadius:8,fontWeight:700,background:'rgba(251,191,36,.1)',border:'1px solid rgba(251,191,36,.35)',color:'#FBBF24',cursor:'pointer',fontFamily:'Noto Sans KR,sans-serif',whiteSpace:'nowrap'}}

                      onMouseEnter={function(e){e.currentTarget.style.borderColor='var(--indigo)';}}
                      onMouseLeave={function(e){e.currentTarget.style.borderColor='var(--border-2)';}}>📁 Drive</a>
                  )}
                </div>
              </div>

              {/* 핵심 수치 3칸 */}
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',borderTop:'1px solid var(--border)',borderBottom:'1px solid var(--border)'}}>
                <div style={{padding:'10px 14px',textAlign:'center',borderRight:'1px solid var(--border)'}}>
                  <div style={{fontFamily:'Outfit,sans-serif',fontSize:17,fontWeight:700,color:'var(--indigo-2)',lineHeight:1.1}}>
                    {inst.pricePerHour ? (inst.pricePerHour/10000).toFixed(0) : '—'}
                    {inst.pricePerHour && <span style={{fontSize:11,opacity:.7}}> 만원/h</span>}
                  </div>
                  <div style={{fontSize:10,color:'var(--cream-3)',marginTop:3,fontWeight:600}}>강사료{inst.negotiable?' (협의)':''}</div>
                </div>
                <div style={{padding:'10px 14px',textAlign:'center',borderRight:'1px solid var(--border)'}}>
                  <div style={{fontFamily:'Outfit,sans-serif',fontSize:15,fontWeight:700,color:recentLabel?'var(--cream)':'var(--cream-3)',lineHeight:1.1}}>
                    {recentLabel || '기록 없음'}
                  </div>
                  <div style={{fontSize:10,color:'var(--cream-3)',marginTop:3,fontWeight:600}}>최근 출강</div>
                </div>
                <div style={{padding:'10px 14px',textAlign:'center'}}>
                  {avg ? (
                    <>
                      <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:4}}>
                        <span style={{color:'var(--amber)',fontSize:14}}>★</span>
                        <span style={{fontFamily:'Outfit,sans-serif',fontSize:17,fontWeight:700,color:avg>=4.3?'#34D399':avg>=3.8?'var(--amber)':'#f87171'}}>{avg.toFixed(1)}</span>
                      </div>
                      <div style={{fontSize:10,color:'var(--cream-3)',marginTop:3,fontWeight:600}}>만족도 ({recs.length}건)</div>
                    </>
                  ) : (
                    <>
                      <div style={{fontSize:15,fontWeight:700,color:'var(--cream-3)'}}>—</div>
                      <div style={{fontSize:10,color:'var(--cream-3)',marginTop:3,fontWeight:600}}>만족도 없음</div>
                    </>
                  )}
                </div>
              </div>

              {/* 출강 이력 스크롤 */}
              {histCount > 0 && (
                <div style={{padding:'8px 14px 10px'}} onClick={function(e){e.stopPropagation();}}>
                  <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:5}}>
                    <span style={{fontSize:10,fontWeight:700,letterSpacing:.8,textTransform:'uppercase',color:'var(--cream-3)'}}>출강 이력 {histCount}건</span>
                    {histCount > 5 && <span style={{fontSize:10,color:'var(--cream-3)'}}>→ 스크롤</span>}
                  </div>
                  <div style={{overflowX:'auto',display:'flex',gap:5,paddingBottom:2,WebkitOverflowScrolling:'touch'}}>
                    {hist.map(function(h, hi){
                      var label = h.client.length > 18 ? h.client.slice(0,18)+'…' : h.client;
                      return (
                        <span key={hi} style={{flexShrink:0,fontSize:11,padding:'3px 10px',borderRadius:99,background:'rgba(16,185,129,.07)',border:'1px solid rgba(16,185,129,.18)',color:'#34D399',whiteSpace:'nowrap'}}>
                          {h.year && <span style={{opacity:.6,marginRight:3,fontFamily:'Outfit,sans-serif'}}>{h.year}</span>}{label}
                        </span>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* 모니터링 특이사항 */}
              {(function(){
                var monRecs = inst.monitoringRecords || [];
                var items = [];
                monRecs.forEach(function(m) {
                  if (m.weaknesses && m.weaknesses.trim()) items.push({label:'유의', text:m.weaknesses, course:m.course});
                  if (m.issue && m.issue.trim()) items.push({label:'이슈', text:m.issue, course:m.course});
                });
                if (!items.length) return null;
                return (
                  <div style={{padding:'8px 14px 10px',borderTop:'1px solid var(--border)'}} onClick={function(e){e.stopPropagation();}}>
                    <div style={{fontSize:10,fontWeight:700,letterSpacing:.8,color:'#FCD34D',marginBottom:5}}>⚠ 모니터링 특이사항</div>
                    <div style={{display:'flex',flexDirection:'column',gap:4}}>
                      {items.map(function(item, ii){
                        return (
                          <div key={ii} className="warn-info" style={{fontSize:11,display:'flex',gap:6,alignItems:'flex-start'}}>
                            <span style={{flexShrink:0,fontWeight:700,opacity:.8}}>[{item.label}]</span>
                            <span style={{flex:1,lineHeight:1.5}}>{item.text}{item.course && <span style={{opacity:.55,marginLeft:5}}>({item.course})</span>}</span>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })()}
            </div>
          );
        })}
        {!filtered.length && (
          <div className="glass" style={{borderRadius:16,padding:'60px',textAlign:'center'}}>
            <div style={{fontSize:36,marginBottom:12}}>🔍</div>
            <div style={{color:'var(--cream-3)',marginBottom:8}}>검색 결과가 없습니다</div>
            {activeFilters > 0 && <div style={{fontSize:12,color:'var(--cream-3)'}}>필터를 초기화하거나 조건을 바꿔보세요</div>}
          </div>
        )}
      </div>
      {detail && (
        <div className="m-overlay ai" onClick={()=>setDetail(null)}>
          <div className="glass-b as" onClick={e=>e.stopPropagation()}
            style={{width:'100%',maxWidth:500,margin:'0 16px',borderRadius:22,maxHeight:'88vh',overflowY:'auto',padding:'24px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
              <div style={{display:'flex',alignItems:'center',gap:12}}>

                <div>
                  <div style={{fontFamily:'Outfit,sans-serif',fontSize:18,fontWeight:600}}>{detail.name} 강사</div>
                  <div style={{fontSize:11,color:'var(--cream-3)',marginTop:2}}>{detail.contractType} · {detail.recordingAllowed?'녹화 가능':'녹화 불가'} · {detail.scheduleStatus}</div>
                </div>
              </div>
              <button onClick={()=>setDetail(null)} className="nav-ghost" style={{fontSize:20}}>✕</button>
            </div>
            <div style={{background:'var(--indigo-g)',border:'1px solid var(--indigo)',borderRadius:12,padding:'14px 16px',marginBottom:16}}>
              <div style={{fontFamily:'Outfit,sans-serif',fontSize:22,fontWeight:700,color:'var(--indigo-2)'}}>{detail.pricePerHour?(detail.pricePerHour/10000).toFixed(0):<span>-</span>}<span style={{fontSize:13}}>만원/h</span></div>

            </div>
            <div style={{marginBottom:14}}>
              <div className="sec-label">카테고리 / 강의 주제</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                {(detail.category||[]).map(s=><span key={'cat_'+s} style={{fontSize:12,padding:'4px 11px',borderRadius:99,background:'var(--indigo-g)',border:'1px solid var(--indigo)',color:'var(--indigo-2)',fontWeight:700}}>{s}</span>)}
                {(detail.lectureTopics||[]).map(s=><span key={'lt_'+s} style={{fontSize:12,padding:'4px 11px',borderRadius:99,background:'rgba(255,255,255,.05)',border:'1px solid var(--border-2)',color:'var(--cream-2)'}}>{s}</span>)}
                {!(detail.category||[]).length && !(detail.lectureTopics||[]).length && (detail.specialties||[]).map(s=><span key={s} style={{fontSize:12,padding:'4px 11px',borderRadius:99,background:'var(--indigo-g)',border:'1px solid var(--indigo)',color:'var(--indigo-2)'}}>{s}</span>)}

                  <div style={{marginBottom:14}}>

                      <div style={{display:'flex',alignItems:'center',gap:7}}>
                        <span style={{fontSize:12,fontWeight:600}}>출강 이력</span>

                {(detail.satisfactionRecords||[]).map(function(r,i){return(
                  <div key={i} style={{fontSize:11,padding:'5px 10px',background:'rgba(255,255,255,.03)',borderRadius:7,border:'1px solid var(--border)'}}>

                      <span style={{color:'var(--cream-3)'}}>{r.date} · {r.topic}</span>
                      <span style={{color:'var(--amber)',fontFamily:'Outfit,sans-serif',fontWeight:700}}>★{r.score}</span>
                    </div>

                  </div>
                );})}
                {(detail.satisfactionRecords||[]).length===0 && <div style={{fontSize:11,color:'var(--cream-3)',padding:'6px 2px'}}>만족도 데이터 없음</div>}

// ── 날짜 정규화 ────────────────────────────────────
function normalizeDate(raw) {
  if (!raw) return '';
  var s = String(raw).trim();
  // Excel serial number (숫자)
  if (/^\d{4,5}$/.test(s)) {
    var d = new Date(Math.round((parseFloat(s) - 25569) * 86400 * 1000));
    if (!isNaN(d)) return d.toISOString().slice(0,10);
  }
  // YYYY. MM. DD (마침표 뒤 공백 허용 — 한국식 날짜 형식)
  var m = s.match(/(\d{4})\.\s*(\d{1,2})\.\s*(\d{1,2})/);
  if (m) return m[1]+'-'+m[2].padStart(2,'0')+'-'+m[3].padStart(2,'0');
  // YYYY-MM-DD / YYYY/MM/DD
  m = s.match(/(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/);
  if (m) return m[1]+'-'+m[2].padStart(2,'0')+'-'+m[3].padStart(2,'0');
  // YYYY년 M월 D일
  m = s.match(/(\d{4})년\s*(\d{1,2})월\s*(\d{1,2})일/);
  if (m) return m[1]+'-'+m[2].padStart(2,'0')+'-'+m[3].padStart(2,'0');
  return '';
}

// ── 상태 정규화 ────────────────────────────────────
function normalizeStatus(raw) {
  if (!raw) return '확정';
  var s = raw.trim();
  if (/확정|confirm/i.test(s)) return '확정';
  if (/논의|협의|pending|검토/i.test(s)) return '논의 중';
  if (/불가|cancel|취소/i.test(s)) return '불가';
  return s || '확정';
}

// ── 강사 ID 조회 (이름 or ID로) ────────────────────
function resolveInstId(nameOrId) {
  if (!nameOrId) return null;
  var s = nameOrId.trim();
  var byId   = INSTRUCTORS.find(function(i){ return i.id === s; });
  if (byId) return byId.id;
  var byName = INSTRUCTORS.find(function(i){ return i.name === s || i.name.includes(s) || s.includes(i.name); });
  if (byName) return byName.id;
  return null;
}

// ── 엑셀/CSV rows → {instId: [{date,status}]} ─────
// 컬럼명 우선순위: 강사ID > 강사명 / 날짜 / 상태
function rowsToScheduleMap(rows) {
  if (!rows || rows.length < 2) return {};
  var header = rows[0].map(function(h){ return String(h||'').trim(); });
  var findCol = function() {
    var cands = Array.prototype.slice.call(arguments);
    for (var c=0;c<cands.length;c++) {
      for (var h=0;h<header.length;h++) {
        if (header[h].toLowerCase().includes(cands[c].toLowerCase())) return h;
      }
    }
    return -1;
  };
  var colId     = findCol('강사id','강사 id','id');
  var colName   = findCol('강사명','강사 이름','이름','name');
  var colDate   = findCol('날짜','일자','date','일정');
  var colStatus = findCol('상태','status','일정상태');
  var colNote   = findCol('비고','메모','note','remark');

  if (colDate < 0) return null; // 날짜 컬럼 없으면 실패

  var map = {};
  rows.slice(1).forEach(function(row) {
    var rawDate = String(row[colDate] || '').trim();
    var date = normalizeDate(rawDate);
    if (!date) return;
    var status = normalizeStatus(colStatus >= 0 ? String(row[colStatus]||'') : '');
    var instId   = colId   >= 0 ? resolveInstId(String(row[colId]  ||'')) : null;
    var instName = colName >= 0 ? resolveInstId(String(row[colName]||'')) : null;
    var key = instId || instName || '__unknown__';
    if (!map[key]) map[key] = [];
    map[key].push({date, status});
  });
  return map;
}

// ── CSV 텍스트 → rows ──────────────────────────────
function csvToRows(text) {
  return text.trim().split(/\r?\n/).map(function(line) {
    // 쉼표 구분, 쌍따옴표 처리
    var result = [], cur = '', inQ = false;
    for (var i=0;i<line.length;i++) {
      var ch = line[i];
      if (ch==='"') { inQ=!inQ; }
      else if (ch===',' && !inQ) { result.push(cur.trim()); cur=''; }
      else { cur += ch; }
    }
    result.push(cur.trim());
    return result;
  });
}

// ── gvizParse 결과(객체 배열) → {instId:[{date,status,note}]} ─
function gvizToScheduleMap(records) {
  var map = {};
  records.forEach(function(row) {
    // 강사 식별
    var nameOrId = row['강사ID'] || row['강사 ID'] || row['강사명'] || row['강사이름'] || row['강사'] || '';
    var id = resolveInstId(nameOrId.trim());
    if (!id) return;

    // 날짜
    var rawDate = row['날짜'] || row['교육일'] || row['일정'] || row['일자'] || row['출강일'] || '';
    var date = normalizeDate(String(rawDate).trim());
    if (!date) return;

    // 상태 — 비어있으면 "확정" 기본값
    var rawStatus = row['상태'] || row['일정상태'] || row['계약상태'] || '';
    var status = normalizeStatus(String(rawStatus).trim());

    // 비고 (고객사, 과정명 등)
    var note = (row['고객사'] || row['기업명'] || row['비고'] || row['메모'] || row['과정명'] || '').trim();
    var ld   = (row['LD'] || row['담당LD'] || row['담당자'] || row['LD담당자'] || row['매니저'] || '').trim();
    var hours = parseFloat(row['시간'] || row['교육시간'] || row['시수'] || row['강의시간'] || '') || 0;

    if (!map[id]) map[id] = [];
    // 중복 날짜 방지
    if (!map[id].some(function(e){return e.date===date;})) {
      map[id].push({date, status, note, ld, hours});
    }
  });
  return map;
}

// ── Sheets 일정 로드: GAS 우선 → gviz 폴백 ─────────
function loadSheetsSchedule(onDone) {
  if (APPS_SCRIPT_URL) {
    fetch(APPS_SCRIPT_URL + '?action=schedules')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var combined = {};
        if (Array.isArray(data) && data.length > 0) {
          data.forEach(function(s) {
            if (!s.name || !s.calendar || !s.calendar.length) return;
            combined[s.name] = s.calendar;
            var inst = INSTRUCTORS.find(function(x) { return x.name === s.name; });
            if (inst) {
              combined[inst.id] = s.calendar; // ID 키로도 저장
              if (s.calendar.some(function(e) { return e.status === '확정'; })) {
                inst.scheduleStatus = '확정';
              } else if (s.calendar.some(function(e) { return e.status === '논의 중'; }) && inst.scheduleStatus === '미확인') {
                inst.scheduleStatus = '논의 중';
              }
            }
          });
          if (onDone) onDone(combined);
        } else {
          // GAS 응답이 비어있으면 gviz 폴백
          loadSheetsScheduleViaGviz(onDone);
        }
      })
      .catch(function() { loadSheetsScheduleViaGviz(onDone); });
    return;
  }
  loadSheetsScheduleViaGviz(onDone);
}

// ── gviz 폴백 (시트 공개 설정 시만 작동) ──────────────
function loadSheetsScheduleViaGviz(onDone) {
  var promises = GVIZ_SCHED_GIDS.map(function(gid) {
    return gvizLoad(GVIZ_SCHED_ID, gid).catch(function(){ return []; });
  });
  Promise.all(promises).then(function(results) {
    var combined = {};
    results.forEach(function(records) {
      var m = gvizToScheduleMap(records);
      Object.entries(m).forEach(function([id, entries]) {
        if (!combined[id]) combined[id] = [];
        entries.forEach(function(e) {
          if (!combined[id].some(function(x){return x.date===e.date;})) combined[id].push(e);
        });
      });
    });
    Object.entries(combined).forEach(function([id, entries]) {
      var inst = INSTRUCTORS.find(function(x){return x.id===id;});
      if (!inst) return;
      combined[inst.name] = entries; // 이름 키로도 저장
      var hasConfirmed = entries.some(function(e){return e.status==='확정';});
      var hasPending   = entries.some(function(e){return e.status==='논의 중';});
      if (hasConfirmed) {
        inst.scheduleStatus = '확정';
      } else if (hasPending && inst.scheduleStatus === '미확인') {
        inst.scheduleStatus = '논의 중';
      }
    });
    if (onDone) onDone(combined);
  });
}

// ── Gmail 일정 로드 (GAS 경유) ────────────────────
function loadGmailSchedule(onDone) {
  if (!APPS_SCRIPT_URL) { if (onDone) onDone({}); return; }
  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    headers: {'Content-Type': 'text/plain'},
    body: JSON.stringify({action: 'gmail_schedules', maxDays: 60}),
  })
  .then(function(r) { return r.json(); })
  .then(function(res) {
    var map = res.schedules || {};
    Object.entries(map).forEach(function(entry) {
      var id = entry[0], entries = entry[1];
      var inst = INSTRUCTORS.find(function(x){return x.id===id;});
      if (!inst) return;
      var hasConfirmed = entries.some(function(e){return e.status==='확정';});
      var hasPending   = entries.some(function(e){return e.status==='논의 중';});
      if (hasConfirmed) inst.scheduleStatus = '확정';
      else if (hasPending && inst.scheduleStatus === '미확인') inst.scheduleStatus = '논의 중';
    });
    if (onDone) onDone(map);
  })
  .catch(function() { if (onDone) onDone({}); });
}

function CalendarTab({req, initSelInst}) {
  const [selInst, setSelInst] = useState(null);
  useEffect(function() { if (initSelInst) setSelInst(initSelInst); }, [initSelInst]);
  const [remoteCals, setRemoteCals] = useState({});
  const [loadingSchedules, setLoadingSchedules] = useState(false);
  const [syncMsg, setSyncMsg] = useState('');
  const [loadingGmail, setLoadingGmail] = useState(false);
  const [gmailMsg, setGmailMsg] = useState('');
  const [searchQ, setSearchQ]       = useState('');
  const [clickedDay, setClickedDay] = useState(null);
  const today = new Date();
  const [yr, setYr] = useState(today.getFullYear());
  const [mo, setMo] = useState(today.getMonth());

  // INJECTED_SCHEDULES merge helper
  const mergeRemote = function(map) {
    setRemoteCals(function(prev) {
      var m = Object.assign({}, prev);
      Object.entries(map).forEach(function([id, entries]) {
        if (!m[id]) m[id] = [];
        entries.forEach(function(e) {
          if (!m[id].some(function(x){return x.date===e.date;})) m[id].push(e);
        });
      });
      return m;
    });
  };

  const doSheetsSync = function() {
    setLoadingSchedules(true);
    setSyncMsg('');
    var pending = 2;
    var totalNames = 0, totalEntries = 0;
    var finish = function(names, entries) {
      totalNames += names; totalEntries += entries;
      pending--;
      if (pending <= 0) {
        setSyncMsg('Sheets 동기화 완료 — ' + totalNames + '명 · ' + totalEntries + '건');
        setLoadingSchedules(false);
        setTimeout(function(){setSyncMsg('');}, 4000);
      }
    };
    // 계약 일정 시트
    loadSheetsSchedule(function(combined) {
      mergeRemote(combined);
      var entries = Object.values(combined).reduce(function(s,v){return s+v.length;},0);
      finish(Object.keys(combined).length, entries);
    });
    // 강사별 캘린더 시트 (calendar_reader_gas.gs)
    if (APPS_SCRIPT_URL) {
      fetch(APPS_SCRIPT_URL + '?action=calendar_schedules')
        .then(function(r){return r.json();})
        .then(function(data){
          if (Array.isArray(data)) {
            var map = {};
            data.forEach(function(s){
              if (!s.name||!s.calendar||!s.calendar.length) return;
              map[s.name]=s.calendar;
              var inst=INSTRUCTORS.find(function(x){return x.name===s.name;});
              if(inst&&s.calendar.some(function(e){return e.status==='확정';})) inst.scheduleStatus='확정';
            });
            mergeRemote(map);
            var entries = Object.values(map).reduce(function(s,v){return s+v.length;},0);
            finish(Object.keys(map).length, entries);
          } else { finish(0,0); }
        }).catch(function(){ finish(0,0); });
    } else { finish(0,0); }
  };

  const doGmailSync = function() {
    if (!APPS_SCRIPT_URL) { setGmailMsg('GAS URL이 설정되지 않았습니다.'); setTimeout(function(){setGmailMsg('');},3000); return; }
    setLoadingGmail(true);

    loadGmailSchedule(function(combined) {
      mergeRemote(combined);

      if (total > 0) {
        setGmailMsg('Gmail 동기화 완료 — ' + Object.keys(combined).length + '명 · ' + total + '건');
      } else {
        setGmailMsg('새로운 일정 메일을 찾지 못했습니다.');
      }
      setLoadingGmail(false);
      setTimeout(function(){setGmailMsg('');}, 4000);
    });
  };

  // 초기 로드: INJECTED_SCHEDULES + GAS + Google Sheets
  useEffect(function() {
    if (window.INJECTED_SCHEDULES && typeof window.INJECTED_SCHEDULES === 'object') {
      mergeRemote(window.INJECTED_SCHEDULES);
    }
    // GAS 일정 (기존)

        }).catch(function(){});
    }

    });
    return [].concat(inst.calendar||[], merged);
  };

  var DAY1_KEY_NAMES = ['정백', '신동원'];

  var instList = INSTRUCTORS.filter(function(i){
    if (!searchQ) return true;
    return i.name.includes(searchQ) || (i.specialties||[]).join(',').includes(searchQ);

    '논의 중': {bg:'rgba(251,191,36,.12)',border:'rgba(251,191,36,.35)',color:'#FBBF24',label:'논의중'},

  };

  var STATUS_COLOR = {'확정':'#f87171','논의 중':'#fbbf24','불가':'#f87171'};

  return (

      <div className="glass au" style={{borderRadius:18,padding:'16px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>

          <div style={{fontFamily:'Outfit,sans-serif',fontSize:16,fontWeight:700,color:'var(--cream)',marginBottom:2}}>강사 일정 관리</div>

          </div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          {(loadingSchedules||loadingGmail) && <span style={{fontSize:11,color:'var(--indigo-2)'}}>동기화 중…</span>}
        </div>
      </div>

      {/* 본문 그리드 */}
      <div style={{display:'grid',gridTemplateColumns:'220px 1fr',gap:16,alignItems:'start'}}>

        {/* 강사 목록 */}
        <div className="glass au" style={{borderRadius:16,padding:'14px',maxHeight:620,overflowY:'auto'}}>
          <input className="field" value={searchQ} onChange={function(e){setSearchQ(e.target.value);}}
            placeholder="강사 검색…" style={{fontSize:12,padding:'7px 10px',marginBottom:12,width:'100%'}}/>
          {/* 전임 강사 블록 */}
          <div style={{marginBottom:12,paddingBottom:10,borderBottom:'1px solid var(--border)'}}>
            <div style={{fontSize:10,fontWeight:700,letterSpacing:1,color:'var(--indigo-2)',textTransform:'uppercase',marginBottom:7}}>◆ 전임 강사</div>
            {day1Insts.length === 0 && (
              <div style={{fontSize:11,color:'var(--cream-3)',padding:'4px 4px'}}>검색 결과 없음</div>
            )}
            {day1Insts.map(function(inst){
              var busy = getInstBusy(inst);
              var isSel = selInst && selInst.id === inst.id;
              var thisMo = busy.filter(function(c){ return c.date&&c.date.startsWith(yr+'-'+String(mo+1).padStart(2,'0')); }).length;
              return (
                <button key={inst.id} onClick={function(){setSelInst(inst);}}
                  style={{display:'flex',alignItems:'center',gap:8,width:'100%',padding:'9px 10px',borderRadius:10,border:'1px solid '+(isSel?'var(--indigo)':'transparent'),background:isSel?'var(--indigo-g)':'transparent',cursor:'pointer',textAlign:'left',marginBottom:3,transition:'all .15s'}}>
                  <span style={{fontSize:20}}>{inst.photo}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <span style={{fontSize:13,fontWeight:600,color:'var(--cream)',display:'block',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{inst.name}</span>
                    <span style={{fontSize:10,color:loadingSchedules?'var(--indigo-2)':'var(--cream-3)'}}>{loadingSchedules ? '로딩 중…' : (thisMo > 0 ? thisMo+'건 예약' : '이달 여유')}</span>
                  </div>
                </button>
              );
            })}
          </div>
          {/* 외부 강사 블록 */}
          <div>
            <div style={{fontSize:10,fontWeight:700,letterSpacing:1,color:'var(--cream-3)',textTransform:'uppercase',marginBottom:7}}>외부 강사</div>
            {otherInsts.map(function(inst){
              var busy = getInstBusy(inst);
              var isSel = selInst && selInst.id === inst.id;
              var thisMo = busy.filter(function(c){ return c.date&&c.date.startsWith(yr+'-'+String(mo+1).padStart(2,'0')); }).length;
              return (
                <button key={inst.id} onClick={function(){setSelInst(inst);}}
                  style={{display:'flex',alignItems:'center',gap:8,width:'100%',padding:'8px 10px',borderRadius:10,border:'1px solid '+(isSel?'var(--indigo)':'transparent'),background:isSel?'var(--indigo-g)':'transparent',cursor:'pointer',textAlign:'left',marginBottom:3,transition:'all .15s'}}>
                  <span style={{fontSize:18}}>{inst.photo}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <span style={{fontSize:12,fontWeight:isSel?600:400,color:'var(--cream)',display:'block',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{inst.name}</span>
                    {thisMo > 0 && <span style={{fontSize:10,color:'var(--cream-3)'}}>{thisMo}건 예약</span>}
                  </div>
                </button>
              );
            })}
          </div>
        </div>

        {/* 달력 */}
        {selInst ? (
          <div className="glass au" style={{borderRadius:16,padding:'20px'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <span style={{fontSize:24}}>{selInst.photo}</span>
                <div>
                  <div style={{fontFamily:'Outfit,sans-serif',fontSize:16,fontWeight:700,color:'var(--cream)'}}>{selInst.name} 강사</div>
                  <div style={{fontSize:11,color:'var(--cream-3)'}}>
                    {selInst.isFullTime ? '★ 전임 강사' : '외부 강사'} · {selInst.scheduleStatus} · 이달 {Object.keys(busyMap).filter(function(d){return d.startsWith(yr+'-'+String(mo+1).padStart(2,'0'));}).length}건 예약
                  </div>
                </div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <button onClick={prevM} className="nav-ghost" style={{padding:'5px 10px',borderRadius:8,border:'1px solid var(--border)'}}>◀</button>
                <div style={{fontFamily:'Outfit,sans-serif',fontWeight:700,fontSize:15,color:'var(--cream)',minWidth:70,textAlign:'center'}}>{yr}.{String(mo+1).padStart(2,'0')}</div>
                <button onClick={nextM} className="nav-ghost" style={{padding:'5px 10px',borderRadius:8,border:'1px solid var(--border)'}}>▶</button>
              </div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',marginBottom:6}}>
              {['일','월','화','수','목','금','토'].map(function(d,i){return(
                <div key={d} style={{textAlign:'center',fontSize:11,fontWeight:700,padding:'4px 0',color:i===0?'#f87171':i===6?'#60a5fa':'var(--cream-3)'}}>{d}</div>
              );})}
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3}}>
              {Array(fd).fill(null).map(function(_,i){return <div key={'e'+i}/>;})}
              {Array.from({length:dim},function(_,i){return i+1;}).map(function(d){
                var key = fmt(d);
                var entry = busyMap[key];
                var status = entry ? entry.status : null;
                var note   = entry ? entry.note   : '';
                var hours  = entry ? (entry.hours || 0) : 0;
                var isToday = yr===today.getFullYear()&&mo===today.getMonth()&&d===today.getDate();
                var dow = new Date(yr,mo,d).getDay();
                // 종일(8H+) → 초록, 반일(<8H, >0) → 주황, 시간 미입력 → 기존 초록
                var isFullDay = status==='확정' && hours >= 8;
                var isHalfDay = status==='확정' && hours > 0 && hours < 8;
                var bgColor     = status==='확정' ? (isHalfDay ? 'rgba(251,146,60,.22)' : 'rgba(52,211,153,.22)')  : status==='논의 중' ? 'rgba(251,191,36,.22)' : status==='불가' ? 'rgba(248,113,113,.18)' : isToday ? 'rgba(255,255,255,.09)' : 'transparent';
                var borderColor = status==='확정' ? (isHalfDay ? 'rgba(251,146,60,.7)'  : 'rgba(52,211,153,.6)')   : status==='논의 중' ? 'rgba(251,191,36,.55)' : status==='불가' ? 'rgba(248,113,113,.55)' : isToday ? 'var(--border-2)'         : 'transparent';
                var textColor   = status==='확정' ? (isHalfDay ? '#FB923C'              : '#34D399')               : status==='논의 중' ? '#FBBF24'              : status==='불가' ? '#f87171'                : dow===0 ? '#f87171' : dow===6 ? '#60a5fa' : isToday ? 'var(--cream)' : 'var(--cream-2)';
                var dotColor    = status==='확정' ? (isHalfDay ? '#FB923C'              : '#34D399')               : status==='논의 중' ? '#FBBF24'              : status==='불가' ? '#f87171'                : null;
                var timeLabel   = hours > 0 ? hours + 'H' : null;
                return (
                  <div key={d} onClick={function(){ if(entry) setClickedDay({date:key, entry:entry}); }}
                    title={note ? status+'  '+note+(hours?'  '+hours+'H':'') : (status||undefined)} style={{
                    aspectRatio:'1',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
                    borderRadius:8,fontSize:12,fontWeight:status||isToday?700:400,
                    background:bgColor,color:textColor,border:'1px solid '+borderColor,
                    position:'relative',cursor:(note||status)?'pointer':'default',gap:1,
                  }}>
                    {d}
                    {timeLabel && <div style={{fontSize:8,fontWeight:700,lineHeight:1,opacity:.9}}>{timeLabel}</div>}
                    {!timeLabel && dotColor && <div style={{width:5,height:5,borderRadius:'50%',background:dotColor,opacity:.9}}/>}
                  </div>
                );
              })}
            </div>
            <div style={{display:'flex',gap:12,marginTop:14,fontSize:11,color:'var(--cream-3)',flexWrap:'wrap',alignItems:'center'}}>
              <span style={{display:'flex',alignItems:'center',gap:5}}><span style={{width:10,height:10,borderRadius:3,background:'rgba(52,211,153,.22)',border:'1px solid rgba(52,211,153,.6)',display:'inline-block'}}/>확정 (종일)</span>
              <span style={{display:'flex',alignItems:'center',gap:5}}><span style={{width:10,height:10,borderRadius:3,background:'rgba(251,146,60,.22)',border:'1px solid rgba(251,146,60,.7)',display:'inline-block'}}/>확정 (반일)</span>
              <span style={{display:'flex',alignItems:'center',gap:5}}><span style={{width:10,height:10,borderRadius:3,background:'rgba(251,191,36,.22)',border:'1px solid rgba(251,191,36,.55)',display:'inline-block'}}/>논의 중</span>
              <span style={{display:'flex',alignItems:'center',gap:5}}><span style={{width:10,height:10,borderRadius:3,background:'rgba(248,113,113,.18)',border:'1px solid rgba(248,113,113,.55)',display:'inline-block'}}/>불가</span>
              <span style={{marginLeft:'auto',fontSize:10,color:'var(--cream-3)'}}>날짜 클릭 시 상세 확인 · 시트에 시간 열 추가 시 H 표시</span>
            </div>
            {/* 날짜 클릭 팝업 */}
            {clickedDay && (function(){
              var e = clickedDay.entry;
              var statusColors = {'확정':'#34D399','논의 중':'#FBBF24','불가':'#f87171'};
              var sc = statusColors[e.status] || 'var(--cream-3)';
              var isHalf = e.hours > 0 && e.hours < 8;
              return (
                <div style={{marginTop:14,padding:'14px 16px',borderRadius:12,background:'rgba(255,255,255,.04)',border:'1px solid var(--border-2)',display:'flex',flexDirection:'column',gap:8}}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                    <div style={{fontWeight:700,fontSize:13,color:'var(--cream)',display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                      {clickedDay.date}
                      <span style={{fontSize:11,fontWeight:600,color:sc,padding:'1px 8px',borderRadius:99,border:'1px solid '+sc+'55',background:sc+'18'}}>{e.status}</span>
                      {e.hours > 0 && <span style={{fontSize:11,fontWeight:600,color:isHalf?'#FB923C':'#34D399',padding:'1px 8px',borderRadius:99,border:'1px solid '+(isHalf?'rgba(251,146,60,.5)':'rgba(52,211,153,.5)'),background:isHalf?'rgba(251,146,60,.12)':'rgba(52,211,153,.12)'}}>{e.hours}H {isHalf?'반일':'종일'}</span>}
                    </div>
                    <button onClick={function(){setClickedDay(null);}} style={{background:'none',border:'none',color:'var(--cream-3)',cursor:'pointer',fontSize:16,padding:'0 4px'}}>✕</button>
                  </div>
                  {e.status === '확정' && e.note && <div style={{fontSize:13,fontWeight:600,color:'var(--cream)',marginTop:2}}>{e.note}</div>}
                  {e.status === '확정' && e.ld && <div style={{fontSize:12,color:'var(--cream-2)'}}><span style={{color:'var(--cream-3)',marginRight:4}}>담당 LD:</span>{e.ld}</div>}
                  {e.status !== '확정' && e.note && <div style={{fontSize:12,color:'var(--cream-2)'}}><span style={{color:'var(--cream-3)',marginRight:4}}>메모:</span>{e.note}</div>}
                  {e.status === '확정' && !e.note && <div style={{fontSize:11,color:'var(--cream-3)'}}>과정명이 없습니다. 시트의 고객사/과정명 열에 입력하면 표시됩니다.</div>}
                  {e.threadId && (
                    <a href={'https://mail.google.com/mail/u/0/#all/'+e.threadId} target="_blank" rel="noopener noreferrer"
                      style={{display:'inline-flex',alignItems:'center',gap:5,fontSize:11,color:'#6BA3FF',textDecoration:'none',marginTop:2,padding:'3px 10px',borderRadius:99,border:'1px solid rgba(66,133,244,.35)',background:'rgba(66,133,244,.08)',width:'fit-content'}}
                      onMouseEnter={function(ev){ev.currentTarget.style.background='rgba(66,133,244,.18)';}}
                      onMouseLeave={function(ev){ev.currentTarget.style.background='rgba(66,133,244,.08)';}}>
                      ✉ Gmail에서 원본 메일 보기
                    </a>
                  )}
                </div>
              );
            })()}
          </div>
        ) : (
          <div className="glass au" style={{borderRadius:16,padding:'48px 24px',textAlign:'center'}}>
            <div style={{fontSize:32,marginBottom:12}}>📅</div>
            <div style={{fontFamily:'Outfit,sans-serif',fontSize:15,fontWeight:600,color:'var(--cream)',marginBottom:6}}>강사를 선택하세요</div>
            <div style={{fontSize:12,color:'var(--cream-3)',lineHeight:1.7}}>왼쪽 목록에서 강사를 클릭하면<br/>해당 강사의 일정을 캘린더로 확인할 수 있습니다</div>
          </div>
        )}
      </div>
    </div>
  );
}


/* ═══════════════════════════════════════════════════════
   MY PAGE TAB — 과정별 강사 찜 리스트
═══════════════════════════════════════════════════════ */
function MyPageTab() {
  // wishlist: { [courseId]: { name, instructors:string[], instStatus:{[id]:string}, status, date, memo } }
  const COURSE_STATUSES = [{k:'탐색중',color:'#94A3B8'},{k:'협의중',color:'#FBBF24'},{k:'확정',color:'#34D399'},{k:'완료',color:'#FF4D6D'}];
  const INST_STATUSES   = [{k:'제안',color:'#94A3B8'},{k:'논의중',color:'#FBBF24'},{k:'확정',color:'#34D399'}];

  const loadWishlist = function() {
    try { return JSON.parse(localStorage.getItem('im_wishlist') || '{}'); } catch(_) { return {}; }
  };
  const [wishlist, setWishlist] = useState(loadWishlist);
  const [newCourseName, setNewCourseName] = useState('');
  const [showNewForm, setShowNewForm] = useState(false);
  const [detail, setDetail] = useState(null);
  const [editingCourseId, setEditingCourseId] = useState(null);
  const [editingName, setEditingName] = useState('');
  const [editingDate, setEditingDate] = useState('');
  const [editingMemo, setEditingMemo] = useState('');
  const [copyToast, setCopyToast] = useState(null);

  const save = function(next) {
    setWishlist(next);
    localStorage.setItem('im_wishlist', JSON.stringify(next));
  };

  const addCourse = function() {
    var nm = newCourseName.trim();
    if (!nm) return;
    var id = 'course_' + Date.now();
    var next = Object.assign({}, wishlist);
    next[id] = { name: nm, instructors: [], instStatus: {}, status: '탐색중', date: '', memo: '', req: {companyName:'', topics:[], totalHours:0, deliveryMode:'', jobCategories:[], levels:[], audienceSize:'', notes:'', dates:[], date:''} };
    save(next);
    setNewCourseName('');
    setShowNewForm(false);
  };

  const removeCourse = function(cid) {
    if (!window.confirm('과정을 삭제하시겠습니까?')) return;
    var next = Object.assign({}, wishlist);
    delete next[cid];
    save(next);
  };

  const removeInstructor = function(cid, instId) {
    var next = JSON.parse(JSON.stringify(wishlist));
    next[cid].instructors = (next[cid].instructors || []).filter(function(id){return id !== instId;});
    save(next);
  };

  const [editingReq, setEditingReq] = useState({});
  const setReq1 = function(k, v) { setEditingReq(function(p){ return Object.assign({}, p, {[k]:v}); }); };

  const startEditCourse = function(cid) {
    setEditingCourseId(cid);
    setEditingName(wishlist[cid].name);
    setEditingDate(wishlist[cid].date || '');
    setEditingMemo(wishlist[cid].memo || '');
    setEditingReq(wishlist[cid].req || {companyName:'', topics:[], totalHours:0, deliveryMode:'', jobCategories:[], audienceSize:'', notes:''});
  };

  const saveEditCourse = function(cid) {
    var updated = JSON.parse(JSON.stringify(wishlist));
    updated[cid].name = editingName.trim() || wishlist[cid].name;
    updated[cid].date = editingDate;
    updated[cid].memo = editingMemo;
    updated[cid].req  = editingReq;
    save(updated);
    setEditingCourseId(null);
  };

  const cancelEditCourse = function() {
    setEditingCourseId(null);
    setEditingName('');
    setEditingDate('');
    setEditingMemo('');
  };

  const setCourseStatus = function(cid, status) {
    var next = JSON.parse(JSON.stringify(wishlist));
    next[cid].status = status;
    save(next);
  };

  const setInstStatus = function(cid, instId, status) {
    var next = JSON.parse(JSON.stringify(wishlist));
    if (!next[cid].instStatus) next[cid].instStatus = {};
    next[cid].instStatus[instId] = status;
    save(next);

    // 논의중 / 확정 → GAS 일정 시트 반영
    if ((status === '논의중' || status === '확정') && APPS_SCRIPT_URL) {
      var course = next[cid];
      var reqDates = (course.req && course.req.dates && course.req.dates.length)
        ? course.req.dates
        : [];
      var singleDate = (course.req && course.req.date) || course.date || '';
      var dates = reqDates.length ? reqDates : (singleDate ? [singleDate] : []);
      if (!dates.length) return; // 날짜 없으면 기록 불가
      var note = [course.name, (course.req && course.req.companyName && !isOurCompany(course.req.companyName) ? course.req.companyName : '')].filter(Boolean).join(' / ');
      var gasStatus = status === '논의중' ? '논의 중' : '확정';
      var user = localStorage.getItem('im_user_name') || '';
      fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: {'Content-Type': 'text/plain'},
        body: JSON.stringify({ action:'write_schedule', instId:instId, dates:dates, status:gasStatus, note:note, source:'앱', user:user }),
      }).catch(function(){});
    }
  };

  const copyReasons = function(cid) {
    var course = wishlist[cid];
    var instructors = (course.instructors || []).map(function(iid){ return INSTRUCTORS.find(function(x){return x.id===iid;}); }).filter(Boolean);
    var lines = [];
    lines.push('💡 강사 추천 이유 — ' + course.name);
    lines.push('');
    instructors.forEach(function(inst, i) {
      var reasonData = (course.instReasons || {})[inst.id] || {};
      var reason = reasonData.reason || '';
      var aiReason = reasonData.aiReason || '';
      lines.push((i+1) + '. ' + inst.name + ' 강사');
      if (reason)   lines.push('   📊 스코어 기반: ' + reason);
      if (aiReason) lines.push('   ✦ AI 추천: ' + aiReason);
      if (!reason && !aiReason) lines.push('   (추천 이유 정보 없음 — 추천 탭에서 찜하기 시 자동 저장)');
    });
    navigator.clipboard.writeText(lines.join('\n')).then(function(){
      setCopyToast(cid);
      setTimeout(function(){setCopyToast(null);}, 2000);
    });
  };

  var courseIds = Object.keys(wishlist);

  // 상단 집계
  var totalInsts = courseIds.reduce(function(s, cid){ return s + (wishlist[cid].instructors||[]).length; }, 0);
  var confirmedInsts = courseIds.reduce(function(s, cid){
    var ist = wishlist[cid].instStatus || {};
    return s + Object.values(ist).filter(function(v){return v==='확정';}).length;
  }, 0);
  var confirmedCourses = courseIds.filter(function(cid){ return wishlist[cid].status === '확정' || wishlist[cid].status === '완료'; }).length;

  return (
    <div style={{maxWidth:800,margin:'0 auto',position:'relative'}}>
      {/* 복사 토스트 */}
      {copyToast && (
        <div style={{position:'fixed',bottom:32,left:'50%',transform:'translateX(-50%)',background:'var(--indigo)',color:'#fff',padding:'10px 22px',borderRadius:99,fontSize:13,fontWeight:600,zIndex:999,pointerEvents:'none',boxShadow:'0 4px 20px rgba(0,0,0,.3)'}}>
          클립보드에 복사됐습니다 ✓
        </div>
      )}

      <div className="au" style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
        <div>
          <div style={{fontFamily:'Outfit,sans-serif',fontSize:22,fontWeight:700,color:'var(--cream)',marginBottom:4}}>마이페이지</div>
          <div style={{fontSize:12,color:'var(--cream-3)'}}>과정별 관심 강사 찜 목록을 관리합니다</div>
        </div>
        <button onClick={function(){setShowNewForm(function(v){return !v;});}}
          className="btn-cta"
          style={{padding:'10px 18px',borderRadius:11,fontSize:13,fontWeight:600,border:'none',cursor:'pointer',fontFamily:'Noto Sans KR,sans-serif'}}>
          + 과정 추가
        </button>
      </div>

      {/* 요약 대시보드 */}
      {courseIds.length > 0 && (
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12,marginBottom:20}}>
          {[
            {label:'등록 과정',value:courseIds.length,icon:'📋',color:'var(--indigo)'},
            {label:'찜한 강사',value:totalInsts,icon:'👥',color:'#FBBF24'},
            {label:'확정 강사',value:confirmedInsts,icon:'✅',color:'#34D399'},
          ].map(function(item){
            return (
              <div key={item.label} className="glass" style={{borderRadius:14,padding:'16px',textAlign:'center'}}>
                <div style={{fontSize:22,marginBottom:6}}>{item.icon}</div>
                <div style={{fontFamily:'Outfit,sans-serif',fontSize:22,fontWeight:700,color:item.color,lineHeight:1}}>{item.value}</div>
                <div style={{fontSize:11,color:'var(--cream-3)',marginTop:4}}>{item.label}</div>
              </div>
            );
          })}
        </div>
      )}

      {showNewForm && (
        <div className="glass au" style={{borderRadius:14,padding:'18px',marginBottom:16,border:'1px solid var(--indigo)'}}>

          <div style={{display:'flex',gap:8}}>
            <input className="field" style={{flex:1}} value={newCourseName}

              onKeyDown={function(e){if(e.key==='Enter')addCourse();}}
