            <button onClick={addCourse} className="btn-cta"
              style={{padding:'10px 18px',borderRadius:10,fontSize:13,fontWeight:600,border:'none',cursor:'pointer',fontFamily:'Noto Sans KR,sans-serif',flexShrink:0}}>
              추가
            </button>
            <button onClick={function(){setShowNewForm(false);setNewCourseName('');}}
              className="nav-ghost" style={{fontSize:13,padding:'0 8px'}}>취소</button>
          </div>
        </div>
      )}

      {courseIds.length === 0 && !showNewForm && (
        <div className="glass" style={{borderRadius:18,padding:'60px',textAlign:'center'}}>
          <div style={{fontSize:40,marginBottom:12}}>📋</div>
          <div style={{color:'var(--cream-2)',fontSize:15,fontWeight:600,marginBottom:8}}>과정이 없습니다</div>
          <div style={{fontSize:12,color:'var(--cream-3)',marginBottom:20}}>과정을 먼저 만들고, 강사 상세보기에서 찜하기를 눌러보세요</div>
          <button onClick={function(){setShowNewForm(true);}} className="btn-cta"
            style={{padding:'11px 24px',borderRadius:11,fontSize:13,fontWeight:600,border:'none',cursor:'pointer',fontFamily:'Noto Sans KR,sans-serif'}}>
            + 첫 과정 만들기
          </button>
        </div>
      )}

      <div style={{display:'grid',gap:16}}>
        {courseIds.map(function(cid) {
          var course = wishlist[cid];
          var instructors = (course.instructors || []).map(function(iid){ return INSTRUCTORS.find(function(x){return x.id===iid;}); }).filter(Boolean);
          var isEditing = editingCourseId === cid;
          return (
            <div key={cid} className="glass au" style={{borderRadius:18,padding:'20px'}}>
              <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:14,gap:10}}>
                <div style={{flex:1,minWidth:0}}>
                  {/* 과정 상태 배지 (view 모드에서만) */}
                  {!isEditing && (
                    <div style={{display:'flex',gap:5,flexWrap:'wrap',marginBottom:8}}>
                      {COURSE_STATUSES.map(function(s){
                        var active = (course.status || '탐색중') === s.k;
                        return (
                          <button key={s.k} onClick={function(){setCourseStatus(cid, s.k);}}
                            style={{fontSize:10,padding:'3px 9px',borderRadius:99,border:'1px solid '+(active?s.color:'var(--border-2)'),background:active?s.color+'22':'transparent',color:active?s.color:'var(--cream-3)',cursor:'pointer',fontFamily:'Noto Sans KR,sans-serif',fontWeight:active?700:400,transition:'all .15s'}}>
                            {s.k}
                          </button>
                        );
                      })}
                    </div>
                  )}

                  {isEditing ? (
                    <div style={{display:'grid',gap:8}}>
                      <input className="field" value={editingName}
                        onChange={function(e){setEditingName(e.target.value);}}
                        onKeyDown={function(e){if(e.key==='Enter')saveEditCourse(cid);if(e.key==='Escape')cancelEditCourse();}}
                        autoFocus
                        style={{fontSize:15,fontWeight:600,padding:'7px 11px'}}
                        placeholder="과정명"/>
                      <input className="field" value={editingDate}
                        onChange={function(e){setEditingDate(e.target.value);}}
                        style={{fontSize:12,padding:'6px 10px'}}
                        placeholder="날짜/기간 (예: 2025-05-06 ~ 2025-06-26)"/>
                      {/* 교육 정보 (메일 자동입력용) */}
                      <div style={{background:'rgba(99,102,241,.06)',border:'1px solid rgba(99,102,241,.15)',borderRadius:10,padding:'10px 12px',display:'grid',gap:6}}>
                        <div style={{fontSize:10,fontWeight:700,color:'var(--indigo-2)',letterSpacing:.8,marginBottom:2}}>📧 출강 메일 자동입력 정보</div>
                        <input className="field"
                          value={isOurCompany(editingReq.companyName||'') ? '' : (editingReq.companyName||'')}
                          onChange={function(e){var v=e.target.value; setReq1('companyName', isOurCompany(v)?'':v);}}
                          style={{fontSize:12,padding:'5px 9px'}} placeholder="고객사명 (예: 삼성전자)"/>
                        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
                          <input className="field" value={editingReq.totalHours||''}
                            onChange={function(e){setReq1('totalHours',parseInt(e.target.value)||0);}}
                            type="number" style={{fontSize:12,padding:'5px 9px'}} placeholder="교육 시간 (H)"/>
                          <input className="field" value={editingReq.deliveryMode||''}
                            onChange={function(e){setReq1('deliveryMode',e.target.value);}}
                            style={{fontSize:12,padding:'5px 9px'}} placeholder="교육 방식 (예: 오프라인)"/>
                        </div>
                        <input className="field" value={(editingReq.topics||[]).join(', ')}
                          onChange={function(e){setReq1('topics',e.target.value.split(',').map(function(s){return s.trim();}).filter(Boolean));}}
                          style={{fontSize:12,padding:'5px 9px'}} placeholder="교육 주제 (쉼표 구분, 예: 생성형AI, 업무자동화)"/>
                        <input className="field" value={(editingReq.jobCategories||[]).join(', ')}
                          onChange={function(e){setReq1('jobCategories',e.target.value.split(',').map(function(s){return s.trim();}).filter(Boolean));}}
                          style={{fontSize:12,padding:'5px 9px'}} placeholder="수강 대상 (예: 비개발자, 임원)"/>
                        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
                          <input className="field" value={editingReq.audienceSize||''}
                            onChange={function(e){setReq1('audienceSize',e.target.value);}}
                            style={{fontSize:12,padding:'5px 9px'}} placeholder="수강 인원 (예: 30)"/>
                          <input className="field" value={(editingReq.levels||[]).join(', ')}
                            onChange={function(e){setReq1('levels',e.target.value.split(',').map(function(s){return s.trim();}).filter(Boolean));}}
                            style={{fontSize:12,padding:'5px 9px'}} placeholder="수준 (예: 초급)"/>
                        </div>
                        <textarea className="field" value={editingReq.notes||''}
                          onChange={function(e){setReq1('notes',e.target.value);}}
                          style={{fontSize:12,padding:'5px 9px',resize:'none',minHeight:44}} placeholder="특이사항 (예: 녹화 불가, Gauss 기반 강의)"/>
                      </div>
                      <textarea className="field" value={editingMemo}
                        onChange={function(e){setEditingMemo(e.target.value);}}
                        style={{fontSize:12,padding:'6px 10px',resize:'none',minHeight:44}}
                        placeholder="내부 메모"/>
                      <div style={{display:'flex',gap:8}}>
                        <button onClick={function(){saveEditCourse(cid);}} className="btn-cta"
                          style={{padding:'7px 16px',borderRadius:8,fontSize:12,fontWeight:600,border:'none',cursor:'pointer',fontFamily:'Noto Sans KR,sans-serif'}}>저장</button>
                        <button onClick={cancelEditCourse} className="nav-ghost" style={{fontSize:12,padding:'0 8px'}}>취소</button>
                      </div>
                    </div>
                  ) : (
                    <div>
                      <div style={{display:'flex',alignItems:'center',gap:7}}>
                        <div style={{fontFamily:'Outfit,sans-serif',fontSize:16,fontWeight:600,color:'var(--cream)'}}>{course.name}</div>
                        <button onClick={function(){startEditCourse(cid);}}
                          style={{padding:'4px 12px',borderRadius:8,border:'1px solid var(--border-2)',background:'var(--glass)',color:'var(--cream-2)',fontSize:11,cursor:'pointer',fontFamily:'Noto Sans KR,sans-serif',display:'flex',alignItems:'center',gap:4,whiteSpace:'nowrap'}}>
                          ✏️ 편집
                        </button>
                      </div>
                      <div style={{fontSize:11,color:'var(--cream-3)',marginTop:2}}>찜한 강사 {instructors.length}명</div>
                      {course.date && (
                        <div style={{fontSize:11,color:'var(--cream-3)',marginTop:3,display:'flex',alignItems:'center',gap:4}}>
                          <span>📅</span><span>{course.date}</span>
                        </div>
                      )}
                      {course.memo && (
                        <div style={{fontSize:11,color:'var(--cream-3)',marginTop:3,display:'flex',alignItems:'flex-start',gap:4}}>
                          <span style={{flexShrink:0}}>📝</span><span style={{lineHeight:1.5}}>{course.memo}</span>
                        </div>
                      )}
                    </div>
                  )}
                </div>
                {!isEditing && (
                  <div style={{display:'flex',flexDirection:'column',gap:6,flexShrink:0}}>
                    <button onClick={function(){copyReasons(cid);}}
                      title="강사 추천 이유 복사"
                      style={{fontSize:11,color:'var(--indigo-2)',background:'var(--indigo-g)',border:'1px solid var(--indigo)',borderRadius:8,padding:'5px 10px',cursor:'pointer',fontFamily:'Noto Sans KR,sans-serif',whiteSpace:'nowrap'}}>
                      💡 추천 이유 복사
                    </button>
                    <button onClick={function(){removeCourse(cid);}}
                      style={{fontSize:11,color:'var(--cream-3)',background:'none',border:'1px solid var(--border-2)',borderRadius:8,padding:'5px 10px',cursor:'pointer',fontFamily:'Noto Sans KR,sans-serif'}}>
                      과정 삭제
                    </button>
                  </div>
                )}
              </div>

              {instructors.length === 0 ? (
                <div style={{padding:'18px',borderRadius:11,background:'rgba(255,255,255,.03)',border:'1px dashed var(--border-2)',textAlign:'center',fontSize:12,color:'var(--cream-3)'}}>
                  강사 상세보기에서 찜하기를 눌러 강사를 추가하세요
                </div>
              ) : (
                <div style={{display:'grid',gap:8}}>
                  {instructors.map(function(inst) {
                    var recs = inst.satisfactionRecords || [];
                    var avg = recs.length ? avgOf(recs.map(function(r){return r.score;})) : null;
                    var instSt = (wishlist[cid].instStatus || {})[inst.id] || '';
                    var stColor = (INST_STATUSES.find(function(s){return s.k===instSt;})||{}).color || 'var(--cream-3)';
                    var reasonData = (wishlist[cid].instReasons || {})[inst.id] || {};
                    var instReason = reasonData.reason || '';
                    var instAiReason = reasonData.aiReason || '';
                    return (
                      <div key={inst.id}
                        onClick={function(e){if(!e.defaultPrevented)setDetail(inst);}}
                        style={{display:'grid',gap:8,padding:'12px 14px',borderRadius:11,background:'rgba(255,255,255,.03)',border:'1px solid var(--border)',cursor:'pointer',transition:'border-color .15s,background .15s'}}
                        onMouseEnter={function(e){e.currentTarget.style.borderColor='var(--indigo)';e.currentTarget.style.background='var(--indigo-g)';}}
                        onMouseLeave={function(e){e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.background='rgba(255,255,255,.03)';}}>
                        <div style={{display:'flex',alignItems:'center',gap:12}}>
                          <div style={{width:38,height:38,borderRadius:10,background:'var(--ink-3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,flexShrink:0}}>{inst.photo}</div>
                          <div style={{flex:1,minWidth:0}}>
                            <div style={{display:'flex',alignItems:'center',gap:7,flexWrap:'wrap'}}>
                              <span style={{fontFamily:'Outfit,sans-serif',fontWeight:600,color:'var(--cream)',fontSize:14}}>{inst.name} 강사</span>
                              {avg && <span style={{color:'var(--amber)',fontSize:11}}>★ <span style={{color:'var(--cream-3)',fontWeight:600}}>{avg.toFixed(1)}</span></span>}
                              {inst.isFullTime && <span style={{fontSize:10,color:'var(--indigo-2)',background:'var(--indigo-g)',border:'1px solid var(--indigo)',padding:'1px 7px',borderRadius:99,fontWeight:700}}>전임</span>}
                            </div>
                            <div style={{fontSize:12,color:'var(--cream-3)',marginTop:4,display:'flex',flexDirection:'column',gap:3,alignItems:'flex-start'}}>
                              {(inst.category||[]).length > 0 && (
                                <div style={{display:'flex',alignItems:'center',flexWrap:'wrap',gap:3}}>
                                  <span style={{fontSize:9,fontWeight:700,color:'var(--indigo-2)',letterSpacing:.5,minWidth:36}}>카테고리</span>
                                  {(inst.category||[]).slice(0,2).map(function(s){return <span key={'c_'+s} style={{background:'var(--indigo-g)',border:'1px solid var(--indigo)',color:'var(--indigo-2)',padding:'1px 7px',borderRadius:99,fontSize:10,fontWeight:700}}>{s}</span>;})}
                                </div>
                              )}
                              {(inst.lectureTopics||[]).length > 0 && (
                                <div style={{display:'flex',alignItems:'center',flexWrap:'wrap',gap:3}}>
                                  <span style={{fontSize:9,fontWeight:700,color:'var(--cream-3)',letterSpacing:.5,minWidth:36}}>강의주제</span>
                                  {(inst.lectureTopics||[]).slice(0,3).map(function(s){return <span key={'lt_'+s} style={{background:'rgba(255,255,255,.04)',border:'1px solid var(--border-2)',color:'var(--cream-3)',padding:'1px 7px',borderRadius:99,fontSize:10}}>{s}</span>;})}
                                </div>
                              )}
                              {!(inst.category||[]).length && !(inst.lectureTopics||[]).length && (inst.specialties||[]).slice(0,3).join(' · ')}
                            </div>
                          </div>
                          {/* 컨택 상태 */}
                          <div style={{display:'flex',gap:4,flexShrink:0}}>
                            {INST_STATUSES.map(function(s){
                              var active = instSt === s.k;
                              return (
                                <button key={s.k}
                                  onClick={function(e){e.stopPropagation();setInstStatus(cid, inst.id, active ? '' : s.k);}}
                                  title={'컨택 상태: '+s.k}
                                  style={{fontSize:10,padding:'3px 8px',borderRadius:99,border:'1px solid '+(active?s.color:'var(--border-2)'),background:active?s.color+'22':'transparent',color:active?s.color:'var(--cream-3)',cursor:'pointer',fontFamily:'Noto Sans KR,sans-serif',fontWeight:active?700:400,transition:'all .15s'}}>
                                  {s.k}
                                </button>
                              );
                            })}
                          </div>
                          {/* 이메일 */}
                          {inst.email && (
                            <a href={'mailto:'+inst.email}
                              onClick={function(e){e.stopPropagation();}}
                              title={inst.email}
                              style={{fontSize:18,textDecoration:'none',flexShrink:0,opacity:.7,transition:'opacity .15s',lineHeight:1}}
                              onMouseEnter={function(e){e.currentTarget.style.opacity=1;}}
                              onMouseLeave={function(e){e.currentTarget.style.opacity=.7;}}>
                              ✉️
                            </a>
                          )}
                          <button onClick={function(e){e.stopPropagation();removeInstructor(cid, inst.id);}}
                            style={{fontSize:11,padding:'5px 10px',borderRadius:8,border:'1px solid rgba(255,45,85,.25)',background:'rgba(255,45,85,.06)',color:'#FF8FA3',cursor:'pointer',fontFamily:'Noto Sans KR,sans-serif',flexShrink:0}}>
                            찜 해제
                          </button>
                        </div>
                        {/* 추천 이유 */}
                        {(instReason || instAiReason) && (
                          <div style={{padding:'8px 12px',borderRadius:9,background:'rgba(245,158,11,.06)',border:'1px solid rgba(245,158,11,.15)',display:'grid',gap:4}}>
                            {instReason && <div style={{fontSize:11,color:'var(--cream-2)',display:'flex',gap:6}}><span style={{color:'#FBBF24',flexShrink:0}}>💡</span><span>{instReason}</span></div>}
                            {instAiReason && <div style={{fontSize:11,color:'var(--cream-2)',display:'flex',gap:6}}><span style={{color:'var(--indigo-2)',flexShrink:0}}>✦ AI</span><span>{instAiReason}</span></div>}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* 강사 상세 팝업 — 전체 DetailModal 사용 */}
      {detail && (function(){
        var recs = detail.satisfactionRecords || [];
        var fakeResult = {
          inst: detail,
          s1: null, s2: null, s3: null, s4: null, total: null,
          allAvg: recs.length ? avgOf(recs.map(function(r){return r.score;})) : null,
          topPos: getTopTags(recs, 'pos'),
          topNeg: getTopTags(recs, 'neg', 2),
          warns: [],
        };
        return (
          <DetailModal
            result={fakeResult}
            req={{}}
            noScore={true}
            onClose={function(){setDetail(null);}}
            onEmail={function(){
              var url = buildGmailUrl(detail, {}, '친근한 말투');
              window.open(url, '_blank');
            }}
          />
        );
      })()}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   APP

function App({usingLiveData}) {
  const [showLogin, setShowLogin] = useState(()=>!localStorage.getItem('im_user_name'));
  const [currentUser, setCurrentUser] = useState(()=>localStorage.getItem('im_user_name')||'');
  // EntryModal은 로그인 완료 후에만 표시
  const [step, setStep] = useState('input');
  const [matchResult, setMatchResult] = useState(null);
  const [currentReq, setCurrentReq] = useState(null);
  const [tab, setTab] = useState('recommend');
  const [theme, setTheme] = useState(()=>localStorage.getItem('im_theme')||'brand');
  const [darkMode, setDarkMode] = useState(()=>localStorage.getItem('im_dark')!=='false');
  const [aiRanking, setAiRanking] = useState(false);
  const [calendarSelInst, setCalendarSelInst] = useState(null);

  useEffect(()=>{
    const t = THEMES.find(t=>t.k===theme);
    if (!t) return;
    const r = document.documentElement;
    r.style.setProperty('--brand', t.indigo);
    r.style.setProperty('--brand-b', t.violet||t.indigo);
    r.style.setProperty('--brand-c', t.violet||t.indigo);
    r.style.setProperty('--indigo', t.indigo);
    r.style.setProperty('--indigo-2', darkMode ? t.indigo2 : (t.indigo2Light||t.indigo2));
    r.style.setProperty('--indigo-g', t.indigoG);
    r.style.setProperty('--violet', t.violet||t.indigo);
    r.style.setProperty('--rose', t.indigo);
    localStorage.setItem('im_theme', theme);
  },[theme, darkMode]);

  useEffect(()=>{
    document.documentElement.setAttribute('data-mode', darkMode ? 'dark' : 'light');
    localStorage.setItem('im_dark', darkMode);
  },[darkMode]);

  const TABS = [{id:'recommend',label:'강사 추천'},{id:'db',label:'강사 DB'},{id:'calendar',label:'일정 관리'},{id:'mypage',label:'마이페이지'}];

  return (
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <header style={{borderBottom:'1px solid var(--border)',background:'var(--header-bg)',backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)',position:'sticky',top:0,zIndex:30}}>
        <div style={{maxWidth:1060,margin:'0 auto',padding:'0 28px',display:'flex',alignItems:'center',justifyContent:'space-between',height:58}}>
          <div style={{display:'flex',alignItems:'center',gap:10,cursor:'pointer'}} onClick={function(){setTab('recommend');setStep('input');}}>
            <div style={{width:32,height:32,borderRadius:9,background:'linear-gradient(135deg,#FF385C,#FF4D6D)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,boxShadow:'0 2px 10px rgba(255,56,92,0.4)'}}>✦</div>
            <span style={{fontFamily:'Outfit,sans-serif',fontWeight:700,fontSize:16,color:'var(--cream)',letterSpacing:-.3}}>강사 매칭 서비스</span>
          </div>
          <nav style={{display:'flex',gap:0,alignItems:'center'}}>
            {TABS.map(t=>(
              <button key={t.id} className={`tab-btn${tab===t.id?' act':''}`}
                onClick={()=>{setTab(t.id);if(t.id==='recommend')setStep('input');}}>
                {t.label}
              </button>
            ))}
            <a href="https://www.linkedin.com/search/results/people/?keywords=AI+%EA%B8%B0%EC%97%85%EA%B5%90%EC%9C%A1+%EA%B0%95%EC%82%AC&origin=GLOBAL_SEARCH_HEADER"
              target="_blank" rel="noopener noreferrer"
              className="tab-btn"
              style={{display:'flex',alignItems:'center',gap:5,textDecoration:'none',borderLeft:'1px solid var(--border)'}}>
              <span style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:14,height:14,borderRadius:3,background:'#0A66C2',fontSize:9,fontWeight:700,color:'#fff',lineHeight:1,flexShrink:0}}>in</span>
              강사 발굴
            </a>
          </nav>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            {/* Theme switcher */}
            <div style={{display:'flex',gap:6,alignItems:'center'}}>
              {THEMES.map(t=>(
                <div key={t.k} className={`theme-dot${theme===t.k?' on':''}`}
                  style={{background:t.indigo,borderColor:theme===t.k?'var(--cream)':'transparent'}}
                  onClick={()=>setTheme(t.k)} title={t.k}/>
              ))}
            </div>
            {/* Dark/Light toggle */}
            <button onClick={()=>setDarkMode(d=>!d)} title={darkMode?'라이트 모드로 전환':'다크 모드로 전환'}
              style={{width:44,height:24,borderRadius:99,border:'1px solid var(--border-2)',background:darkMode?'rgba(255,255,255,.08)':'rgba(0,0,0,.08)',cursor:'pointer',position:'relative',transition:'all .2s',flexShrink:0,padding:0}}>
              <div style={{position:'absolute',top:3,left:darkMode?3:'auto',right:darkMode?'auto':3,width:16,height:16,borderRadius:50,background:'var(--cream)',transition:'all .2s',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10}}>
                {darkMode?'🌙':'☀️'}
              </div>
            </button>
            {/* User info + logout */}
            {currentUser && (
              <div style={{display:'flex',alignItems:'center',gap:6,fontSize:11,color:'var(--cream-3)',borderLeft:'1px solid var(--border)',paddingLeft:12}}>
                <span style={{width:22,height:22,borderRadius:50,background:'var(--indigo-g)',border:'1px solid var(--indigo)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:'var(--indigo-2)',fontWeight:700,flexShrink:0}}>
                  {currentUser.charAt(0)}
                </span>
                <span style={{color:'var(--cream-2)',fontWeight:500}}>{currentUser}</span>
                <button onClick={function(){
                  localStorage.removeItem('im_user_name');
                  setCurrentUser('');
                  setShowLogin(true);
                }} style={{marginLeft:4,padding:'2px 8px',borderRadius:6,border:'1px solid var(--border-2)',background:'transparent',color:'var(--cream-3)',fontSize:10,cursor:'pointer'}}>
                  로그아웃
                </button>
              </div>
            )}
          </div>
        </div>
      </header>
      <main style={{flex:1,maxWidth:1060,margin:'0 auto',width:'100%',padding:'36px 28px'}}>
        {tab==='recommend' && (
          step==='input'
            ? <InputSection step1Data={null} onSubmit={function(req){
                // 마이페이지 자동 과정 등록
                var autoSaveCourse = function(r) {
                  try {
                    var wl = JSON.parse(localStorage.getItem('im_wishlist')||'{}');
                    var cname = [r.companyName, r.courseName || (r.topics&&r.topics.length ? r.topics.slice(0,2).join('/') : '')].filter(Boolean).join(' - ') || '새 교육 과정';
                    var existing = Object.keys(wl).find(function(id){ return wl[id].name === cname; });
                    var reqData = {
                      companyName: (r.companyName && !isOurCompany(r.companyName)) ? r.companyName : '', courseName: r.courseName||'',
                      topics: r.topics||[], totalHours: r.totalHours||0,
                      deliveryMode: r.deliveryMode||'', jobCategories: r.jobCategories||[],
                      levels: r.levels||[], audienceSize: r.audienceSize||'',
                      notes: r.notes||'', dates: r.dates||[], date: r.date||'',
                      purpose: r.purpose||'', industry: r.industry||'',
                    };
                    if (existing) {
                      // req 업데이트만 (강사 목록 유지)
                      if (!wl[existing].req || !wl[existing].req.companyName) {
                        wl[existing].req = reqData;
                        localStorage.setItem('im_wishlist', JSON.stringify(wl));
                      }
                    } else {
                      var id = 'course_' + Date.now();
                      wl[id] = { name: cname, instructors: [], instStatus: {}, status: '탐색중', date: r.date||'', memo: r.industry||'', req: reqData };
                      localStorage.setItem('im_wishlist', JSON.stringify(wl));
                    }
                  } catch(_) {}
                };
                if (req.isMultiCourse && req.courses && req.courses.length > 1) {
                  var courseResults = req.courses.map(function(course) {
                    var courseReq = Object.assign({}, course, {
                      companyName: (course.companyName && !isOurCompany(course.companyName)) ? course.companyName : '',
                      date: req.date || '',
                      dateEnd: req.dateEnd || '',
                      scheduleMode: req.scheduleMode || 'flexible',
                      recordingRequired: req.recordingRequired || false,
                    });
                    autoSaveCourse(courseReq);
                    return { req: courseReq, result: matchInstructors(courseReq) };
                  });
                  setCurrentReq(req);
                  setMatchResult({ isMultiCourse: true, courseResults: courseResults });
                  setStep('results');
                  sendLog({event_type:'matching_run_multi', company_name:req.courses[0].companyName||'', course_count:req.courses.length});
                } else {
                  autoSaveCourse(req);
                  var result = matchInstructors(req);
                  setCurrentReq(req); setMatchResult(result); setStep('results');
                  _sessionSearchCount++;
                  sendLog({
                    event_type:'matching_run',
                    company_name:req.companyName||'',
                    industry:req.industry||'',
                    topics:(req.topics||[]).join(','),
                    audience:(req.jobCategories||[]).join(','),
                    difficulty:(req.levels||[]).join(','),
                    preferred_date:req.date||'',
                    budget_range:req.budgetRange||'',
                    delivery_method:req.deliveryMode||'',
                    match_count:result.passed.length,
                    top1_instructor:result.passed[0]?result.passed[0].inst.name:'',
                    top2_instructor:result.passed[1]?result.passed[1].inst.name:'',
                    top3_instructor:result.passed[2]?result.passed[2].inst.name:'',
                    server_connect_time:_gasConnectTime,
                    server_disconnect_time:_gasDisconnectTime,
                    server_response_ms:_gasResponseMs,
                    reset_clicked:false,
                    gmail_sent:false,
                    session_duration_sec:Math.round((Date.now()-_sessionStart)/1000),
                    session_search_count:_sessionSearchCount,
                    instructor_name:result.passed[0]?result.passed[0].inst.name:'',
                    score:result.passed[0]?result.passed[0].total:''
                  });
                  if (result.passed.length > 0 && APPS_SCRIPT_URL) {
                    setAiRanking(true);
                    callClaudeForRanking(result.passed, req).then(function(reranked) {
                      setMatchResult(function(prev) {
                        return { passed: reranked, filtered: prev ? prev.filtered : [], schedFiltered: prev ? prev.schedFiltered : [] };
                      });
                      setAiRanking(false);
                    }).catch(function() { setAiRanking(false); });
                  }
                }
              }}/>
            : <ResultsSection matchResult={matchResult} req={currentReq} aiRanking={aiRanking} onReset={function(){sendLog({event_type:'reset_click',reset_clicked:true});setStep('input');}}/>
        )}
        {tab==='db' && <DBTab req={currentReq} onGoCalendar={function(inst){setCalendarSelInst(inst);setTab('calendar');}}/>}
        {tab==='calendar' && <CalendarTab req={currentReq} initSelInst={calendarSelInst}/>}
        {tab==='mypage' && <MyPageTab/>}
      </main>
      {showLogin && <LoginModal onLogin={function(nm){setCurrentUser(nm);setShowLogin(false);}}/>}
    </div>
  );
}

function AppWithData() {
  const [ready, setReady] = useState(false);
  const [usingLiveData, setUsingLiveData] = useState(false);
  const [loadMsg, setLoadMsg] = useState('강사 데이터 로딩 중...');

  useEffect(() => {
    // 1순위: Apps Script URL (배포된 경우)
    const asUrl = APPS_SCRIPT_URL;
    if (asUrl) {
      var _t0 = Date.now();
      _gasConnectTime = new Date().toISOString();
      fetch(asUrl + '?action=instructors')
        .then(r => r.json())
        .then(data => {
          _gasDisconnectTime = new Date().toISOString();
          _gasResponseMs = Date.now() - _t0;
          // GAS는 { instructors: [...] } 또는 순수 배열 두 가지 형식 지원
          const list = Array.isArray(data) ? data
                     : (data && Array.isArray(data.instructors)) ? data.instructors
                     : null;
          if (list && list.length) {
            INSTRUCTORS = applyEmbeddedData(list.map(normalizeInstructor));
            IS_LIVE_DATA = true;
            setUsingLiveData(true);
            // 일정 사전 로드: matchInstructors 필터에서 scheduleStatus 활용
            fetch(asUrl + '?action=schedules')
              .then(function(r) { return r.json(); })
              .then(function(sData) {
                if (!Array.isArray(sData)) return;
                sData.forEach(function(s) {
                  if (!s.name || !s.calendar || !s.calendar.length) return;
                  var inst = INSTRUCTORS.find(function(x) { return x.name === s.name; });
                  if (!inst) return;
                  s.calendar.forEach(function(e) {
                    if (!inst.calendar.some(function(x) { return x.date === e.date; })) inst.calendar.push(e);
                  });
                  if (s.calendar.some(function(e) { return e.status === '확정'; })) {
                    inst.scheduleStatus = '확정';
                  } else if (s.calendar.some(function(e) { return e.status === '논의 중'; }) && inst.scheduleStatus === '미확인') {
                    inst.scheduleStatus = '논의 중';
                  }
                });
              })
              .catch(function() {});
            setReady(true);
            return;
          }
          loadCSV();
        })
        .catch(loadCSV);
      return;
    }
    // 2순위: 공개 CSV 직접 로드
    loadCSV();
  }, []);

  function loadCSV() {
    setLoadMsg('구글 시트에서 데이터 로딩 중...');
    loadFromSheets()
      .then(data => {
        if (data && data.length) {
          INSTRUCTORS = applyEmbeddedData(data);
          IS_LIVE_DATA = true;
          setUsingLiveData(true);
        } else {
          useFallback();
        }
        setReady(true);
      })
      .catch(() => { useFallback(); setReady(true); });
  }

  function useFallback() {
    INSTRUCTORS = applyEmbeddedData(_SAMPLE_INSTRUCTORS.slice());
    IS_LIVE_DATA = false;
    setUsingLiveData(false);
  }

  if (!ready) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16}}>
      <div style={{fontSize:40,animation:'blink 1.2s ease infinite'}}>⚡</div>
      <div style={{color:'var(--cream-2)',fontSize:14,fontFamily:'Noto Sans KR,sans-serif'}}>{loadMsg}</div>
    </div>
  );

  return <App usingLiveData={usingLiveData}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<AppWithData/>);
</script>
</body>
</html>
