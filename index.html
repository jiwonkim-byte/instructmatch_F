/* ── 다과정 인라인 편집기 ── */
function MultiCourseEditor({courses: initCourses, onConfirm}) {
  const [courses, setCourses] = React.useState(function() {
    return initCourses.map(function(c, i) {
      return Object.assign({}, c, {
        _editName: c.courseName || (c.companyName && !isOurCompany(c.companyName) ? c.companyName : '') || ('과정 ' + (i+1)),
        _editHours: String(c.totalHours || ''),
      });
    });
  });

  var updateCourse = function(idx, key, val) {
    setCourses(function(prev) {
      return prev.map(function(c, i) {
        return i === idx ? Object.assign({}, c, {[key]: val}) : c;
      });
    });
  };

  var removeCourse = function(idx) {
    setCourses(function(prev) { return prev.filter(function(_, i) { return i !== idx; }); });
  };

  var addCourse = function() {
    setCourses(function(prev) {
      return prev.concat([{
        courseName: '', companyName: '', topics: [], levels: [], totalHours: 0, jobCategories: [],
        _editName: '새 과정 ' + (prev.length + 1), _editHours: '',
      }]);
    });
  };

  var handleConfirm = function() {
    var final = courses.map(function(c) {
      return Object.assign({}, c, {
        courseName: c._editName.trim() || c.courseName || '',
        companyName: (c.companyName && !isOurCompany(c.companyName)) ? c.companyName : '',
        totalHours: parseInt(c._editHours) || c.totalHours || 0,
      });
    }).filter(function(c) { return c.courseName || (c.topics && c.topics.length); });
    onConfirm(final);
  };

  return (
    <div style={{marginTop:12}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
        <div>
          <div style={{fontSize:13,fontWeight:700,color:'#FCD34D',marginBottom:2}}>📚 {courses.length}개 과정이 감지됐습니다</div>
          <div style={{fontSize:11,color:'var(--cream-3)'}}>과정명·시수를 확인·수정한 뒤 "이 분류로 진행"을 눌러주세요</div>
        </div>
      </div>
      <div style={{display:'grid',gap:8,marginBottom:10}}>
        {courses.map(function(c, idx) {
          return (
            <div key={idx} style={{borderRadius:12,border:'1px solid var(--border-2)',background:'rgba(255,255,255,.03)',padding:'12px 14px'}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                <div style={{width:24,height:24,borderRadius:6,background:'var(--indigo-g)',border:'1px solid var(--indigo)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:'var(--indigo-2)',flexShrink:0}}>
                  {idx+1}
                </div>
                <input
                  value={c._editName}
                  onChange={function(e){updateCourse(idx,'_editName',e.target.value);}}
                  style={{flex:1,background:'var(--field-bg)',border:'1px solid var(--border-2)',borderRadius:8,padding:'5px 10px',fontSize:13,color:'var(--cream)',fontFamily:'Noto Sans KR,sans-serif',fontWeight:600}}
                  placeholder={'과정명 ' + (idx+1)}
                />
                <div style={{display:'flex',alignItems:'center',gap:4,flexShrink:0}}>
                  <input
                    type="number" min="0" max="999"
                    value={c._editHours}
                    onChange={function(e){updateCourse(idx,'_editHours',e.target.value);}}
                    style={{width:52,background:'var(--field-bg)',border:'1px solid var(--border-2)',borderRadius:8,padding:'5px 7px',fontSize:13,color:'var(--indigo-2)',fontFamily:'Outfit,sans-serif',fontWeight:700,textAlign:'center'}}
                    placeholder="h"
                  />
                  <span style={{fontSize:11,color:'var(--cream-3)'}}>h</span>
                </div>
                {courses.length > 1 && (
                  <button onClick={function(){removeCourse(idx);}} title="과정 삭제"
                    style={{background:'none',border:'none',color:'rgba(248,113,113,.6)',cursor:'pointer',fontSize:16,padding:'0 2px',lineHeight:1,flexShrink:0}}>
                    ×
                  </button>
                )}
              </div>
              <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                {(c.topics||[]).map(function(t){return(
                  <span key={t} style={{fontSize:10,padding:'2px 8px',borderRadius:99,background:'rgba(16,185,129,.1)',border:'1px solid rgba(16,185,129,.2)',color:'#34D399'}}>{t}</span>
                );})}
                {(c.levels||[]).map(function(l){return(
                  <span key={l} style={{fontSize:10,padding:'2px 8px',borderRadius:99,background:'rgba(245,158,11,.1)',border:'1px solid rgba(245,158,11,.2)',color:'#FCD34D'}}>{l}</span>
                );})}
                {(c.jobCategories||[]).slice(0,2).map(function(j){return(
                  <span key={j} style={{fontSize:10,padding:'2px 8px',borderRadius:99,background:'rgba(255,255,255,.06)',border:'1px solid var(--border-2)',color:'var(--cream-3)'}}>{j}</span>
                );})}
                {!(c.topics||[]).length && !(c.levels||[]).length && (
                  <span style={{fontSize:10,color:'var(--cream-3)',fontStyle:'italic'}}>주제 미감지 — 아래에서 직접 선택 가능</span>
                )}
              </div>
            </div>
          );
        })}
      </div>
      <div style={{display:'flex',gap:8,alignItems:'center'}}>
        <button onClick={addCourse}
          style={{padding:'7px 14px',borderRadius:9,border:'1px solid var(--border-2)',background:'transparent',color:'var(--cream-3)',fontSize:12,cursor:'pointer',fontFamily:'Noto Sans KR,sans-serif'}}>
          + 과정 추가
        </button>
        <button onClick={handleConfirm} className="btn-cta"
          style={{flex:1,padding:'10px',borderRadius:10,fontSize:13,fontWeight:600,border:'none',cursor:'pointer',fontFamily:'Noto Sans KR,sans-serif'}}>
          이 분류로 진행 →
        </button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   PDF READER — drag & drop + click
═══════════════════════════════════════════════════════ */
function PdfReader({onExtracted}) {
  const fileRef = useRef(null);
  const [state, setState] = useState('idle');
  const [filename, setFilename] = useState('');
  const [phase, setPhase] = useState(0);
  const [summary, setSummary] = useState(null);
  const [errMsg, setErrMsg] = useState('');
  const [dragOver, setDragOver] = useState(false);
  const [multiCourses, setMultiCourses] = useState(null);
  const PHASES = ['파일 인식 중…','텍스트 추출 중…','내용 분석 중…','특이사항 분석 중…'];

  const reset = () => { setState('idle');setFilename('');setPhase(0);setSummary(null);setErrMsg('');setDragOver(false);setMultiCourses(null);onExtracted(null);if(fileRef.current)fileRef.current.value=''; };

  // 단일 파일 텍스트 추출
  const extractText = async (file) => {
    const ext = file.name.split('.').pop().toLowerCase();
    if (!['pdf','pptx','docx'].includes(ext)) throw new Error(`지원하지 않는 형식: ${file.name}`);
    const arrayBuffer = await file.arrayBuffer();
    let text = '';
    if (ext === 'pdf') {
      const pdfLib = window.pdfjsLib;
      if (!pdfLib) throw new Error('PDF 라이브러리 로드 실패');
      pdfLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
      const pdf = await pdfLib.getDocument({data: new Uint8Array(arrayBuffer)}).promise;
      for (let i=1; i<=Math.min(pdf.numPages,50); i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        // X좌표 기반 단어 경계 판별 (표/컬럼 레이아웃 대응)
        let prevX = null;
        const pageText = content.items.map(item => {
          const x = item.transform ? item.transform[4] : null;
          const gap = (prevX !== null && x !== null) ? (x - prevX) : 0;
          prevX = x !== null ? (x + (item.width||0)) : prevX;
          const sep = gap > 8 ? ' ' : '';
          return sep + item.str;
        }).join('').trim();
        text += pageText + '\n';
      }
    } else {
      const zip = await window.JSZip.loadAsync(arrayBuffer);
      if (ext === 'pptx') {
        const slideFiles = Object.keys(zip.files).filter(f=>/^ppt\/slides\/slide\d+\.xml$/.test(f)).sort((a,b)=>parseInt(a.match(/\d+/)[0])-parseInt(b.match(/\d+/)[0]));
        let _inSkip = false;
        for (const f of slideFiles) {
          const xml = await zip.file(f).async('string');
          const sTitle = getPptxSlideTitle(xml);
          if (sTitle && _SKIP_SLIDE_RES.some(re => re.test(sTitle))) { _inSkip = true; console.log('[slide] SKIP→', f, '|', sTitle); continue; }
          if (sTitle && _KEEP_SLIDE_RES.some(re => re.test(sTitle))) { _inSkip = false; console.log('[slide] KEEP→', f, '|', sTitle); }
          if (_inSkip) { console.log('[slide] skip(cont):', f, '|', sTitle); continue; }
          console.log('[slide] include:', f, '|', sTitle);
          text += xml
            .replace(/<\/a:r>|<\/a:t>|<a:br\/>/g, ' ')
            .replace(/<\/a:tc>|<\/a:tr>/g, '\n')
            .replace(/<\/p:sp>|<\/a:txBody>/g, '\n')
            .replace(/<[^>]+>/g, '')
            .replace(/[ \t]+/g, ' ')
            .replace(/\n{3,}/g, '\n\n') + '\n';
        }
      } else {
        const docFile = zip.file('word/document.xml');
        if (!docFile) throw new Error('DOCX 파일 구조 오류');
        const xml = await docFile.async('string');
        text = xml
          .replace(/<\/w:t>|<\/w:r>/g, ' ')
          .replace(/<\/w:p>|<w:br[^>]*\/>/g, '\n')
          .replace(/<[^>]+>/g, '')
          .replace(/[ \t]+/g, ' ')
          .replace(/\n{3,}/g, '\n\n');
      }
    }
    return text;
  };

  const processFiles = useCallback(async (files) => {
    if (!files || !files.length) return;
    const fileArr = Array.from(files).filter(f => ['pdf','pptx','docx'].includes(f.name.split('.').pop().toLowerCase()));
    if (!fileArr.length) { setErrMsg('PDF, PPTX, DOCX 파일만 지원됩니다.'); return; }
    const names = fileArr.map(f => f.name).join(', ');
    setFilename(names); setState('reading'); setPhase(0); setErrMsg('');
    try {
      setPhase(1);
      const texts = await Promise.all(fileArr.map(f => extractText(f).catch(() => '')));
      const combined = filterProposalText(texts.join('\n\n---\n\n'));
      if (!combined.trim()) throw new Error('텍스트를 추출할 수 없습니다.');
      setPhase(2);
      // 규칙 기반 파싱 (파일명 기반 기업명 추출 포함)
      const parsed = parseDocumentText(combined, fileArr[0].name);
      // 파일명에서 기업명 추출 (Claude/규칙 파서가 못 잡은 경우 보완)
      if (!parsed.companyName) {
        parsed.companyName = extractClientFromFilename(fileArr[0].name) || '';
      }
      if (isOurCompany(parsed.companyName||'')) parsed.companyName = '';
      // Claude로 특이사항·교육목표·강사요청사항 보완 (GAS 연결된 경우만)
      if (APPS_SCRIPT_URL) {
        setPhase(3);
        try {
          const aiFields = await callClaudeForFormFields(combined, parsed.purpose || '');
          if (aiFields) {
            if (aiFields.notes && aiFields.notes.length > 3) parsed.notes = aiFields.notes;
            if (aiFields.purpose && aiFields.purpose.length > 3) parsed.purpose = aiFields.purpose;
            if (Array.isArray(aiFields.requests) && aiFields.requests.length) parsed.requests = aiFields.requests;
          }
        } catch(e) { /* 실패해도 규칙 파싱 결과 유지 */ }
      }
      setSummary(parsed); setState('done'); onExtracted(parsed);
      sendLog({event_type:'pdf_parse', company_name:parsed.companyName||'', industry:parsed.industry||'', topics:(parsed.topics||[]).join(','), details:names});
    } catch (err) { setState('error'); setErrMsg(err.message || '파일 처리 중 오류'); }
  }, [onExtracted]);

  const onDrop = useCallback(e => {
    e.preventDefault(); setDragOver(false);
    processFiles(e.dataTransfer.files);
  }, [processFiles]);

  if (state === 'idle' || state === 'error') return (
    <div>
      <div
        className={`upload-zone${dragOver?' drag-over':''}`}
        onDragOver={e=>{e.preventDefault();setDragOver(true);}}
        onDragLeave={()=>setDragOver(false)}
        onDrop={onDrop}
        onClick={()=>fileRef.current?.click()}
      >
        <input ref={fileRef} type="file" accept=".pdf,.pptx,.docx" multiple style={{display:'none'}} onChange={e=>processFiles(e.target.files)}/>
        <div style={{fontSize:40,marginBottom:16}}>📄</div>
        <div style={{fontFamily:'Outfit,sans-serif',fontWeight:600,fontSize:16,color:'var(--cream)',marginBottom:6}}>
          PDF · PPTX · DOCX 업로드
        </div>
        <div style={{fontSize:12,color:'var(--cream-3)',marginBottom:16}}>여러 파일 동시 업로드 가능 · 교육 내용·일정·기업명 자동 추출</div>
        <div style={{display:'inline-flex',alignItems:'center',gap:8,padding:'9px 22px',borderRadius:10,background:'var(--indigo-g)',border:'1px solid var(--indigo)',color:'var(--indigo-2)',fontSize:13,fontWeight:600,cursor:'pointer'}}>
          파일 선택
        </div>
      </div>
      {errMsg && <div className="warn-err au" style={{marginTop:10,display:'flex',gap:8,alignItems:'flex-start',fontSize:12}}><span>⚠️</span><span>{errMsg}</span></div>}
    </div>
  );

  if (state === 'reading') return (
    <div className="glass au" style={{borderRadius:18,padding:'28px 24px',textAlign:'center'}}>
      <div style={{fontSize:36,marginBottom:14}}>📄</div>
      <div style={{fontFamily:'Outfit,sans-serif',fontWeight:600,fontSize:14,color:'var(--cream)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:320,margin:'0 auto 4px'}}>{filename}</div>
      <div className="pdf-bar-track" style={{maxWidth:280,margin:'12px auto 10px'}}><div className="pdf-bar-fill"/></div>
      <div className="pdf-step" style={{marginTop:8}}>{PHASES[phase]}</div>
    </div>
  );

  return (
    <>
      <div className="au" style={{borderRadius:18,border:'1px solid var(--indigo)',background:'var(--indigo-g)',padding:'20px 22px'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
          <div style={{width:32,height:32,borderRadius:8,background:'var(--indigo-g)',border:'1px solid var(--indigo)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>📄</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:13,fontWeight:600,color:'var(--cream)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{filename}</div>
            {multiCourses ? (
              <div style={{fontSize:11,color:'#FCD34D',marginTop:1}}>📚 {multiCourses.length}개 과정 감지됨</div>
            ) : (
              <div style={{fontSize:11,color:'#34D399',marginTop:1}}>✅ 파싱 완료 — 조건 자동 입력됨</div>
            )}
          </div>
          <button onClick={reset} className="nav-ghost" style={{fontSize:11,textDecoration:'underline',flexShrink:0}}>다시 선택</button>
        </div>
        {multiCourses ? null : (
          <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
            <span style={{fontSize:11,color:'var(--cream-3)',marginRight:4}}>자동 감지:</span>
            {summary && summary.companyName && !isOurCompany(summary.companyName) && (
              <span style={{fontSize:11,padding:'3px 9px',borderRadius:99,background:'rgba(16,185,129,.1)',border:'1px solid rgba(16,185,129,.22)',color:'#34D399',fontWeight:600}}>🏢{summary.companyName}</span>
            )}
            {[...((summary && summary.topics)||[]),...((summary && summary.jobCategories)||[]),...((summary && summary.levels)||[])].filter(Boolean).map(t=>(
              <span key={t} style={{fontSize:11,padding:'3px 9px',borderRadius:99,background:'rgba(16,185,129,.1)',border:'1px solid rgba(16,185,129,.22)',color:'#34D399',fontWeight:500}}>{t}</span>
            ))}
            {summary && summary.purpose && (
              <span style={{fontSize:11,padding:'3px 9px',borderRadius:99,background:'rgba(16,185,129,.08)',border:'1px solid rgba(16,185,129,.2)',color:'#34D399',fontWeight:500,maxWidth:220,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>🎯{summary.purpose}</span>
            )}
            {summary && summary.extractedDates && summary.extractedDates.slice(0,3).map(d=>(
              <span key={d} style={{fontSize:11,padding:'3px 9px',borderRadius:99,background:'rgba(16,185,129,.12)',border:'1px solid rgba(16,185,129,.25)',color:'#34D399',fontWeight:600}}>📅{d}</span>
            ))}
          </div>
        )}
        {/* 커리큘럼 상세 표시 */}
        {summary && summary.curriculum && summary.curriculum.length > 0 && (

            </div>
            <div style={{display:'grid',gap:6,maxHeight:200,overflowY:'auto'}}>
              {summary.curriculum.map(function(c,i){
                var tools = Array.isArray(c.도구) ? c.도구 : [];
                var methods = Array.isArray(c.강의방법) ? c.강의방법 : [];
                return (
                  <div key={i} style={{padding:'8px 10px',borderRadius:8,background:'rgba(255,255,255,.03)',border:'1px solid var(--border)',fontSize:11}}>
                    <div style={{display:'flex',alignItems:'baseline',gap:6,marginBottom:c.내용||c.적용포인트||tools.length||methods.length?4:0}}>
                      {c.차수 && <span style={{fontSize:10,padding:'1px 7px',borderRadius:99,background:'var(--indigo-g)',border:'1px solid var(--indigo)',color:'var(--indigo-2)',fontWeight:700,flexShrink:0}}>{c.차수}</span>}
                      <span style={{fontWeight:600,color:'var(--cream)',flex:1}}>{c.주제}</span>
                      {c.시간 && <span style={{fontSize:10,color:'var(--cream-3)',flexShrink:0,fontFamily:'Outfit,sans-serif'}}>{c.시간}</span>}
                    </div>
                    {c.내용 && <div style={{color:'var(--cream-2)',lineHeight:1.5,marginBottom:3}}>{c.내용}</div>}
                    {c.적용포인트 && <div style={{color:'rgba(248,242,244,0.45)',fontSize:10,marginBottom:3}}>→ {c.적용포인트}</div>}
                    {(tools.length > 0 || methods.length > 0) && (
                      <div style={{display:'flex',flexWrap:'wrap',gap:3,marginTop:3}}>
                        {methods.map(function(m){ return <span key={m} style={{fontSize:10,padding:'1px 7px',borderRadius:99,background:'rgba(245,158,11,.1)',border:'1px solid rgba(245,158,11,.22)',color:'#FCD34D'}}>{m}</span>; })}

          }}
        />
      )}
    </>
  );
}

/* ── DateTimeList: 날짜 시간 직접 입력 + 그룹화 일괄 적용 ── */
function DateTimeList({dates, onChange, parseDateStr, buildDateStr, calcSessionHours}) {
  const [checked, setChecked] = React.useState({});     // {datePart: bool}
  const [groups, setGroups] = React.useState([]);        // [{name, dates:[datePart]}]
  const [newGroupName, setNewGroupName] = React.useState('');
  const [bulkStart, setBulkStart] = React.useState('');
  const [bulkEnd, setBulkEnd] = React.useState('');

  var checkedParts = dates.map(function(d){return d.slice(0,10);}).filter(function(dp){return checked[dp];});
  var hasChecked = checkedParts.length > 0;

  var totalMins = 0;
  dates.forEach(function(d){
    var p = parseDateStr(d);
    var h = calcSessionHours(p.startTime, p.endTime);
    if(h) totalMins += h*60;
  });
  var totalH = totalMins>0 ? totalMins/60 : null;

  function setTime(datePart, newStart, newEnd) {
    onChange(dates.map(function(x){
      if(x.slice(0,10)!==datePart) return x;
      var p = parseDateStr(x);
      return buildDateStr(datePart, newStart!==undefined?newStart:p.startTime, newEnd!==undefined?newEnd:p.endTime);
    }));
  }

  function applyBulkTo(targets) {
    if(!bulkStart&&!bulkEnd) return;
    onChange(dates.map(function(x){
      var dp = x.slice(0,10);
      if(!targets.includes(dp)) return x;
      var p = parseDateStr(x);
      return buildDateStr(dp, bulkStart||p.startTime, bulkEnd||p.endTime);
    }));
  }

  function saveGroup() {
    if(!newGroupName.trim() || checkedParts.length===0) return;
    var name = newGroupName.trim();
    setGroups(function(prev){
      var idx = prev.findIndex(function(g){return g.name===name;});
      if(idx>=0) { var n=[...prev]; n[idx]={name:name,dates:checkedParts}; return n; }
      return [...prev, {name:name, dates:checkedParts}];
    });
    setNewGroupName('');
  }

  function selectGroup(g) {
    var n={};
    g.dates.forEach(function(d){n[d]=true;});
    setChecked(n);
  }

  var tiStyle = {
    fontSize:12, padding:'4px 8px', borderRadius:7, border:'1px solid var(--border-2)',
    background:'var(--glass)', color:'var(--cream)', fontFamily:'Outfit,sans-serif',
    width:84, textAlign:'center'
  };

  return React.createElement('div',{style:{marginTop:12}},

    /* 헤더 */
    React.createElement('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}},
      React.createElement('span',{style:{fontSize:11,color:'var(--cream-3)',fontWeight:600}},'선택된 일정 — 체크 후 그룹 저장 가능'),
      totalH && React.createElement('span',{style:{fontSize:12,fontWeight:700,color:'var(--indigo-2)',fontFamily:'Outfit,sans-serif'}},
        '합계 ', totalH%1===0?totalH:totalH.toFixed(1), 'h')
    ),

    /* 저장된 그룹 목록 */
    groups.length>0 && React.createElement('div',{style:{display:'flex',flexWrap:'wrap',gap:5,marginBottom:8,alignItems:'center'}},
      React.createElement('span',{style:{fontSize:10,color:'var(--cream-3)',marginRight:2}},'그룹 선택:'),
      groups.map(function(g){return(
        React.createElement('div',{key:g.name,style:{display:'flex',alignItems:'center',gap:2}},
          React.createElement('button',{
            onClick:function(){selectGroup(g);},
            style:{fontSize:11,padding:'3px 10px',borderRadius:99,border:'1px solid var(--indigo)',
              background:'var(--indigo-g)',color:'var(--indigo-2)',cursor:'pointer',
              fontFamily:'Noto Sans KR,sans-serif',fontWeight:600}
          }, g.name+' ('+g.dates.length+'일)'),
          React.createElement('button',{
            onClick:function(){setGroups(function(prev){return prev.filter(function(x){return x.name!==g.name;});});},

/* ── ScheduleInputPanel: 달력 + 텍스트 입력 듀얼 모드 ── */
function ScheduleInputPanel({dates, onChange}) {
  const [mode, setMode] = React.useState('calendar'); // 'calendar' | 'text'
  const [viewYear, setViewYear] = React.useState(() => { const n=new Date(); return n.getFullYear(); });
  const [viewMonth, setViewMonth] = React.useState(() => { const n=new Date(); return n.getMonth(); });
  const [textVal, setTextVal] = React.useState('');

  // 달력 계산
  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  const today = new Date().toISOString().slice(0,10);

  function fmtDate(y,m,d) {
    return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
  }
  function toggleDate(d) {
    var str = fmtDate(viewYear, viewMonth, d);
    var existing = dates.find(function(x){return x.slice(0,10)===str;});
    var next = existing
      ? dates.filter(function(x){return x.slice(0,10)!==str;})
      : [...dates, str].sort(function(a,b){return a.slice(0,10).localeCompare(b.slice(0,10));});
    onChange(next);
  }

  function prevMonth() {
    if(viewMonth===0){setViewYear(y=>y-1);setViewMonth(11);}
    else setViewMonth(m=>m-1);
  }
  function nextMonth() {
    if(viewMonth===11){setViewYear(y=>y+1);setViewMonth(0);}
    else setViewMonth(m=>m+1);
  }

  function parseTextDates(txt) {
    var found = [];
    txt.split(/\n|,|;/).forEach(function(seg) {
      // 날짜 + 시작시간 + 종료시간: 2026-05-10 09:00-18:00
      var m = seg.trim().match(/(\d{4})[.\-\/](\d{1,2})[.\-\/](\d{1,2})(?:\s+(\d{1,2}:\d{2})(?:\s*[-~]\s*(\d{1,2}:\d{2}))?)?/);
      if(m) {
        var s = m[1]+'-'+m[2].padStart(2,'0')+'-'+m[3].padStart(2,'0');
        if(m[4]) {
          s += ' ' + m[4].padStart(5,'0');
          if(m[5]) s += '-' + m[5].padStart(5,'0');
        }
        if(!found.some(function(x){return x.slice(0,10)===s.slice(0,10);})) found.push(s);
      }
    });
    return found.sort(function(a,b){return a.slice(0,10).localeCompare(b.slice(0,10));});
  }

  // 날짜 문자열 파싱/조합 헬퍼
  function parseDateStr(d) {
    var datePart = d.slice(0,10);
    var rest = d.length > 10 ? d.slice(11) : '';
    var startTime = '', endTime = '';
    if (rest) {
      var di = rest.indexOf('-');
      if (di > 0) { startTime = rest.slice(0,di); endTime = rest.slice(di+1); }
      else { startTime = rest; }
    }
    return {datePart:datePart, startTime:startTime, endTime:endTime};
  }
  function buildDateStr(datePart, startTime, endTime) {
    if (startTime && endTime) return datePart+' '+startTime+'-'+endTime;
    if (startTime) return datePart+' '+startTime;
    return datePart;
  }
  function calcSessionHours(startTime, endTime) {
    if (!startTime || !endTime) return null;
    var sp = startTime.split(':').map(Number), ep = endTime.split(':').map(Number);
    var mins = (ep[0]*60+ep[1]) - (sp[0]*60+sp[1]);
    return mins > 0 ? mins/60 : null;
  }

  function applyText() {
    var parsed2 = parseTextDates(textVal);
    if(!parsed2.length) return alert('날짜를 인식하지 못했습니다.\n예: 2026-05-10, 2026-05-17');
    onChange(parsed2);
    setTextVal('');
  }

  const WEEK = ['일','월','화','수','목','금','토'];
  const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  const calCells = [];
  for(var i=0;i<firstDay;i++) calCells.push(null);
  for(var d=1;d<=daysInMonth;d++) calCells.push(d);
  while(calCells.length%7!==0) calCells.push(null);

  const tabStyle = function(active) { return {
    flex:1, padding:'8px 0', fontSize:13, fontWeight:active?700:400,
    background:active?'var(--indigo-g)':'transparent',
    color:active?'var(--indigo-2)':'var(--cream-3)',
    border:'none', borderRadius:8, cursor:'pointer',
    fontFamily:'Noto Sans KR,sans-serif', transition:'all .15s'
  };};

  return (
    React.createElement('div', {style:{marginBottom:16}},
      /* 탭 */
      React.createElement('div', {style:{display:'flex',gap:4,background:'var(--field-bg)',border:'1px solid var(--border-2)',borderRadius:10,padding:4,marginBottom:14}},
        React.createElement('button',{style:tabStyle(mode==='calendar'),onClick:()=>setMode('calendar')},'📅 달력으로 선택'),
        React.createElement('button',{style:tabStyle(mode==='text'),onClick:()=>setMode('text')},'✏️ 텍스트로 입력')
      ),

      /* 달력 모드 */
      mode==='calendar' && React.createElement('div', {style:{background:'var(--field-bg)',border:'1px solid var(--border-2)',borderRadius:14,padding:'16px',userSelect:'none'}},
        /* 월 네비게이션 */
        React.createElement('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}},
          React.createElement('button',{onClick:prevMonth,style:{background:'none',border:'none',color:'var(--cream-2)',fontSize:18,cursor:'pointer',padding:'2px 8px',borderRadius:6,lineHeight:1}},'‹'),
          React.createElement('span',{style:{fontSize:14,fontWeight:700,color:'var(--cream)',fontFamily:'Outfit,sans-serif'}},viewYear+'년 '+MONTHS[viewMonth]),
          React.createElement('button',{onClick:nextMonth,style:{background:'none',border:'none',color:'var(--cream-2)',fontSize:18,cursor:'pointer',padding:'2px 8px',borderRadius:6,lineHeight:1}},'›')
        ),
        /* 요일 헤더 */
        React.createElement('div',{style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',marginBottom:6}},
          WEEK.map(function(w,i){
            return React.createElement('div',{key:w,style:{textAlign:'center',fontSize:11,fontWeight:700,
              color:i===0?'#FF6B6B':i===6?'#7BA7FF':'var(--cream-3)',padding:'4px 0'}},w);
          })
        ),
        /* 날짜 셀 */
        React.createElement('div',{style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2}},
          calCells.map(function(day,idx){
            if(!day) return React.createElement('div',{key:'e'+idx,style:{height:34}});
            var str = fmtDate(viewYear,viewMonth,day);
            var sel = dates.some(function(x){return x.slice(0,10)===str;});
            var isToday = str===today;
            var dow = (firstDay+day-1)%7;
            var baseColor = dow===0?'#FF6B6B':dow===6?'#7BA7FF':'var(--cream)';
            return React.createElement('button',{
              key:day,
              onClick:()=>toggleDate(day),
              style:{
                height:34, borderRadius:8, border:'none', cursor:'pointer',
                background:sel?'var(--indigo)':isToday?'var(--indigo-g)':'transparent',
                color:sel?'#fff':isToday?'var(--indigo-2)':baseColor,
                fontSize:13, fontWeight:sel?700:isToday?600:400,
                fontFamily:'Outfit,sans-serif',
                outline:isToday&&!sel?'1px solid var(--indigo)':'none',
                transition:'all .1s'
              }
            }, day);
          })
        ),
        dates.length>0 && React.createElement('div',{style:{marginTop:12,fontSize:11,color:'var(--cream-3)',textAlign:'center'}},
          dates.length+'일 선택됨 — 클릭으로 취소 가능'
        )
      ),

      /* 텍스트 모드 */
      mode==='text' && React.createElement('div', {},
        React.createElement('textarea',{
          value:textVal,
          onChange:e=>setTextVal(e.target.value),
          placeholder:'날짜를 한 줄씩 입력하세요 (시간 선택 입력)\n\n예:\n2026-05-10 09:00-18:00\n2026-05-17 09:00-18:00\n2026-05-24',
          style:{width:'100%',minHeight:120,background:'var(--field-bg)',border:'1px solid var(--border-2)',
            borderRadius:12,color:'var(--cream)',fontSize:13,padding:'12px 14px',
            resize:'vertical',fontFamily:'Noto Sans KR,sans-serif',lineHeight:1.7,
            outline:'none',boxSizing:'border-box'},
          onFocus:e=>{e.target.style.borderColor='var(--indigo)';},
          onBlur:e=>{e.target.style.borderColor='var(--border-2)';}
        }),
        React.createElement('button',{
          onClick:applyText,
          style:{marginTop:8,padding:'8px 20px',borderRadius:8,background:'var(--indigo-g)',
            border:'1px solid var(--indigo)',color:'var(--indigo-2)',fontSize:13,fontWeight:700,
            cursor:'pointer',fontFamily:'Noto Sans KR,sans-serif'}
        },'날짜 추가')
      ),

      /* 선택된 날짜 + 시간 입력 */
      dates.length>0 && React.createElement(DateTimeList, {dates:dates, onChange:onChange, parseDateStr:parseDateStr, buildDateStr:buildDateStr, calcSessionHours:calcSessionHours})
    )
  );
}

                  placeholder="예: 심화 과정으로 2일 연속 진행 예정. 동일 강사로 연속성 유지 필요."
                  style={{marginTop:10,resize:'none',fontSize:12}}/>
              )}
            </div>
          )}
          <button onClick={go} className="btn-cta" style={{padding:'14px',borderRadius:13,fontSize:14,fontWeight:600,letterSpacing:.3}}>
            다음 — 매칭 조건 입력 →
          </button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   DETAIL MODAL
═══════════════════════════════════════════════════════ */
function DetailModal({result, req, onClose, onEmail, noScore}) {
  const {inst, s1, s2, s3, s4, total, allAvg, topPos, topNeg, warns} = result;
  const displayReason = result.displayReason || null;
  const [copied, setCopied] = React.useState(false);

  const copyReason = function() {
    if (!displayReason) return;
    var text = displayReason.reason || '';
    if (displayReason.purpose) text += '\n\n[교육 목표]\n' + displayReason.purpose;
    if (displayReason.requests && displayReason.requests.length) {
      text += '\n\n[강사 사전 요청 사항]\n' + displayReason.requests.map(function(r,i){ return (i+1) + '. ' + r; }).join('\n');
    }
    navigator.clipboard.writeText(text).then(function(){
      setCopied(true);
      setTimeout(function(){ setCopied(false); }, 2000);
    });
  };

  // ── 찜하기 상태 ──
  const loadWL = function(){ try{return JSON.parse(localStorage.getItem('im_wishlist')||'{}');}catch(_){return{};} };
  const [wishlist, setWishlist] = useState(loadWL);
  const [wlMode, setWlMode] = useState('idle'); // idle | pick | newForm | done
  const [newCName, setNewCName] = useState('');
  const [pickedCid, setPickedCid] = useState('');

  var courseIds = Object.keys(wishlist);
  var alreadyIn = courseIds.filter(function(cid){ return (wishlist[cid].instructors||[]).indexOf(inst.id) > -1; });

  const saveWL = function(next) {
    setWishlist(next);
    localStorage.setItem('im_wishlist', JSON.stringify(next));
  };

  const addToCourse = function(cid) {
    if (!cid) return;
    var next = JSON.parse(JSON.stringify(wishlist));
    if (!next[cid]) return;
    if (next[cid].instructors.indexOf(inst.id) === -1) next[cid].instructors.push(inst.id);
    if (!next[cid].instReasons) next[cid].instReasons = {};
    next[cid].instReasons[inst.id] = { reason: result.reason || '', aiReason: result.aiReason || '' };
    saveWL(next);
    setWlMode('done');
    setTimeout(function(){ setWlMode('idle'); }, 2000);
  };

  const createAndAdd = function() {
    var nm = newCName.trim();
    if (!nm) return;
    var cid = 'course_' + Date.now();
    var next = JSON.parse(JSON.stringify(wishlist));
    next[cid] = { name: nm, instructors: [inst.id], instReasons: { [inst.id]: { reason: result.reason || '', aiReason: result.aiReason || '' } } };
    saveWL(next);
    setNewCName('');
    setWlMode('done');
    setTimeout(function(){ setWlMode('idle'); }, 2000);
  };
  return (
    <div className="m-overlay ai" onClick={onClose}>
      <div className="glass-b as" onClick={e=>e.stopPropagation()}
        style={{width:'100%',maxWidth:540,margin:'0 16px',borderRadius:22,maxHeight:'90vh',overflowY:'auto'}}>
        {/* Header */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'24px 24px 18px',borderBottom:'1px solid var(--border)'}}>
          <div style={{display:'flex',alignItems:'center',gap:14}}>
            <div style={{width:52,height:52,borderRadius:14,background:'var(--ink-3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:28}}>{inst.photo}</div>
            <div>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span style={{fontFamily:'Outfit,sans-serif',fontSize:20,fontWeight:600,color:'var(--cream)'}}>{inst.name} 강사</span>
                {allAvg && <><span style={{color:'var(--amber)',fontSize:13}}>★</span><span style={{fontSize:13,color:'var(--cream-2)',fontWeight:600}}>{allAvg.toFixed(1)}</span></>}
              </div>
              <div style={{fontSize:12,color:'var(--cream-3)',marginTop:2}}>
                {inst.contractType} · {inst.recordingAllowed?'녹화 가능':'녹화 불가'} · {inst.scheduleStatus}
              </div>
            </div>
          </div>
          <div style={{textAlign:'right'}}>
            {!noScore && <><div style={{fontFamily:'Outfit,sans-serif',fontSize:28,fontWeight:700,color:'var(--indigo-2)'}}>{total}</div><div style={{fontSize:11,color:'var(--cream-3)'}}>/100점</div></>}
            <button onClick={onClose} className="nav-ghost" style={{fontSize:18,padding:'2px 6px',marginTop:4}}>✕</button>
          </div>
        </div>
        <div style={{padding:'22px 24px',display:'grid',gap:20}}>
          {/* AI 추천 이유 — TOP3 카드에서 열릴 때만 표시 */}
          {displayReason && (
            <div style={{borderRadius:14,overflow:'hidden',border:'1px solid rgba(99,102,241,.35)'}}>
              <div style={{background:'rgba(99,102,241,.12)',padding:'10px 16px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  <span style={{fontSize:13}}>✦</span>
                  <span style={{fontSize:11,fontWeight:700,letterSpacing:.8,color:'var(--indigo-2)',textTransform:'uppercase'}}>AI 추천 이유 · 고객사 전달용</span>
                </div>
                <button
                  onClick={copyReason}
                  style={{fontSize:11,padding:'3px 12px',borderRadius:99,border:'1px solid rgba(99,102,241,.4)',background:copied?'rgba(16,185,129,.15)':'rgba(99,102,241,.15)',color:copied?'#34D399':'var(--indigo-2)',fontWeight:600,cursor:'pointer',transition:'all .2s'}}>
                  {copied ? '✓ 복사됨' : '📋 복사'}
                </button>
              </div>
              <div style={{padding:'14px 16px',display:'grid',gap:12,background:'rgba(255,255,255,.02)'}}>
                <p style={{fontSize:13,lineHeight:1.85,color:'var(--cream-2)'}}>{displayReason.reason}</p>
                {displayReason.purpose && (
                  <div>
                    <div style={{fontSize:10,fontWeight:700,letterSpacing:.8,color:'var(--cream-3)',textTransform:'uppercase',marginBottom:5}}>교육 목표</div>
                    <p style={{fontSize:12,lineHeight:1.75,color:'var(--cream-3)'}}>{displayReason.purpose}</p>
                  </div>
                )}
                {displayReason.requests && displayReason.requests.length > 0 && (
                  <div>
                    <div style={{fontSize:10,fontWeight:700,letterSpacing:.8,color:'var(--cream-3)',textTransform:'uppercase',marginBottom:6}}>강사 사전 요청 사항</div>
                    <div style={{display:'grid',gap:4}}>
                      {displayReason.requests.map(function(r,i){return(
                        <div key={i} style={{fontSize:12,color:'var(--cream-2)',padding:'4px 10px',background:'rgba(245,158,11,.06)',borderRadius:7,border:'1px solid rgba(245,158,11,.18)',display:'flex',gap:7,alignItems:'flex-start'}}>
                          <span style={{color:'#FBBF24',fontWeight:700,flexShrink:0}}>{i+1}.</span>
                          <span style={{lineHeight:1.65}}>{r}</span>
                        </div>
                      );})}
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}
          {/* Score breakdown */}
          {!noScore && (
          <div style={{background:'rgba(255,255,255,.03)',borderRadius:14,padding:'16px 18px',border:'1px solid var(--border)'}}>
            <div className="sec-label">스코어 상세 (S1~S4)</div>
            {[['S1 교육 적합도',s1,35],['S2 강의력/만족도',s2,30],['S3 예산 적합도',s3,20]].map(([l,v,m])=>{
              var pct = Math.round(v/m*100);
              var barColor = pct>=70?'#34D399':pct>=40?'#FCD34D':'#FF8FA3';
              return (
              <div key={l} style={{marginBottom:10}}>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:4}}>
                  <span style={{color:'var(--cream-2)'}}>{l}</span>
                  <span style={{fontFamily:'Outfit,sans-serif',fontWeight:700,color:barColor}}>{v}/{m}</span>
                </div>
                <div className="sbar-track"><div className="sbar-fill" style={{width:`${pct}%`,background:barColor}}/></div>
              </div>
            );})}
            <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginTop:4}}>
              <span style={{color:'var(--cream-2)'}}>S4 특이사항 보정</span>
              <span style={{fontFamily:'Outfit,sans-serif',fontWeight:700,color:s4>=0?'#34D399':'#FF8FA3'}}>{s4>=0?`+${s4}`:s4}점</span>
            </div>
          </div>
          )}
          {/* Warnings */}
          {warns.map((w,i)=>(
            <div key={i} className={w.level==='error'?'warn-err':'warn-info'} style={{display:'flex',gap:8}}><span>⚠️</span><span>{w.text}</span></div>
          ))}
          {/* Price */}
          <div style={{background:'var(--indigo-g)',border:'1px solid var(--indigo)',borderRadius:14,padding:'16px 18px'}}>
            <div className="sec-label">강사료</div>
            <div style={{display:'flex',alignItems:'baseline',gap:8}}>
              <span style={{fontFamily:'Outfit,sans-serif',fontSize:22,fontWeight:700,color:'var(--indigo-2)'}}>{inst.pricePerHour?(inst.pricePerHour/10000).toFixed(0):'-'}<span style={{fontSize:13}}>만원/h</span></span>
              {inst.negotiable && <span style={{fontSize:11,background:'rgba(16,185,129,.12)',color:'#34D399',border:'1px solid rgba(16,185,129,.25)',padding:'2px 9px',borderRadius:99,fontWeight:600}}>협의 가능</span>}
            </div>
            {req.totalHours && <div style={{fontSize:12,color:'var(--cream-2)',marginTop:4}}>→ {req.totalHours}h 기준 총 {((inst.pricePerHour||0)*req.totalHours).toLocaleString()}원 예상</div>}
          </div>
          {/* Strengths */}
          <div>
            <div className="sec-label">반복 강점</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
              {topPos.map(t=><span key={t} style={{fontSize:12,padding:'4px 12px',borderRadius:99,background:'rgba(16,185,129,.1)',border:'1px solid rgba(16,185,129,.22)',color:'#34D399',fontWeight:500}}>{t}</span>)}
              {topNeg.map(t=><span key={t} style={{fontSize:12,padding:'4px 12px',borderRadius:99,background:'rgba(255,59,48,.1)',border:'1px solid rgba(255,59,48,.22)',color:'#FF6B6B',fontWeight:500}}>⚠️{t}</span>)}
            </div>
          </div>
          {/* History — 노션 토글 */}
          {(function(){
            var hist = instHistory(inst);
            const [histOpen, setHistOpen] = React.useState(false);
            return (
              <div>
                <button
                  onClick={function(){setHistOpen(function(v){return !v;});}}
                  style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between',background:'var(--glass)',border:'1px solid var(--border)',borderRadius:histOpen?'11px 11px 0 0':11,padding:'9px 14px',cursor:'pointer',transition:'all .15s'}}
                  onMouseEnter={function(e){e.currentTarget.style.borderColor='var(--indigo)';}}
                  onMouseLeave={function(e){e.currentTarget.style.borderColor=histOpen?'var(--border-2)':'var(--border)';}}>
                  <div style={{display:'flex',alignItems:'center',gap:7}}>
                    <span style={{fontSize:10,fontWeight:700,letterSpacing:.8,color:'var(--cream-3)',textTransform:'uppercase'}}>출강 이력</span>
                    <span style={{fontSize:10,background:'var(--indigo-g)',color:'var(--indigo-2)',border:'1px solid var(--indigo)',padding:'1px 7px',borderRadius:99,fontWeight:700}}>{hist.length}건</span>
                  </div>
                  <span style={{color:'var(--cream-3)',fontSize:12,transition:'transform .2s',display:'inline-block',transform:histOpen?'rotate(90deg)':'rotate(0deg)'}}>▶</span>
                </button>
                {histOpen && hist.length > 0 && (
                  <div style={{borderRadius:'0 0 11px 11px',overflow:'hidden',border:'1px solid var(--border-2)',borderTop:'none'}}>
                    <table style={{width:'100%',fontSize:12,borderCollapse:'collapse'}}>
                      <thead>
                        <tr style={{background:'var(--ink-3)'}}>
                          <th style={{padding:'7px 12px',textAlign:'left',fontWeight:600,color:'var(--cream-3)',fontSize:10,letterSpacing:.5,width:'36%'}}>출강기업</th>
                          <th style={{padding:'7px 12px',textAlign:'left',fontWeight:600,color:'var(--cream-3)',fontSize:10,letterSpacing:.5}}>교육명</th>
                        </tr>
                      </thead>
                      <tbody>
                        {hist.map(function(h,i){return(
                          <tr key={i} style={{borderTop:'1px solid var(--border)',background:i%2?'rgba(255,255,255,.02)':'transparent'}}>
                            <td style={{padding:'8px 12px',fontWeight:500,color:'var(--cream)',verticalAlign:'top',fontSize:12}}>{h.client || '-'}</td>
                            <td style={{padding:'8px 12px',color:'var(--cream-2)',verticalAlign:'top',fontSize:12}}>{h.course || '-'}</td>
                          </tr>
                        );})}
                      </tbody>
                    </table>
                  </div>
                )}
                {histOpen && hist.length === 0 && (
                  <div style={{padding:'12px 14px',borderRadius:'0 0 11px 11px',border:'1px solid var(--border-2)',borderTop:'none',fontSize:11,color:'var(--cream-3)'}}>출강 이력 데이터 없음</div>
                )}
              </div>
            );
          })()}
          {/* Satisfaction records */}
          {inst.satisfactionRecords?.length > 0 && (
            <div>
              <div className="sec-label">만족도 레코드</div>
              <div style={{display:'grid',gap:5,maxHeight:160,overflowY:'auto'}}>
                {inst.satisfactionRecords.map((r,i)=>(
                  <div key={i} style={{fontSize:11,padding:'6px 12px',background:'rgba(255,255,255,.03)',borderRadius:8,border:'1px solid var(--border)'}}>
                    <div style={{display:'flex',justifyContent:'space-between',marginBottom:2}}>
                      <span style={{color:'var(--cream-3)'}}>{r.date} · {r.topic} · {r.audience}</span>
                      <span style={{color:'var(--amber)',fontFamily:'Outfit,sans-serif',fontWeight:700}}>★{r.score}</span>
                    </div>
                    {r.pos?.length>0&&<div style={{color:'#34D399',fontSize:10}}>{r.pos.join(', ')}</div>}
                    {r.neg?.length>0&&<div style={{color:'#FF8FA3',fontSize:10}}>{r.neg.join(', ')}</div>}
                  </div>
                ))}
              </div>
            </div>
          )}
          {/* Actions */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,paddingTop:4}}>
            <button onClick={onEmail} className="btn-cta" style={{padding:'12px',borderRadius:12,fontWeight:600,fontSize:13,border:'none',cursor:'pointer',fontFamily:'Noto Sans KR,sans-serif'}}>
              ✉️ 출강 요청 이메일
            </button>
            {inst.driveProfileUrl && inst.driveProfileUrl !== '#' ? (
              <a href={inst.driveProfileUrl} target="_blank" rel="noopener noreferrer"
                style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,padding:'12px',borderRadius:12,fontWeight:600,fontSize:13,textDecoration:'none',background:'var(--glass-b)',border:'1px solid var(--border-2)',color:'var(--cream)',transition:'all .2s'}}
                onMouseEnter={e=>e.currentTarget.style.borderColor='var(--indigo)'}
                onMouseLeave={e=>e.currentTarget.style.borderColor='var(--border-2)'}>
                📁 Drive 프로필
              </a>
            ) : (
              <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,padding:'12px',borderRadius:12,fontSize:13,background:'var(--glass)',border:'1px solid var(--border)',color:'var(--cream-3)'}}>
                📁 프로필 없음
              </div>
            )}
          </div>
          {/* 찜하기 */}
          <div style={{paddingTop:4}}>
            {wlMode === 'done' ? (
              <div style={{padding:'11px',borderRadius:12,background:'rgba(16,185,129,.1)',border:'1px solid rgba(16,185,129,.25)',color:'#34D399',fontSize:13,fontWeight:600,textAlign:'center'}}>
                ✅ 찜 완료
              </div>
            ) : wlMode === 'idle' ? (
              <button onClick={function(){
                  if (courseIds.length === 0) setWlMode('newForm');
                  else setWlMode('pick');
                }}
                style={{width:'100%',padding:'11px',borderRadius:12,border:'1px solid var(--indigo)',background:'var(--indigo-g)',color:'var(--indigo-2)',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'Noto Sans KR,sans-serif',transition:'all .2s'}}>
                {alreadyIn.length > 0 ? '♥ 찜한 과정: '+alreadyIn.map(function(c){return wishlist[c].name;}).join(', ') : '♡ 찜하기'}
              </button>
            ) : wlMode === 'pick' ? (
              <div style={{borderRadius:12,border:'1px solid var(--indigo)',background:'var(--indigo-g)',padding:'14px'}}>
                <div className="sec-label" style={{marginBottom:8}}>과정 선택</div>
                <select className="field" value={pickedCid} onChange={function(e){setPickedCid(e.target.value);}} style={{marginBottom:10}}>
                  <option value="">-- 과정 선택 --</option>
                  {courseIds.map(function(cid){return(
                    <option key={cid} value={cid}>{wishlist[cid].name}</option>
                  );})}
                </select>
                <div style={{display:'flex',gap:8}}>
                  <button onClick={function(){addToCourse(pickedCid);}}
                    disabled={!pickedCid}
                    className="btn-cta"
                    style={{flex:1,padding:'9px',borderRadius:9,fontWeight:600,fontSize:13,border:'none',cursor:'pointer',fontFamily:'Noto Sans KR,sans-serif'}}>
                    찜 추가
                  </button>
                  <button onClick={function(){setWlMode('newForm');}}
                    style={{padding:'9px 12px',borderRadius:9,border:'1px solid var(--border-2)',background:'var(--glass)',color:'var(--cream-2)',fontSize:12,cursor:'pointer',fontFamily:'Noto Sans KR,sans-serif'}}>
                    + 새 과정
                  </button>
                  <button onClick={function(){setWlMode('idle');setPickedCid('');}}
                    className="nav-ghost" style={{fontSize:12}}>취소</button>
                </div>
              </div>
            ) : /* newForm */ (
              <div style={{borderRadius:12,border:'1px solid var(--indigo)',background:'var(--indigo-g)',padding:'14px'}}>
                <div className="sec-label" style={{marginBottom:8}}>새 과정 만들기</div>
                <input className="field" value={newCName}
                  onChange={function(e){setNewCName(e.target.value);}}
                  onKeyDown={function(e){if(e.key==='Enter')createAndAdd();}}
                  placeholder="예: 삼성전자 AI 교육 2025"
                  style={{marginBottom:10}}/>
                <div style={{display:'flex',gap:8}}>
                  <button onClick={createAndAdd} className="btn-cta"
                    style={{flex:1,padding:'9px',borderRadius:9,fontWeight:600,fontSize:13,border:'none',cursor:'pointer',fontFamily:'Noto Sans KR,sans-serif'}}>
                    과정 만들고 찜하기
                  </button>
                  <button onClick={function(){setWlMode('idle');setNewCName('');}}
                    className="nav-ghost" style={{fontSize:12}}>취소</button>
                </div>
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   HEART BUTTON — 강사 찜하기 컴팩트 버튼
═══════════════════════════════════════════════════════ */
function HeartBtn({inst}) {
  var loadWl = function(){ try{return JSON.parse(localStorage.getItem('im_wishlist')||'{}');}catch(_){return{};} };
  const [wl, setWl] = useState(loadWl);
  const [open, setOpen] = useState(false);
  var courseIds = Object.keys(wl);
  var isSaved = courseIds.some(function(cid){ return (wl[cid].instructors||[]).indexOf(inst.id) > -1; });
  var saveWl = function(next){ setWl(next); localStorage.setItem('im_wishlist', JSON.stringify(next)); };
  var addTo = function(cid, e) {
    if (e) e.stopPropagation();
    var next = JSON.parse(JSON.stringify(wl));
    if (!next[cid]) return;
    if ((next[cid].instructors||[]).indexOf(inst.id) === -1) next[cid].instructors = (next[cid].instructors||[]).concat([inst.id]);
    saveWl(next); setOpen(false);
  };
  var toggle = function(e) {
    e.stopPropagation();
    if (isSaved) {
      var next = JSON.parse(JSON.stringify(wl));
      courseIds.forEach(function(cid){ next[cid].instructors = (next[cid].instructors||[]).filter(function(id){return id!==inst.id;}); });
      saveWl(next);
    } else if (courseIds.length === 0) {
      var next2 = JSON.parse(JSON.stringify(wl));
      var id = 'course_' + Date.now();
      next2[id] = {name:'과정 미지정', instructors:[inst.id], instStatus:{}, status:'탐색중', date:'', memo:''};
      saveWl(next2);
    } else if (courseIds.length === 1) {
      addTo(courseIds[0], e);
    } else {
      setOpen(function(v){return !v;});
    }
  };
  return (
    <div style={{position:'relative'}} onClick={function(e){e.stopPropagation();}}>
      <button onClick={toggle}
        style={{background:isSaved?'rgba(248,113,113,.15)':'rgba(255,255,255,.06)',border:'1px solid '+(isSaved?'rgba(248,113,113,.4)':'var(--border-2)'),
          borderRadius:10,cursor:'pointer',fontSize:18,lineHeight:1,padding:'6px 8px',color:isSaved?'#f87171':'var(--cream-3)',
          transition:'all .15s'}}
        title={isSaved?'찜 해제':'찜하기'}>
        {isSaved ? '♥' : '♡'}
      </button>
      {open && courseIds.length > 1 && (
        <div style={{position:'absolute',right:0,top:'calc(100% + 4px)',zIndex:60,background:'var(--ink-2)',border:'1px solid var(--border)',borderRadius:10,padding:6,minWidth:160,boxShadow:'0 8px 24px rgba(0,0,0,.5)'}}>
          <div style={{fontSize:10,color:'var(--cream-3)',padding:'2px 8px 6px',fontWeight:600}}>과정 선택</div>
          {courseIds.map(function(cid){return(
            <button key={cid} onClick={function(e){addTo(cid,e);}}
              style={{display:'block',width:'100%',textAlign:'left',padding:'6px 10px',borderRadius:7,border:'none',background:'transparent',color:'var(--cream)',fontSize:12,cursor:'pointer',fontFamily:'Noto Sans KR,sans-serif'}}
              onMouseEnter={function(e){e.currentTarget.style.background='var(--indigo-g)';}}
              onMouseLeave={function(e){e.currentTarget.style.background='transparent';}}>
              {wl[cid].name}
            </button>
          );})}
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════

  return (
    <div className={`glass ${glowCls} au`}
      style={{borderRadius:18,padding:'20px',cursor:'pointer',transition:'transform .2s,box-shadow .2s',animationDelay:`${(rank-1)*.08}s`}}
      onClick={()=>onDetail(result)}
      onMouseEnter={e=>e.currentTarget.style.transform='translateY(-3px)'}
      onMouseLeave={e=>e.currentTarget.style.transform='translateY(0)'}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:18}}>{rankEmoji}</span>
          <span className={labelCls}>{label}</span>
          {inst.isFullTime && (
            <span style={{fontSize:10,padding:'2px 8px',borderRadius:99,background:'rgba(255,56,92,0.18)',border:'1px solid rgba(255,56,92,0.45)',color:'var(--indigo-2)',fontWeight:700,letterSpacing:.3}}>★ 전임</span>

        </div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div style={{fontFamily:'Outfit,sans-serif',fontSize:20,fontWeight:700,color:'var(--indigo-2)'}}>{total}<span style={{fontSize:12,opacity:.7}}>/100</span></div>
          <span style={{fontSize:24}}>{inst.photo}</span>
          <HeartBtn inst={inst}/>
        </div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
        <span style={{fontFamily:'Outfit,sans-serif',fontSize:17,fontWeight:600,color:'var(--cream)'}}>{inst.name} 강사</span>
        {allAvg && <span style={{color:'var(--amber)',fontSize:12}}>★ <span style={{color:'var(--cream-2)',fontWeight:600}}>{allAvg.toFixed(1)}</span></span>}
      </div>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
        <span style={{fontFamily:'Outfit,sans-serif',fontSize:15,color:'var(--indigo-2)'}}>{inst.pricePerHour?(inst.pricePerHour/10000).toFixed(0)+'만원':'-'}</span>
        <span style={{fontSize:11,color:'var(--cream-3)'}}>/ h</span>
        {inst.negotiable && <span style={{fontSize:10,background:'rgba(16,185,129,.12)',color:'#34D399',border:'1px solid rgba(16,185,129,.22)',padding:'1px 8px',borderRadius:99,fontWeight:600}}>협의 가능</span>}
        <span style={{fontSize:10,color:'var(--cream-3)',marginLeft:2}}>{inst.recordingAllowed?'📹':'🚫'} {inst.contractType}</span>
      </div>
      {/* S1-S4 mini */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:4,marginBottom:10}}>
        {[['S1',s1,35],['S2',s2,30],['S3',s3,20],['S4',s4>=0?`+${s4}`:String(s4),null]].map(([l,v,m])=>(
          <div key={l} style={{textAlign:'center',background:'rgba(255,255,255,.04)',borderRadius:7,padding:'6px 4px'}}>
            <div style={{fontSize:9,color:'var(--cream-3)',textTransform:'uppercase',letterSpacing:.5}}>{l}</div>
            <div style={{fontFamily:'Outfit,sans-serif',fontSize:12,fontWeight:700,color:m?'var(--cream)':s4>=0?'#34D399':'#FF8FA3'}}>{v}{m?`/${m}`:''}</div>
          </div>
        ))}
      </div>
      {/* 추천 이유 — 강조 박스 */}
      <div style={{marginBottom:12,borderRadius:10,overflow:'hidden',border:'1px solid '+(displayReason?'rgba(99,102,241,.3)':'rgba(245,158,11,.25)')}}>
        <div style={{background:displayReason?'rgba(99,102,241,.09)':'rgba(245,158,11,.08)',padding:'7px 12px',fontSize:10,fontWeight:700,letterSpacing:.7,color:displayReason?'var(--indigo-2)':'#FBBF24',textTransform:'uppercase',display:'flex',alignItems:'center',gap:6}}>
          {displayReason ? <><span>✦</span><span>AI 추천 이유</span></> : '💡 추천 이유'}
          {reasonLoading && <span style={{display:'inline-block',width:10,height:10,borderRadius:'50%',border:'2px solid var(--indigo-2)',borderTopColor:'transparent',animation:'spin 0.8s linear infinite',marginLeft:4}}/>}
        </div>
        {reasonLoading && !displayReason ? (
          <div style={{padding:'12px',display:'grid',gap:6}}>
            {[80,60,70].map(function(w,i){return(
              <div key={i} style={{height:10,borderRadius:5,background:'rgba(255,255,255,.07)',width:w+'%',animation:'pulse 1.5s ease-in-out infinite',animationDelay:(i*0.15)+'s'}}/>
            );})}
          </div>
        ) : (
          <div style={{padding:'10px 12px',fontSize:12,lineHeight:1.75,color:'var(--cream-2)',background:'rgba(255,255,255,.02)'}}>
            {displayReason || reason}
          </div>
        )}
      </div>
      {/* 강점 태그 — 직사각형 */}
      {inst.strengths.length > 0 && (
        <div style={{display:'flex',flexWrap:'wrap',gap:5,marginBottom:12}}>
          {inst.strengths.slice(0,3).map(s=>(
            <span key={s} style={{fontSize:11,padding:'3px 10px',borderRadius:6,background:'var(--indigo-g)',border:'1px solid var(--indigo)',color:'var(--indigo-2)',fontWeight:500}}>{s}</span>
          ))}
        </div>
      )}
      {/* Level bars */}
      <div>
        <div style={{fontSize:10,color:'var(--cream-3)',fontWeight:600,letterSpacing:.8,textTransform:'uppercase',marginBottom:6}}>커버 레벨</div>
        <div style={{display:'flex',gap:5}}>
          {ALL_LEVELS.map(l=>{
            const on = inst.levels.includes(l);
            return (
              <div key={l} style={{flex:1}}>
                <div className={`lvl-bar${on?' on':''}`}/>
                <div style={{textAlign:'center',marginTop:4,fontSize:10,color:on?'var(--indigo-2)':'var(--cream-3)',fontWeight:on?700:400}}>{l}</div>
              </div>
            );
          })}
        </div>
      </div>
      {warns.map((w,i)=>(
        <div key={i} className={w.level==='error'?'warn-err':'warn-info'} style={{marginTop:10,display:'flex',gap:6}}><span>⚠️</span><span>{w.text}</span></div>
      ))}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════

/* ═══════════════════════════════════════════════════════
   INPUT SECTION
═══════════════════════════════════════════════════════ */
function InputSection({step1Data, onSubmit}) {
  const INIT = {
    topics:[], jobCategories:[], levels:[], industry:'', companyName:'', purpose:'',
    deliveryMode:'', learningFormat:[], requiredInstructorTraits:[],
    totalHours: step1Data?.totalHours || 8,
    budgetTotal: 0, notes: '', recordingRequired: false,
  };
  const [fields, setFields] = useState(INIT);
  const [date, setDate] = useState('');
  const [dateUndecided, setDateUndecided] = useState(false);
  const [scheduleDates, setScheduleDates] = useState([]);
  const [inputMode, setInputMode] = useState('file');
  const [parsed, setParsed] = useState(null);
  const [topicOpen, setTopicOpen] = useState(false);
  const [courseMode, setCourseMode] = useState('single');
  const [instructorMode, setInstructorMode] = useState('per_course');
  const [audienceOther, setAudienceOther] = useState('');
  const [traitOther, setTraitOther] = useState('');
  const [salesmapData, setSalesmapData] = useState(null);
  const [salesmapLoading, setSalesmapLoading] = useState(false);

  const toggle = (arr, key, val) =>
    setFields(p=>({...p,[key]: arr.includes(val) ? arr.filter(v=>v!==val) : [...arr,val]}));
  const set1 = (key, val) => setFields(p=>({...p,[key]:val}));
  const toggle1 = (key, val) => setFields(p=>({...p,[key]:p[key]===val?'':val}));

  useEffect(()=>{
    if (!topicOpen) return;
    const close = (e)=>{ if (!e.target.closest('[data-topic-dropdown]')) setTopicOpen(false); };
    document.addEventListener('mousedown', close);
    return ()=>document.removeEventListener('mousedown', close);
  },[topicOpen]);

  // 기업명에 우리 회사명이 들어오면 즉시 클리어
  useEffect(()=>{
    if (isOurCompany(fields.companyName||'')) set1('companyName','');
  },[fields.companyName]);

  const handleExtracted = (data) => {
    if (!data) { setParsed(null); setSalesmapData(null); return; }
    setParsed(data);
    // Multi-course: do not populate form fields; store as-is for direct submission
    if (data.isMultiCourse) { setCourseMode('multi'); return; }
    // ALL_FORMATS / ALL_INDUSTRIES 후보에 없는 값은 버림
    const safeIndustry = ALL_INDUSTRIES.includes(data.industry) ? data.industry : '';
    // level (string) → levels (array) 변환
    const parsedLevels = data.levels && data.levels.length ? data.levels
      : (data.level ? [data.level] : []);
    const safeCompany = (data.companyName && !isOurCompany(data.companyName)) ? data.companyName : '';
    setFields(p=>({...p,
      topics:      data.topics && data.topics.length ? data.topics : p.topics,
      jobCategories: data.jobCategories && data.jobCategories.length ? data.jobCategories : p.jobCategories,
      levels:      parsedLevels.length ? parsedLevels : p.levels,
      industry:    safeIndustry || p.industry,
      deliveryMode: data.deliveryMode || p.deliveryMode,
      learningFormat: data.learningFormat && data.learningFormat.length ? data.learningFormat : p.learningFormat,
      totalHours:  data.totalHours || p.totalHours,
      budgetTotal: data.budgetTotal || p.budgetTotal,
      requiredInstructorTraits: data.requiredInstructorTraits && data.requiredInstructorTraits.length ? data.requiredInstructorTraits : p.requiredInstructorTraits,
      companyName: safeCompany || (!isOurCompany(p.companyName||'') ? p.companyName : ''),
      purpose:     data.purpose || p.purpose,
      notes:       data.notes || p.notes,
    }));
    // 세일즈맵 자동 조회 (고객사명이 있을 때)
    if (safeCompany && APPS_SCRIPT_URL) {
      setSalesmapData(null);
      setSalesmapLoading(true);
      fetchSalesmapLead(safeCompany, data.purpose || '', data.dates || [])
        .then(function(result) {
          setSalesmapLoading(false);
          if (result && result.found) setSalesmapData(result);
        })
        .catch(function(){ setSalesmapLoading(false); });
    }
  };

  const Chips = ({label, opts, sel, multiKey, singleKey, hard=false}) => {
    const safeArr = Array.isArray(sel) ? sel : [];
    const isSingle = !!singleKey;
    return (
      <div style={{marginBottom:20}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
          <span style={{fontSize:10,fontWeight:700,letterSpacing:1.2,textTransform:'uppercase',color:'var(--cream-3)'}}>{label}</span>
          {hard ? <span style={{fontSize:10,background:'var(--indigo-g)',color:'var(--indigo-2)',border:'1px solid var(--indigo)',padding:'1px 8px',borderRadius:99,fontWeight:600}}>필수 필터</span>
               : <span style={{fontSize:10,color:'var(--cream-3)'}}>(선택)</span>}
        </div>
        <div style={{display:'flex',flexWrap:'wrap',gap:7}}>
          {opts.map(o=>{
            const on = isSingle ? fields[singleKey]===o : safeArr.includes(o);
            return (
              <button key={o} className={`chip${on?' on':''}`}
                onClick={()=>isSingle ? toggle1(singleKey,o) : toggle(safeArr, multiKey, o)}>{o}</button>
            );
          })}
        </div>
      </div>
    );
  };

  return (
    <div style={{maxWidth:760,margin:'0 auto'}}>
      {/* ── 사용 가이드 ── */}
      <div style={{marginBottom:20,paddingTop:4}}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(190px,1fr))',gap:8}}>
          {[
            {step:'01',icon:'📄',title:'교육 정보 입력',desc:'제안서 PDF/PPT 업로드 또는 주제·대상·일정 직접 입력'},
            {step:'02',icon:'🤖',title:'AI 규칙 매칭',desc:'전임 우선 → 최근 계약 → 출강 이력 기반 점수 산출'},
            {step:'03',icon:'📋',title:'후보 리스트 확인',desc:'점수·만족도·일정 가능 여부를 한눈에 비교'},
            {step:'04',icon:'✉️',title:'출강 요청 발송',desc:'강사 선택 후 이메일 초안 자동 생성'},
          ].map(function(g){return(
            <div key={g.step} style={{padding:'12px 14px',borderRadius:12,background:'rgba(255,255,255,.03)',border:'1px solid var(--border)',display:'flex',alignItems:'flex-start',gap:10}}>
              <span style={{fontSize:18,flexShrink:0}}>{g.icon}</span>
              <div>
                <div style={{fontSize:10,fontWeight:700,color:'var(--indigo-2)',letterSpacing:.8,marginBottom:2}}>STEP {g.step} · {g.title}</div>
                <div style={{fontSize:11,color:'var(--cream-3)',lineHeight:1.5}}>{g.desc}</div>
              </div>
            </div>
          );})}
        </div>
      </div>
      {/* Input mode toggle */}
      <div style={{display:'flex',gap:0,marginBottom:14,background:'var(--glass)',borderRadius:11,padding:4,border:'1px solid var(--border)',width:'fit-content'}}>
        {[{id:'file',label:'📄 PDF/PPT 업로드'},{id:'text',label:'✍️ 직접 입력'}].map(m=>(
          <button key={m.id} onClick={()=>setInputMode(m.id)}
            style={{padding:'7px 16px',borderRadius:8,border:'none',cursor:'pointer',fontSize:12,fontWeight:inputMode===m.id?600:500,transition:'all .2s',
              background:inputMode===m.id?'var(--indigo-g)':'transparent',
              color:inputMode===m.id?'var(--indigo-2)':'var(--cream-3)',
              fontFamily:'Noto Sans KR,sans-serif',borderBottom:inputMode===m.id?'2px solid var(--brand)':'2px solid transparent'}}>
            {m.label}
          </button>
        ))}
      </div>
      {inputMode==='file' ? (
        <div style={{marginBottom:16}}><PdfReader onExtracted={handleExtracted}/></div>
      ) : (
        <div className="glass au" style={{borderRadius:16,padding:'18px',marginBottom:16}}>
          <div style={{fontSize:12,fontWeight:600,color:'var(--cream-2)',marginBottom:10}}>교육 요건 직접 입력</div>
          <textarea className="field" rows={3} style={{resize:'none'}}
            placeholder="예: 마케터 대상 ChatGPT 업무 활용 입문 교육, 20명 오프라인"
            onChange={e=>{const p=parseDocumentText(e.target.value,''); handleExtracted(p);}}/>
        </div>
      )}
      {/* 과정 구성 + 강사 구성 선택 */}
      <div className="glass au" style={{borderRadius:14,padding:'16px 18px',marginBottom:16}}>
        <div style={{fontSize:10,fontWeight:700,letterSpacing:1.2,textTransform:'uppercase',color:'var(--cream-3)',marginBottom:10}}>교육 과정 구성</div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:4}}>
          {[{v:'single',l:'단일 과정'},{v:'multi',l:'다과정 (2개 이상)'}].map(function(item){
            return (
              <button key={item.v} className={'chip'+(courseMode===item.v?' on':'')}
                onClick={function(){setCourseMode(item.v);}}>
                {item.l}
              </button>
            );
          })}
        </div>
        {courseMode==='multi' && (
          <div style={{marginTop:14}}>
            <div style={{fontSize:10,fontWeight:700,letterSpacing:1.2,textTransform:'uppercase',color:'var(--cream-3)',marginBottom:8}}>강사 구성</div>
            <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:6}}>
              {[{v:'per_course',l:'과정별 다른 강사'},{v:'one',l:'1명이 전체 담당'}].map(function(item){
                return (
                  <button key={item.v} className={'chip'+(instructorMode===item.v?' on':'')}
                    onClick={function(){setInstructorMode(item.v);}}>
                    {item.l}
                  </button>
                );
              })}
            </div>
            <div style={{fontSize:11,color:'var(--cream-3)'}}>
              {instructorMode==='one'
                ? '모든 과정을 한 강사가 담당 → 통합 요건으로 강사 1명 추천'
                : '각 과정에 최적화된 강사를 과정별로 별도 추천'}
            </div>
          </div>
        )}
      </div>

      {/* 다과정 안내 (문서 업로드 유도) */}
      {courseMode==='multi' && !(parsed && parsed.isMultiCourse) && (
        <div className="glass au" style={{borderRadius:14,padding:'20px 22px',marginBottom:16,border:'1px dashed var(--border-2)',textAlign:'center'}}>
          <div style={{fontSize:24,marginBottom:10}}>📄</div>
          <div style={{fontSize:14,fontWeight:600,color:'var(--cream)',marginBottom:6}}>제안서·커리큘럼 문서를 업로드해주세요</div>
          <div style={{fontSize:12,color:'var(--cream-3)',lineHeight:1.7}}>
            다과정 제안서(PDF·PPTX·DOCX)를 업로드하면<br/>AI가 과정별 주제·시수를 자동으로 인식하고<br/>인라인으로 확인·수정할 수 있습니다.
          </div>
        </div>
      )}

      {/* Conditions */}
      <div className="glass" style={{borderRadius:18,padding:'22px 24px',marginBottom:16}}>
        <div style={{fontFamily:'Outfit,sans-serif',fontSize:15,fontWeight:600,color:'var(--cream)',marginBottom:4}}>교육 조건</div>
        <div style={{fontSize:12,color:'var(--cream-3)',marginBottom:20}}>{courseMode==='multi'?'과정 공통 조건을 입력하세요.':'선택 사항입니다. 원하는 조건만 골라주세요.'}</div>
        {/* 교육 예정일 — 다과정이면 숨김 (각 과정 일정은 문서에서 파싱) */}
        {courseMode !== 'multi' && (
        <div style={{marginBottom:20}}>
          <div style={{fontSize:10,fontWeight:700,letterSpacing:1.2,textTransform:'uppercase',color:'var(--cream-3)',marginBottom:10,display:'flex',alignItems:'center',gap:8}}>
            교육 예정일
            <button onClick={function(){setDateUndecided(function(v){var next=!v;if(next){setDate('');setScheduleDates([]);}return next;});}}
              style={{padding:'3px 12px',borderRadius:99,border:'1px solid '+(dateUndecided?'var(--indigo)':'var(--border-2)'),
                background:dateUndecided?'var(--indigo-g)':'transparent',
                color:dateUndecided?'var(--indigo-2)':'var(--cream-3)',
                fontSize:11,fontWeight:dateUndecided?700:400,cursor:'pointer',
                fontFamily:'Noto Sans KR,sans-serif',transition:'all .15s',textTransform:'none',letterSpacing:0}}>
              아직 미정
            </button>
          </div>
          {!dateUndecided && React.createElement(ScheduleInputPanel, {
            dates: scheduleDates.length ? scheduleDates : (date ? [date] : []),
            onChange: function(newDates) {
              if(!newDates.length){setScheduleDates([]);setDate('');}
              else if(newDates.length===1){setDate(newDates[0]);setScheduleDates([]);}
              else{setScheduleDates(newDates);setDate('');}
            }
          })}
        </div>
        )}

              <div style={{marginBottom:8,borderRadius:10,overflow:'hidden',border:'1px solid rgba(16,185,129,.25)'}}>

                  <span>세일즈맵</span>

                  {salesmapData && salesmapData.memos.length > 0 && (
                    <button
                      onClick={function(){
                        var memoText = salesmapData.memos.map(function(m){
                          return '· ' + m.content + (m.createdAt ? ' (' + m.createdAt + ')' : '');
                        }).join('\n');
                        set1('notes', fields.notes ? fields.notes + '\n\n[세일즈맵 메모]\n' + memoText : '[세일즈맵 메모]\n' + memoText);
                      }}
                      style={{marginLeft:'auto',fontSize:10,padding:'2px 10px',borderRadius:99,border:'1px solid rgba(16,185,129,.4)',
